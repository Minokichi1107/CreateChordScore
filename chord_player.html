<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ChordPlayer v3</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+JP:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   CSS変数・リセット
══════════════════════════════════════ */
:root {
  --bg:       #1a1f2e;
  --bg2:      #222839;
  --bg3:      #2a3245;
  --card:     #ffffff;
  --card2:    #f4f6fa;
  --border:   #dde2ee;
  --accent:   #2563eb;
  --accent2:  #f59e0b;
  --accent3:  #10b981;
  --danger:   #ef4444;
  --text:     #1e2640;
  --text2:    #4a5568;
  --text3:    #9aa5b4;
  --now-bg:   #fff7e6;
  --now-border:#f59e0b;
  --next-bg:  #f0f9ff;
  --next-border:#93c5fd;
  --diag-bg:  #ffffff;
  --diag-fret:#c8d0e0;
  --diag-str: #8090a8;
  --diag-dot: #2563eb;
  --diag-open:#4a5568;
  --diag-mute:#cbd5e0;
  --diag-nut: #1e2640;
  --hl-now:   rgba(245,158,11,0.12);
  --hl-next:  rgba(37,99,235,0.06);
  --radius:   10px;
  --shadow:   0 2px 12px rgba(0,0,0,0.10);
  --shadow2:  0 4px 24px rgba(0,0,0,0.18);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Outfit','Noto Sans JP',sans-serif;}
body{background:var(--bg);color:var(--text);display:flex;flex-direction:column;}

/* ══════════════════════════════════════
   ヘッダー
══════════════════════════════════════ */
header{
  height:52px;flex-shrink:0;
  background:var(--bg2);
  border-bottom:1px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;gap:12px;padding:0 16px;
  position:relative;z-index:20;
}
.logo{
  font-size:17px;font-weight:800;letter-spacing:.5px;
  color:#fff;white-space:nowrap;
  text-shadow:0 0 20px rgba(37,99,235,.5);
}
.logo em{color:var(--accent2);font-style:normal;}
.song-meta{flex:1;overflow:hidden;}
.song-title{font-size:12px;color:#bbc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.song-badges{display:flex;gap:5px;margin-top:2px;}
.badge{font-size:9px;padding:1px 6px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-weight:700;}
.badge.key{background:rgba(37,99,235,.25);color:#93c5fd;}
.badge.bpm{background:rgba(245,158,11,.2);color:#fcd34d;}
.badge.src{background:rgba(16,185,129,.15);color:#6ee7b7;}
.hbtn{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  color:#ccd;padding:4px 10px;font-size:10px;font-family:'JetBrains Mono',monospace;
  cursor:pointer;border-radius:4px;transition:all .15s;white-space:nowrap;
  letter-spacing:.5px;
}
.hbtn:hover{background:rgba(255,255,255,.14);color:#fff;}
.hbtn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}
.hbtn.primary:hover{background:#1d4ed8;}
.hbtn:disabled{opacity:.35;pointer-events:none;}

/* ══════════════════════════════════════
   メインレイアウト
══════════════════════════════════════ */
.main{flex:1;display:grid;grid-template-columns:1fr 300px;overflow:hidden;}

/* ══════════════════════════════════════
   左ペイン
══════════════════════════════════════ */
.left{display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}

/* ── NOW PLAYING バー ── */
.now-bar{
  flex-shrink:0;background:var(--bg2);
  border-bottom:1px solid rgba(255,255,255,.06);
  padding:10px 16px;display:flex;align-items:stretch;gap:12px;
}
.now-chord-wrap{
  background:var(--now-bg);border:2px solid var(--now-border);
  border-radius:var(--radius);padding:6px 16px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-width:130px;
}
.now-label{font-size:9px;color:#b45309;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px;}
.now-chord-text{
  font-size:52px;font-weight:800;line-height:1;color:#92400e;
  transition:all .1s;
}
.now-chord-text.pop{animation:cpop .18s ease;}
@keyframes cpop{0%{transform:scale(1.18);opacity:.6}100%{transform:scale(1);opacity:1}}

.next-chord-wrap{
  background:var(--next-bg);border:2px solid var(--next-border);
  border-radius:var(--radius);padding:6px 14px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-width:100px;
}
.next-label{font-size:9px;color:#1d4ed8;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px;}
.next-chord-text{font-size:34px;font-weight:800;line-height:1;color:#1e40af;}

.transport{flex:1;display:flex;flex-direction:column;justify-content:center;gap:8px;}
.prog-row{display:flex;align-items:center;gap:8px;}
.t{font-size:10px;font-family:'JetBrains Mono',monospace;color:#9aa5b4;min-width:34px;}
.t.r{text-align:right;}
.prog-track{
  flex:1;height:5px;background:rgba(255,255,255,.1);border-radius:3px;
  cursor:pointer;position:relative;
}
.prog-fill{
  height:100%;width:0%;border-radius:3px;transition:width .08s linear;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  position:relative;
}
.prog-fill::after{
  content:'';position:absolute;right:-5px;top:-4px;
  width:13px;height:13px;background:var(--accent2);border-radius:50%;
  box-shadow:0 0 6px rgba(245,158,11,.6);
}
.vol-row{display:flex;align-items:center;gap:6px;}
.vol-icon{font-size:11px;color:#9aa5b4;}
input[type=range].vol{
  -webkit-appearance:none;appearance:none;
  width:88px;height:3px;background:rgba(255,255,255,.15);
  border-radius:2px;cursor:pointer;outline:none;
}
input[type=range].vol::-webkit-slider-thumb{
  -webkit-appearance:none;width:12px;height:12px;
  background:var(--accent2);border-radius:50%;cursor:pointer;
}
.vol-pct{font-size:9px;font-family:'JetBrains Mono',monospace;color:#9aa5b4;min-width:28px;}

/* ── コントロールバー ── */
.ctrl-bar{
  flex-shrink:0;background:var(--bg2);
  border-bottom:1px solid rgba(255,255,255,.06);
  padding:6px 12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;
}
.file-label{
  background:rgba(255,255,255,.05);border:1px dashed rgba(255,255,255,.2);
  color:#9aa5b4;padding:4px 10px;font-size:10px;font-family:'JetBrains Mono',monospace;
  cursor:pointer;border-radius:4px;transition:all .12s;
  letter-spacing:.5px;text-transform:uppercase;
}
.file-label:hover{border-color:var(--accent2);color:var(--accent2);}
input[type=file]{display:none;}
.sep{width:1px;height:20px;background:rgba(255,255,255,.1);margin:0 2px;}
.view-toggle{display:flex;gap:3px;}
.vbtn{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);
  color:#9aa5b4;padding:4px 8px;font-size:10px;cursor:pointer;
  border-radius:3px;transition:all .12s;letter-spacing:.5px;
}
.vbtn:hover{color:#fff;}
.vbtn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* ── ドロップゾーン ── */
.drop-zone{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;padding:32px;
}
.drop-zone.hidden{display:none;}
.drop-icon{font-size:48px;opacity:.3;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.drop-title{font-size:16px;font-weight:700;color:#fff;opacity:.5;}
.drop-steps{display:flex;flex-direction:column;gap:6px;font-size:11px;color:#9aa5b4;line-height:1.8;}
.drop-step{display:flex;gap:8px;}
.sn{color:var(--accent2);font-weight:700;min-width:20px;}

/* ══════════════════════════════════════
   コード譜エリア（2モード）
══════════════════════════════════════ */
.chord-area{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.chord-area.hidden{display:none;}

/* ── モード: グリッド（小節） ── */
.measure-scroll{
  flex:1;overflow-y:auto;padding:12px 14px;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent;
}
.measure-grid{display:flex;flex-direction:column;gap:6px;}

.measure-row{
  display:grid;gap:4px;
  /* JS で columns を動的に設定 */
}
.measure-cell{
  background:var(--card);border:1.5px solid var(--border);
  border-radius:8px;padding:6px 8px;
  cursor:pointer;transition:all .12s;min-height:52px;
  position:relative;overflow:hidden;
}
.measure-cell:hover{box-shadow:var(--shadow);}
.measure-cell.active{
  background:var(--now-bg);border-color:var(--now-border);
  box-shadow:0 0 0 2px rgba(245,158,11,.3),var(--shadow);
}
.measure-cell.next-up{
  background:var(--next-bg);border-color:var(--next-border);
}
.measure-cell.empty{background:var(--card2);border-style:dashed;opacity:.4;}
.measure-num{font-size:8px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:2px;}
.measure-chord{
  font-size:20px;font-weight:800;color:var(--text);line-height:1;
  word-break:break-all;
}
.measure-chord.slash{font-size:13px;}
.measure-chord.active-c{color:#92400e;}
.measure-chord.next-c{color:#1e40af;}
.measure-beat-dots{display:flex;gap:3px;margin-top:4px;}
.beat-dot{width:5px;height:5px;border-radius:50%;background:var(--border);}
.beat-dot.filled{background:var(--accent2);}
.measure-next-hint{
  font-size:9px;color:var(--text3);margin-top:2px;
  font-family:'JetBrains Mono',monospace;
}
.measure-lyric{
  font-size:9px;color:var(--text2);margin-top:2px;
  font-family:'Noto Sans JP',sans-serif;line-height:1.4;
}

/* ── モード: シンプルリスト ── */
.simple-scroll{
  flex:1;overflow-y:auto;padding:12px 14px;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent;
}
.simple-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(68px,1fr));
  gap:5px;
}
.sc{
  background:var(--card);border:1.5px solid var(--border);
  border-radius:6px;padding:6px 4px;text-align:center;
  cursor:pointer;transition:all .1s;
}
.sc .cn{
  font-size:16px;font-weight:800;color:var(--text);line-height:1;
  word-break:break-all;
}
.sc .cn.slash{font-size:10px;}
.sc .ct{font-size:8px;color:var(--text3);margin-top:2px;font-family:'JetBrains Mono',monospace;}
.sc.active{background:var(--now-bg);border-color:var(--now-border);}
.sc.active .cn{color:#92400e;}
.sc.nxt{background:var(--next-bg);border-color:var(--next-border);}
.sc.nxt .cn{color:#1e40af;}

/* ══════════════════════════════════════
   右パネル
══════════════════════════════════════ */
.right{
  border-left:1px solid rgba(255,255,255,.06);
  background:var(--bg2);
  display:flex;flex-direction:column;
  overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent;
}
.rpanel{padding:14px 14px;border-bottom:1px solid rgba(255,255,255,.06);}
.rtitle{
  font-size:9px;letter-spacing:3px;color:#667;
  text-transform:uppercase;margin-bottom:10px;font-weight:700;
}

/* ── ダイアグラム向き切替 ── */
.orient-select{
  display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px;
}
.obtn{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);
  color:#9aa5b4;padding:5px 4px;font-size:9px;cursor:pointer;
  border-radius:4px;transition:all .12s;text-align:center;line-height:1.3;
}
.obtn:hover{border-color:var(--accent);color:var(--accent);}
.obtn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}

/* ── カポ ── */
.capo-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:3px;margin-bottom:6px;}
.capo-btn{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  color:#9aa5b4;padding:5px 0;font-size:10px;
  cursor:pointer;transition:all .1s;text-align:center;border-radius:3px;
  font-family:'JetBrains Mono',monospace;
}
.capo-btn:hover{border-color:var(--accent2);color:var(--accent2);}
.capo-btn.active{background:var(--accent2);border-color:var(--accent2);color:#000;font-weight:700;}
.capo-info{font-size:10px;color:#9aa5b4;text-align:center;}
.capo-info span{color:var(--accent2);}

/* ── ダイアグラム ── */
.diag-header{display:flex;align-items:baseline;gap:6px;margin-bottom:6px;}
.diag-name{font-size:24px;font-weight:800;color:#fff;}
.diag-sub{font-size:9px;color:var(--accent2);}
.diag-wrap{
  background:var(--diag-bg);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  padding:10px;box-shadow:var(--shadow);
}
canvas#diag{display:block;}

/* ── 曲情報 ── */
.irow{
  display:flex;justify-content:space-between;
  padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05);
  font-size:10px;
}
.irow:last-child{border:none;}
.irow .lbl{color:#9aa5b4;}
.irow .val{color:var(--accent2);font-weight:700;font-family:'JetBrains Mono',monospace;}

/* ── ビート設定 ── */
.beat-setting{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.beat-setting label{font-size:10px;color:#9aa5b4;}
.beat-setting select{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  color:#fff;padding:3px 6px;font-size:10px;border-radius:4px;cursor:pointer;
  font-family:'JetBrains Mono',monospace;
}

/* ══════════════════════════════════════
   ローディングオーバーレイ
══════════════════════════════════════ */
.loading{
  position:fixed;inset:0;background:rgba(26,31,46,.92);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;z-index:100;backdrop-filter:blur(4px);
}
.loading.hidden{display:none;}
.spinner{
  width:32px;height:32px;border:2px solid rgba(255,255,255,.1);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.lmsg{font-size:13px;color:#fff;}
.lsub{font-size:10px;color:#9aa5b4;}
</style>
</head>
<body>

<div class="loading hidden" id="loading">
  <div class="spinner"></div>
  <div class="lmsg" id="lmsg">解析中...</div>
  <div class="lsub" id="lsub">しばらくお待ちください</div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">Chord<em>Player</em></div>
  <div class="song-meta">
    <div class="song-title" id="song-title">ファイル未読込</div>
    <div class="song-badges">
      <span class="badge key" id="b-key" style="display:none"></span>
      <span class="badge bpm" id="b-bpm" style="display:none"></span>
      <span class="badge src" id="b-src" style="display:none"></span>
    </div>
  </div>
  <label class="hbtn" for="audio-in">🎵 音声</label>
  <input type="file" id="audio-in" accept="audio/*">
  <label class="hbtn" for="json-in">📄 JSON/CSV</label>
  <input type="file" id="json-in" accept=".json,.csv,.txt">
  <button class="hbtn primary" id="api-btn">⚡ API解析</button>
  <button class="hbtn primary" id="play-btn" disabled>▶ PLAY</button>
</header>

<!-- MAIN -->
<div class="main">

  <!-- 左 -->
  <div class="left">

    <!-- NOW PLAYING -->
    <div class="now-bar">
      <div class="now-chord-wrap">
        <div class="now-label">NOW</div>
        <div class="now-chord-text" id="now-text">—</div>
      </div>
      <div class="next-chord-wrap">
        <div class="next-label">NEXT</div>
        <div class="next-chord-text" id="next-text">—</div>
      </div>
      <div class="transport">
        <div class="prog-row">
          <span class="t" id="t-cur">0:00</span>
          <div class="prog-track" id="prog-track">
            <div class="prog-fill" id="prog-fill"></div>
          </div>
          <span class="t r" id="t-tot">0:00</span>
        </div>
        <div class="vol-row">
          <span class="vol-icon">🔈</span>
          <input type="range" class="vol" id="vol" min="0" max="1" step="0.01" value="0.85">
          <span class="vol-pct" id="vol-pct">85%</span>
        </div>
      </div>
    </div>

    <!-- CTRL BAR -->
    <div class="ctrl-bar">
      <span style="font-size:9px;color:#9aa5b4;letter-spacing:1px;">VIEW</span>
      <div class="view-toggle">
        <button class="vbtn active" id="vbtn-measure" onclick="setView('measure')">小節</button>
        <button class="vbtn" id="vbtn-simple" onclick="setView('simple')">リスト</button>
      </div>
      <div class="sep"></div>
      <span style="font-size:9px;color:#9aa5b4;letter-spacing:1px;">拍/小節</span>
      <select id="bpm-select" style="background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:#fff;padding:3px 6px;font-size:10px;border-radius:4px;cursor:pointer;font-family:'JetBrains Mono',monospace;">
        <option value="3">3拍</option>
        <option value="4" selected>4拍</option>
        <option value="6">6拍</option>
      </select>
    </div>

    <!-- ドロップゾーン -->
    <div class="drop-zone" id="drop-zone">
      <div class="drop-icon">🎸</div>
      <div class="drop-title">ChordPlayer v3</div>
      <div class="drop-steps">
        <div class="drop-step"><span class="sn">01</span>「音声」ボタンで mp3/wav 等を選択</div>
        <div class="drop-step"><span class="sn">02A</span>「JSON/CSV」で Chordino CSV または JSON を読込</div>
        <div class="drop-step"><span class="sn">02B</span>「⚡ API解析」で ChordMini API による高精度解析</div>
        <div class="drop-step"><span class="sn">03</span>PLAY して演奏！</div>
      </div>
    </div>

    <!-- コード譜エリア -->
    <div class="chord-area hidden" id="chord-area">
      <!-- 小節ビュー -->
      <div class="measure-scroll" id="measure-view">
        <div class="measure-grid" id="measure-grid"></div>
      </div>
      <!-- シンプルリスト -->
      <div class="simple-scroll hidden" id="simple-view">
        <div class="simple-grid" id="simple-grid"></div>
      </div>
    </div>

  </div>

  <!-- 右パネル -->
  <div class="right">

    <!-- ダイアグラム向き -->
    <div class="rpanel">
      <div class="rtitle">ダイアグラム向き</div>
      <div class="orient-select">
        <button class="obtn active" onclick="setOrient('std')"    id="o-std">6弦↑<br><small>標準</small></button>
        <button class="obtn"        onclick="setOrient('rev')"    id="o-rev">1弦↑<br><small>逆順</small></button>
        <button class="obtn"        onclick="setOrient('rot90')"  id="o-rot90">6弦左→<br><small>90°回転</small></button>
        <button class="obtn"        onclick="setOrient('rot90r')" id="o-rot90r">1弦左→<br><small>90°逆回転</small></button>
      </div>
    </div>

    <!-- カポ -->
    <div class="rpanel">
      <div class="rtitle">カポ</div>
      <div class="capo-grid" id="capo-grid"></div>
      <div class="capo-info" id="capo-info">カポなし</div>
    </div>

    <!-- ダイアグラム -->
    <div class="rpanel">
      <div class="rtitle">コードフォーム</div>
      <div class="diag-header">
        <div class="diag-name" id="diag-name">—</div>
        <div class="diag-sub"  id="diag-sub"></div>
      </div>
      <div class="diag-wrap" id="diag-wrap">
        <canvas id="diag" width="200" height="180"></canvas>
      </div>
    </div>

    <!-- 曲情報 -->
    <div class="rpanel">
      <div class="rtitle">曲情報</div>
      <div class="irow"><span class="lbl">キー</span><span class="val" id="i-key">—</span></div>
      <div class="irow"><span class="lbl">テンポ</span><span class="val" id="i-bpm">—</span></div>
      <div class="irow"><span class="lbl">コード数</span><span class="val" id="i-chords">—</span></div>
      <div class="irow"><span class="lbl">小節数</span><span class="val" id="i-measures">—</span></div>
      <div class="irow"><span class="lbl">長さ</span><span class="val" id="i-dur">—</span></div>
      <div class="irow"><span class="lbl">モデル</span><span class="val" id="i-model">—</span></div>
    </div>

  </div>
</div>

<audio id="aud"></audio>

<script>
/* ══════════════════════════════════════
   定数・状態
══════════════════════════════════════ */
const API_BASE = 'https://chordmini-backend-191567167632.us-central1.run.app';
const NOTES    = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTES_F  = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];

let data        = null;   // 内部データ
let measures    = [];     // 小節配列
let capoFret    = 0;
let orient      = 'std';  // std | rev | rot90 | rot90r
let curIdx      = -1;     // 現在のコードインデックス
let curMeasure  = -1;
let viewMode    = 'measure';
let beatsPerMeasure = 4;
let rafId       = null;
let audioReady  = false;

const aud = document.getElementById('aud');
aud.volume = 0.85;

/* ══════════════════════════════════════
   コード変換ユーティリティ
══════════════════════════════════════ */
function noteIdx(n) {
  let i = NOTES.indexOf(n); return i >= 0 ? i : NOTES_F.indexOf(n);
}
function applyCapo(chord, capo) {
  if (!chord || chord === 'N' || capo === 0) return chord;
  const slash = chord.includes('/');
  const parts = slash ? chord.split('/') : [chord];
  return parts.map(p => {
    let root = '', qual = '';
    if (p.length >= 2 && (p[1]==='#'||p[1]==='b')) { root=p.slice(0,2); qual=p.slice(2); }
    else { root=p[0]; qual=p.slice(1); }
    const idx = noteIdx(root);
    if (idx < 0) return p;
    return NOTES[((idx - capo) % 12 + 12) % 12] + qual;
  }).join('/');
}

/* ══════════════════════════════════════
   データ変換: CSV (Chordino) → 内部形式
══════════════════════════════════════ */
function parseChordinoCsv(text, filename) {
  const lines = text.replace(/\r/g,'').split('\n').filter(l=>l.trim());
  const chords=[], times=[];
  let prev = null;
  for (const line of lines) {
    const parts = line.split(',');
    if (parts.length < 2) continue;
    const t  = parseFloat(parts[0].trim());
    const ch = parts[1].trim() || 'N';
    if (isNaN(t)) continue;
    if (ch !== prev) { times.push(parseFloat(t.toFixed(3))); chords.push(ch); prev=ch; }
  }
  const duration = times.length ? times[times.length-1] + 2 : 0;
  return {
    file: filename, duration, tempo: 0, key: estimateKey(chords),
    chords, times, model:'Chordino+NNLS Chroma', source:'CSV'
  };
}

/* ══════════════════════════════════════
   データ変換: ChordMini API → 内部形式
══════════════════════════════════════ */
const QUAL_MAP = {
  maj:'',min:'m',maj7:'maj7',min7:'m7',dom7:'7','7':'7',
  dim:'dim',aug:'aug',sus2:'sus2',sus4:'sus4',hdim7:'m7b5',
  maj9:'maj9',min9:'m9',add9:'add9',
};
function normalizeApiChord(raw) {
  if (!raw || raw==='N'||raw==='X') return 'N';
  if (raw.includes(':')) {
    const [root,qual] = raw.split(':');
    return root + (QUAL_MAP[qual] ?? qual);
  }
  return raw;
}
function convertApiResponse(cr, br, filename) {
  const raw = cr.chords || [];
  const chords=[], times=[];
  let prev = null;
  for (const item of raw) {
    const ch = normalizeApiChord(item.chord||item.label||'');
    const t  = parseFloat((item.time??item.start??0).toFixed(3));
    if (ch !== prev) { chords.push(ch); times.push(t); prev=ch; }
  }
  return {
    file: filename, duration: parseFloat((cr.duration||0).toFixed(2)),
    tempo: br ? parseFloat((br.bpm||0).toFixed(1)) : 0,
    key: cr.key||estimateKey(chords), chords, times,
    model:'chord-cnn-lstm', source:'ChordMini API'
  };
}

/* ══════════════════════════════════════
   JSON 自動判別
══════════════════════════════════════ */
function normalizeJson(raw, filename) {
  // 内部形式（chordsが文字列配列）
  if (Array.isArray(raw.chords) && typeof raw.chords[0]==='string')
    return { source:'JSON', model: raw.model||'—', ...raw };

  // ChordMini ブラウザ取得形式（chord_dict フィールドあり、start/end形式）
  // { chord_dict, chords:[{chord,start,end,confidence}], duration, model_name, ... }
  if (raw.chord_dict !== undefined && Array.isArray(raw.chords)) {
    const chords=[], times=[];
    let prev = null;
    for (const item of raw.chords) {
      const ch = normalizeApiChord(item.chord||'');
      const t  = parseFloat((item.start??0).toFixed(3));
      if (ch !== prev) { chords.push(ch); times.push(t); prev=ch; }
    }
    return {
      file: filename,
      duration: parseFloat((raw.duration||0).toFixed(2)),
      tempo: 0,
      key: raw.key || estimateKey(chords),
      chords, times,
      model: raw.model_name || raw.detector_selected || 'Chord-CNN-LSTM',
      source: 'ChordMini (ブラウザ取得)',
    };
  }

  // ChordMini API形式（chordsがオブジェクト配列、time形式）
  if (Array.isArray(raw.chords) && raw.chords[0]?.chord !== undefined)
    return convertApiResponse(raw, null, filename);

  return raw;
}

/* ══════════════════════════════════════
   小節集約
══════════════════════════════════════ */
function buildMeasures(d, bpm) {
  if (!d || !d.chords.length) return [];
  const dur = d.duration;
  if (!dur) return [];

  // テンポが不明な場合は時間から推定
  // 各コードが何拍かを「次のコードまでの時間」から計算
  const secPerBeat = d.tempo > 0 ? 60 / d.tempo : null;
  const secPerMeasure = secPerBeat ? secPerBeat * bpm : null;

  const ms = [];
  if (secPerMeasure) {
    const total = Math.ceil(dur / secPerMeasure);
    for (let m = 0; m < total; m++) {
      const mStart = m * secPerMeasure;
      const mEnd   = mStart + secPerMeasure;
      // この小節に最も多く存在するコードを選ぶ
      const chord = chordAtTime(d, mStart + secPerMeasure * 0.1);
      ms.push({ idx: m+1, time: mStart, chord, end: mEnd });
    }
  } else {
    // テンポ不明：コード変化点を小節扱い
    d.chords.forEach((ch,i) => {
      ms.push({ idx: i+1, time: d.times[i], chord: ch,
                end: d.times[i+1] ?? dur });
    });
  }
  return ms;
}

function chordAtTime(d, t) {
  let c = d.chords[0];
  for (let i = 0; i < d.times.length; i++) {
    if (d.times[i] <= t) c = d.chords[i]; else break;
  }
  return c;
}

function estimateKey(chords) {
  const freq = {};
  chords.filter(c=>c!=='N').forEach(c => {
    const r = c.split('/')[0].match(/^[A-G][b#]?/);
    if (r) freq[r[0]] = (freq[r[0]]||0)+1;
  });
  const top = Object.entries(freq).sort((a,b)=>b[1]-a[1])[0];
  return top ? top[0] + ' major' : '';
}

/* ══════════════════════════════════════
   データ読込・UI更新
══════════════════════════════════════ */
function loadData(d) {
  data = d;
  measures = buildMeasures(d, beatsPerMeasure);

  // ヘッダー
  document.getElementById('song-title').textContent = d.file?.split(/[/\\]/).pop()||'';
  const bk=document.getElementById('b-key'),
        bb=document.getElementById('b-bpm'),
        bs=document.getElementById('b-src');
  if (d.key)   { bk.textContent=d.key;           bk.style.display=''; }
  if (d.tempo) { bb.textContent=d.tempo+' BPM';  bb.style.display=''; }
  if (d.source){ bs.textContent=d.source;         bs.style.display=''; }

  // 情報パネル
  document.getElementById('i-key').textContent     = d.key||'—';
  document.getElementById('i-bpm').textContent     = d.tempo ? d.tempo+' BPM':'—';
  document.getElementById('i-chords').textContent  = d.chords.length;
  document.getElementById('i-measures').textContent= measures.length;
  document.getElementById('i-dur').textContent     = fmtTime(d.duration||0);
  document.getElementById('i-model').textContent   = d.model||'—';
  document.getElementById('t-tot').textContent     = fmtTime(d.duration||0);

  document.getElementById('drop-zone').classList.add('hidden');
  document.getElementById('chord-area').classList.remove('hidden');
  document.getElementById('play-btn').disabled = !audioReady;

  renderAll();
  curIdx = -1; curMeasure = -1;
}

function renderAll() {
  renderMeasures();
  renderSimple();
}

/* ── 小節ビュー ── */
function renderMeasures() {
  const grid = document.getElementById('measure-grid');
  grid.innerHTML = '';
  if (!data) return;

  // 4小節ずつ横に並べる
  const cols = 4;
  for (let i = 0; i < measures.length; i += cols) {
    const row = document.createElement('div');
    row.className = 'measure-row';
    row.style.gridTemplateColumns = `repeat(${cols},1fr)`;
    for (let j = i; j < Math.min(i+cols, measures.length); j++) {
      const m = measures[j];
      const ch = capoFret > 0 ? applyCapo(m.chord, capoFret) : m.chord;
      const nextM = measures[j+1];
      const nextCh = nextM ? (capoFret > 0 ? applyCapo(nextM.chord,capoFret) : nextM.chord) : '';
      const cell = document.createElement('div');
      cell.className = 'measure-cell' + (m.chord==='N'?' empty':'');
      cell.dataset.midx = j;
      cell.innerHTML = `
        <div class="measure-num">${m.idx}</div>
        <div class="measure-chord${ch&&ch.includes('/')||ch&&ch.length>5?' slash':''}">${ch==='N'?'—':ch}</div>
        ${nextCh && nextCh!==ch && nextCh!=='N' ? `<div class="measure-next-hint">→${nextCh}</div>` : ''}
      `;
      cell.addEventListener('click', () => { if(aud.src) aud.currentTime = m.time; });
      row.appendChild(cell);
    }
    // 空きセル埋め
    const rem = measures.length % cols;
    if (i + cols >= measures.length && rem > 0) {
      for (let k = rem; k < cols; k++) {
        const empty = document.createElement('div');
        empty.className = 'measure-cell empty';
        row.appendChild(empty);
      }
    }
    grid.appendChild(row);
  }
}

/* ── シンプルビュー ── */
function renderSimple() {
  const grid = document.getElementById('simple-grid');
  grid.innerHTML = '';
  if (!data) return;
  data.chords.forEach((ch, i) => {
    const disp = capoFret > 0 ? applyCapo(ch, capoFret) : ch;
    const div = document.createElement('div');
    div.className = 'sc' + (ch==='N'?' chord-n':'');
    div.dataset.i = i;
    div.innerHTML = `<div class="cn${disp&&disp.includes('/')||disp&&disp.length>5?' slash':''}">${disp==='N'?'—':disp}</div><div class="ct">${fmtTime(data.times[i])}</div>`;
    div.addEventListener('click', () => { if(aud.src) aud.currentTime = data.times[i]; });
    grid.appendChild(div);
  });
}

/* ══════════════════════════════════════
   ビュー切替
══════════════════════════════════════ */
function setView(mode) {

  document.getElementById('measure-view').classList.toggle('hidden', mode!=='measure');

document.getElementById('bpm-select').addEventListener('change', e => {

/* ══════════════════════════════════════
   カポUI
══════════════════════════════════════ */
const capoGrid = document.getElementById('capo-grid');
for (let i = 0; i <= 7; i++) {

/* ══════════════════════════════════════
   ダイアグラム向き
══════════════════════════════════════ */
function setOrient(o) {

  ['std','rev','rot90','rot90r'].forEach(x => {

  });

/* ══════════════════════════════════════
   ギターダイアグラム
══════════════════════════════════════ */
const SHAPES = {
  // メジャー・マイナー
  C:[[-1,3,2,0,1,0],0], Cm:[[-1,3,5,5,4,3],3],
  D:[[-1,-1,0,2,3,2],0], Dm:[[-1,-1,0,2,3,1],0],
  E:[[0,2,2,1,0,0],0], Em:[[0,2,2,0,0,0],0],
  F:[[1,3,3,2,1,1],1], Fm:[[1,3,3,1,1,1],1],
  G:[[3,2,0,0,0,3],0], Gm:[[3,5,5,3,3,3],3],
  A:[[-1,0,2,2,2,0],0], Am:[[-1,0,2,2,1,0],0],
  B:[[-1,2,4,4,4,2],2], Bm:[[-1,2,4,4,3,2],2],
  // 7th
  C7:[[-1,3,2,3,1,0],0], Cm7:[[-1,3,5,3,4,3],3],
  D7:[[-1,-1,0,2,1,2],0], Dm7:[[-1,-1,0,2,1,1],0],
  E7:[[0,2,0,1,0,0],0], Em7:[[0,2,2,0,3,0],0],
  F7:[[1,3,1,2,1,1],1], Fm7:[[1,3,1,1,1,1],1],
  'F#7':[[2,4,2,3,2,2],2],'F#m7':[[2,4,4,2,2,2],2],
  G7:[[3,2,0,0,0,1],0], Gm7:[[3,5,3,3,3,3],3],
  A7:[[-1,0,2,0,2,0],0], Am7:[[-1,0,2,0,1,0],0],
  B7:[[-1,2,1,2,0,2],0], Bm7:[[-1,2,0,2,3,2],0],
  // maj7
  Cmaj7:[[-1,3,2,0,0,0],0], Dmaj7:[[-1,-1,0,2,2,2],0],
  Emaj7:[[0,2,1,1,0,0],0], Fmaj7:[[1,3,3,2,1,0],0],
  Gmaj7:[[3,2,0,0,0,2],0], Amaj7:[[-1,0,2,1,2,0],0],
  Bmaj7:[[-1,2,4,3,4,2],2],'C#maj7':[[-1,4,3,1,1,1],1],
  // 6th
  A6:[[-1,0,2,2,2,2],0], D6:[[-1,-1,0,2,0,2],0],
  E6:[[0,2,2,1,2,0],0], C6:[[-1,3,2,2,1,0],0],
  G6:[[3,2,0,0,0,0],0], Bb6:[[-1,1,3,3,3,3],1],
  // シャープ/フラット
  'C#':[[-1,4,3,1,2,1],0],'C#m':[[-1,4,6,6,5,4],4],
  Db:[[-1,4,3,1,2,1],0], Dbm:[[-1,4,6,6,5,4],4],
  'D#':[[-1,6,5,3,4,3],0],'D#m':[[-1,6,8,8,7,6],6],
  Eb:[[-1,6,5,3,4,3],0], Ebm:[[-1,6,8,8,7,6],6],
  'F#':[[2,4,4,3,2,2],2],'F#m':[[2,4,4,2,2,2],2],
  Gb:[[2,4,4,3,2,2],2],  Gbm:[[2,4,4,2,2,2],2],
  'G#':[[4,6,6,5,4,4],4],'G#m':[[4,6,6,4,4,4],4],
  Ab:[[4,6,6,5,4,4],4],  Abm:[[4,6,6,4,4,4],4],
  'A#':[[-1,1,3,3,3,1],1],'A#m':[[-1,1,3,3,2,1],1],
  Bb:[[-1,1,3,3,3,1],1], Bbm:[[-1,1,3,3,2,1],1],
  // sus
  Csus4:[[-1,3,3,0,1,1],0], Dsus4:[[-1,-1,0,2,3,3],0],
  Esus4:[[0,2,2,2,0,0],0],  Gsus4:[[3,3,0,0,1,3],0],
  Asus4:[[-1,0,2,2,3,0],0],
  // dim/aug
  Adim:[[-1,0,1,2,1,-1],0], Bdim:[[-1,2,3,4,3,-1],0],
  Caug:[[-1,3,2,1,1,0],0],  Eaug:[[0,3,2,1,1,0],0],
  // スラッシュコード
  'F#/C#':[[2,4,4,3,2,2],2],'A7/C#':[[-1,4,2,0,2,0],0],
  'G/D':[[3,5,0,0,0,3],0],  'G/B':[[-1,2,0,0,0,3],0],
  'D/F#':[[-1,-1,4,2,3,2],0],'C/E':[[0,3,2,0,1,0],0],
  'E/G#':[[4,2,2,1,0,0],0], 'Am/E':[[0,0,2,2,1,0],0],
};

let lastDiagChord = '';
function redrawDiagram() { drawDiagram(document.getElementById('diag'), lastDiagChord); }

function drawDiagram(canvas, chordName) {
  lastDiagChord = chordName;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);

  // スラッシュコード対応
  let lookup = chordName;
  let bassNote = '';
  if (chordName && chordName.includes('/')) {
    const p = chordName.split('/');
    bassNote = p[1];
    if (!SHAPES[chordName]) lookup = p[0];
  }

  const shape = SHAPES[lookup];
  if (!shape || !chordName || chordName==='N') {
    ctx.fillStyle = '#94a3b8';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('ダイアグラムなし', W/2, H/2);
    return;
  }

  let [frets, baseFret] = shape;
  frets = [...frets];

  if (orient==='std'||orient==='rot90') {
    // 標準（6弦=左）
  } else {
    frets = [...frets].reverse(); // 1弦=左
  }

  const isRotated = orient==='rot90'||orient==='rot90r';

  if (!isRotated) {
    drawVertical(ctx, W, H, frets, baseFret);
  } else {
    drawHorizontal(ctx, W, H, frets, baseFret, orient==='rot90r');
  }
}

/* 縦向きダイアグラム */
function drawVertical(ctx, W, H, frets, baseFret) {
  const nStr=6, nFret=5;
  const pL=28, pR=14, pT=34, pB=14;
  const sW=(W-pL-pR)/(nStr-1);
  const fH=(H-pT-pB)/nFret;
  const sx=s=>pL+s*sW;
  const fy=f=>pT+f*fH;

  // ナット or フレット番号
  if (baseFret===0) {
    ctx.fillStyle='#1e2640'; ctx.fillRect(pL,pT-4,W-pL-pR,4);
  } else {
    ctx.fillStyle='#94a3b8'; ctx.font='bold 9px JetBrains Mono,monospace';
    ctx.textAlign='left'; ctx.fillText(baseFret+'fr',2,pT+fH*.6);
  }

  // フレット線
  for (let f=1; f<=nFret; f++) {
    ctx.strokeStyle='#c8d0e0'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pL,fy(f)); ctx.lineTo(W-pR,fy(f)); ctx.stroke();
  }

  // 弦
  for (let s=0; s<nStr; s++) {
    const thick = s===0 ? 2.5 : s===1 ? 2 : s<=3 ? 1.5 : 1;
    ctx.strokeStyle='#8090a8'; ctx.lineWidth=thick;
    ctx.beginPath(); ctx.moveTo(sx(s),pT); ctx.lineTo(sx(s),pT+nFret*fH); ctx.stroke();
  }

  // 弦番号
  ctx.fillStyle='#94a3b8'; ctx.font='8px sans-serif'; ctx.textAlign='center';
  for (let s=0;s<nStr;s++) ctx.fillText(6-s, sx(s), pT-18);

  // 記号
  frets.forEach((fret,i) => {
    const x=sx(i);
    if (fret===-1) { // ミュート
      ctx.strokeStyle='#cbd5e0'; ctx.lineWidth=1.5;
      const d=4;
      ctx.beginPath();
      ctx.moveTo(x-d,pT-14); ctx.lineTo(x+d,pT-6);
      ctx.moveTo(x+d,pT-14); ctx.lineTo(x-d,pT-6);
      ctx.stroke();
    } else if (fret===0) { // 開放
      ctx.strokeStyle='#4a5568'; ctx.lineWidth=1.8;
      ctx.beginPath(); ctx.arc(x,pT-10,5,0,Math.PI*2); ctx.stroke();
    } else {
      const af=fret-baseFret;
      if (af>=1&&af<=nFret) {
        const y=fy(af-1)+fH/2;
        ctx.fillStyle='#2563eb';
        ctx.beginPath(); ctx.arc(x,y,fH*.29,0,Math.PI*2); ctx.fill();
        // フレット番号
        ctx.fillStyle='#fff'; ctx.font='bold 9px sans-serif'; ctx.textAlign='center';
        ctx.fillText(fret, x, y+3.5);
      }
    }
  });

  // セーハ
  drawBarre(ctx, frets, baseFret, nFret, sx, fy, fH, false);
}

/* 横向きダイアグラム */
function drawHorizontal(ctx, W, H, frets, baseFret, flipped) {
  const nStr=6, nFret=5;
  const pL=32, pR=10, pT=12, pB=12;
  const fW=(W-pL-pR)/nFret;
  const sH=(H-pT-pB)/(nStr-1);
  const fx=f=>pL+f*fW;
  const sy=s=>pT+s*sH;

  // ナット
  if (baseFret===0) {
    ctx.fillStyle='#1e2640'; ctx.fillRect(pL-4,pT,4,H-pT-pB);
  } else {
    ctx.fillStyle='#94a3b8'; ctx.font='bold 9px JetBrains Mono,monospace';
    ctx.textAlign='right'; ctx.fillText(baseFret+'fr',pL-6,(pT+H-pB)/2+4);
  }

  // フレット線（縦）
  for (let f=1; f<=nFret; f++) {
    ctx.strokeStyle='#c8d0e0'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(fx(f),pT); ctx.lineTo(fx(f),H-pB); ctx.stroke();
  }

  // 弦（横）
  for (let s=0; s<nStr; s++) {
    const thick = s===0 ? 2.5 : s===1 ? 2 : s<=3 ? 1.5 : 1;
    ctx.strokeStyle='#8090a8'; ctx.lineWidth=thick;
    ctx.beginPath(); ctx.moveTo(pL,sy(s)); ctx.lineTo(W-pR,sy(s)); ctx.stroke();
  }

  // 弦番号（左）
  ctx.fillStyle='#94a3b8'; ctx.font='8px sans-serif'; ctx.textAlign='right';
  for (let s=0;s<nStr;s++) ctx.fillText(flipped?s+1:6-s, pL-8, sy(s)+3);

  // 記号
  frets.forEach((fret,i) => {
    const y=sy(i);
    if (fret===-1) {
      ctx.strokeStyle='#cbd5e0'; ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(pL-14,y-4); ctx.lineTo(pL-6,y+4);
      ctx.moveTo(pL-6,y-4);  ctx.lineTo(pL-14,y+4);
      ctx.stroke();
    } else if (fret===0) {
      ctx.strokeStyle='#4a5568'; ctx.lineWidth=1.8;
      ctx.beginPath(); ctx.arc(pL-10,y,4.5,0,Math.PI*2); ctx.stroke();
    } else {
      const af=fret-baseFret;
      if (af>=1&&af<=nFret) {
        const x=fx(af-1)+fW/2;
        ctx.fillStyle='#2563eb';
        ctx.beginPath(); ctx.arc(x,y,sH*.28,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#fff'; ctx.font='bold 8px sans-serif'; ctx.textAlign='center';
        ctx.fillText(fret,x,y+3);
      }
    }
  });
}

function drawBarre(ctx, frets, baseFret, nFret, sx, fy, fH, horiz) {
  const minF = Math.min(...frets.filter(f=>f>0));
  const barCount = frets.filter(f=>f===minF).length;
  if (barCount < 4 || minF !== baseFret+1) return;
  const positions = frets.map((f,i)=>f===minF?i:-1).filter(i=>i>=0);
  const af = minF-baseFret;
  const y = fy(af-1)+fH/2;
  const x1=sx(positions[0]), x2=sx(positions[positions.length-1]);
  ctx.fillStyle='#2563eb';
  const r = fH*.29;
  ctx.beginPath();
  ctx.fillRect(Math.min(x1,x2), y-r, Math.abs(x2-x1), r*2);
  ctx.fill();
}

/* ══════════════════════════════════════
   音声ファイル読込
══════════════════════════════════════ */
document.getElementById('audio-in').addEventListener('change', e => {
  const f = e.target.files[0]; if(!f) return;
  aud.src = URL.createObjectURL(f);
  audioReady = true;
  if (data) document.getElementById('play-btn').disabled = false;
  document.getElementById('song-title').textContent = f.name;
});

/* ══════════════════════════════════════
   JSON/CSV読込
══════════════════════════════════════ */
document.getElementById('json-in').addEventListener('change', e => {
  const f = e.target.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const text = ev.target.result;
    try {
      if (f.name.endsWith('.json')) {
        loadData(normalizeJson(JSON.parse(text), f.name));
      } else {
        // CSV (Chordino)
        loadData(parseChordinoCsv(text, f.name));
      }
    } catch(err) { alert('読み込みエラー: '+err.message); }
  };
  reader.readAsText(f);
});

/* ══════════════════════════════════════
   API解析
══════════════════════════════════════ */
document.getElementById('api-btn').addEventListener('click', async () => {
  const fi = document.getElementById('audio-in').files[0];
  if (!fi) { alert('先に音声ファイルを選択してください'); return; }
  showLoading('ChordMini API 送信中...','chord-cnn-lstm モデル');
  try {
    const fd = new FormData();
    fd.append('file', fi); fd.append('model','chord-cnn-lstm');
    setLMsg('コード解析中...');
    const cr = await (await fetch(`${API_BASE}/api/recognize-chords`,{method:'POST',body:fd})).json();
    let br = null;
    try {
      setLMsg('ビート検出中...');
      const fd2=new FormData(); fd2.append('file',fi); fd2.append('model','madmom');
      br = await (await fetch(`${API_BASE}/api/detect-beats`,{method:'POST',body:fd2})).json();
    } catch{}
    const d = convertApiResponse(cr, br, fi.name);
    loadData(d);
    // JSONを自動保存
    const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download=fi.name.replace(/\.[^.]+$/,'')+'_chords.json'; a.click();
  } catch(err) {
    alert('APIエラー:\n'+err.message);
  } finally { hideLoading(); }
});

/* ══════════════════════════════════════
   再生コントロール
══════════════════════════════════════ */
document.getElementById('play-btn').addEventListener('click', () => {
  if (aud.paused) {
    aud.play();
    document.getElementById('play-btn').textContent='⏸ PAUSE';
    startRaf();
  } else {
    aud.pause();
    document.getElementById('play-btn').textContent='▶ PLAY';
    cancelAnimationFrame(rafId);
  }
});
aud.addEventListener('ended',()=>{
  document.getElementById('play-btn').textContent='▶ PLAY';
  cancelAnimationFrame(rafId);
});

document.getElementById('prog-track').addEventListener('click', e=>{
  if (!data) return;
  const r=e.currentTarget.getBoundingClientRect();
  aud.currentTime=((e.clientX-r.left)/r.width)*(data.duration||0);
});

const volSlider=document.getElementById('vol');
volSlider.addEventListener('input',()=>{
  aud.volume=parseFloat(volSlider.value);
  document.getElementById('vol-pct').textContent=Math.round(aud.volume*100)+'%';
});

/* ══════════════════════════════════════
   アニメーションループ
══════════════════════════════════════ */
function startRaf(){
  function loop(){ if(!aud.paused){ updateDisplay(false); rafId=requestAnimationFrame(loop); } }
  loop();
}

function updateDisplay(force) {
  if (!data) return;
  const t=aud.currentTime, dur=data.duration||1;
  document.getElementById('prog-fill').style.width=(t/dur*100)+'%';
  document.getElementById('t-cur').textContent=fmtTime(t);

  // 現在コードインデックス
  let idx=0;
  for (let i=0;i<data.times.length;i++){
    if (data.times[i]<=t) idx=i; else break;
  }
  // 現在小節
  let midx=0;
  for (let i=0;i<measures.length;i++){
    if (measures[i].time<=t) midx=i; else break;
  }

  if (idx===curIdx && midx===curMeasure && !force) return;
  curIdx=idx; curMeasure=midx;

  const ch=data.chords[idx];
  const nch=data.chords[idx+1];
  const disp=applyCapo(ch,capoFret);
  const ndisp=nch?applyCapo(nch,capoFret):'—';

  // NOW / NEXT
  const nowEl=document.getElementById('now-text');
  nowEl.textContent=disp==='N'?'—':disp;
  nowEl.classList.remove('pop'); void nowEl.offsetWidth; nowEl.classList.add('pop');
  document.getElementById('next-text').textContent=ndisp==='N'?'—':ndisp;

  // ダイアグラム
  const diagName=disp==='N'?'':disp;
  document.getElementById('diag-name').textContent=diagName||'—';
  document.getElementById('diag-sub').textContent=
    ch&&ch.includes('/')?'ベース音:'+ch.split('/')[1]:
    capoFret>0?`カポ${capoFret}→実音:${ch}`:'';
  drawDiagram(document.getElementById('diag'), diagName);

  // グリッドハイライト
  if (viewMode==='measure') {
    document.querySelectorAll('.measure-cell').forEach((el,i)=>{
      el.classList.remove('active','next-up');
      el.querySelector('.measure-chord')?.classList.remove('active-c','next-c');
      if (i===midx){
        el.classList.add('active');
        el.querySelector('.measure-chord')?.classList.add('active-c');
        el.scrollIntoView({behavior:'smooth',block:'nearest'});
      }
      if (i===midx+1){
        el.classList.add('next-up');
        el.querySelector('.measure-chord')?.classList.add('next-c');
      }
    });
  } else {
    document.querySelectorAll('.sc').forEach((el,i)=>{
      el.classList.remove('active','nxt');
      if (i===idx){ el.classList.add('active'); el.scrollIntoView({behavior:'smooth',block:'nearest'}); }
      if (i===idx+1) el.classList.add('nxt');
    });
  }
}

/* ══════════════════════════════════════
   ドラッグ＆ドロップ
══════════════════════════════════════ */
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{
  e.preventDefault();
  const files=Array.from(e.dataTransfer.files);
  const jf=files.find(f=>f.name.endsWith('.json')||f.name.endsWith('.csv')||f.name.endsWith('.txt'));
  const af=files.find(f=>f.type.startsWith('audio/'));
  if (jf) {
    const r=new FileReader();
    r.onload=ev=>{
      try {
        if (jf.name.endsWith('.json')) loadData(normalizeJson(JSON.parse(ev.target.result),jf.name));
        else loadData(parseChordinoCsv(ev.target.result,jf.name));
      } catch{}
    };
    r.readAsText(jf);
  }
  if (af) {
    aud.src=URL.createObjectURL(af);
    audioReady=true;
    if (data) document.getElementById('play-btn').disabled=false;
  }
});

/* ══════════════════════════════════════
   ユーティリティ
══════════════════════════════════════ */
function fmtTime(s){
  const m=Math.floor(s/60),sec=Math.floor(s%60).toString().padStart(2,'0');
  return `${m}:${sec}`;
}
function showLoading(msg,sub){
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('lmsg').textContent=msg||'';
  document.getElementById('lsub').textContent=sub||'';
}
function hideLoading(){ document.getElementById('loading').classList.add('hidden'); }
function setLMsg(msg){ document.getElementById('lmsg').textContent=msg; }

// 初期ダイアグラム
setOrient('std');
drawDiagram(document.getElementById('diag'),'');
</script>
