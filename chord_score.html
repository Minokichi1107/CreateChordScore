<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ChordScore Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════
   変数
════════════════════════════════════ */
:root{
  --bg:#f0f2f8;
  --bg2:#ffffff;
  --header:#1e2640;
  --border:#d4daea;
  --border2:#b8c4d8;
  --accent:#2563eb;
  --accent-lt:#eff6ff;
  --amber:#d97706;
  --amber-lt:#fffbeb;
  --green:#059669;
  --green-lt:#ecfdf5;
  --red:#dc2626;
  --text:#1e2640;
  --text2:#4a5568;
  --text3:#8a9ab8;
  --chord-col:#1d4ed8;
  --chord-bg:#dbeafe;
  --cell-h:72px;
  --radius:8px;
  --shadow:0 1px 6px rgba(0,0,0,.09);
  --shadow2:0 4px 20px rgba(0,0,0,.14);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);}
body{display:flex;flex-direction:column;overflow:hidden;}

/* ════════════════════════════════════
   ヘッダー
════════════════════════════════════ */
header{
  height:48px;flex-shrink:0;
  background:var(--header);
  display:flex;align-items:center;gap:8px;padding:0 12px;
  position:relative;z-index:40;
}
.logo{font-family:'Outfit',sans-serif;font-size:16px;font-weight:900;color:#fff;white-space:nowrap;letter-spacing:.5px;}
.logo em{color:#60a5fa;font-style:normal;}
.hfile{
  padding:3px 9px;font-size:10px;border-radius:4px;cursor:pointer;
  border:1px dashed rgba(255,255,255,.25);color:#9ca3af;
  font-family:'JetBrains Mono',monospace;transition:all .14s;
}
.hfile:hover{border-color:#60a5fa;color:#60a5fa;}
input[type=file]{display:none;}
.hdiv{width:1px;height:20px;background:rgba(255,255,255,.12);margin:0 2px;}
.hbtn{
  padding:4px 10px;font-size:10px;border-radius:4px;cursor:pointer;
  font-family:'JetBrains Mono',monospace;letter-spacing:.5px;
  border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#ccc;
  transition:all .14s;white-space:nowrap;
}
.hbtn:hover{background:rgba(255,255,255,.16);color:#fff;}
.hbtn.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}
.hbtn.amber{background:var(--amber);border-color:var(--amber);color:#fff;font-weight:700;}
.hbtn.green{background:var(--green);border-color:var(--green);color:#fff;font-weight:700;}
.hbtn:disabled{opacity:.3;pointer-events:none;}
.hmeta{flex:1;min-width:0;padding:0 4px;}
.hson{font-size:11px;color:#9ca3af;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hbadges{display:flex;gap:4px;margin-top:1px;}
.hbadge{font-size:9px;padding:1px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;}
.hbadge.k{background:rgba(96,165,250,.2);color:#93c5fd;}
.hbadge.b{background:rgba(251,191,36,.15);color:#fcd34d;}

/* ════════════════════════════════════
   トランスポート（共通）
════════════════════════════════════ */
.transport-bar{
  flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);
  padding:7px 14px;display:flex;align-items:center;gap:10px;
}
.now-box{
  background:var(--amber-lt);border:2px solid var(--amber);
  border-radius:6px;padding:3px 12px;
  display:flex;flex-direction:column;align-items:center;min-width:90px;flex-shrink:0;
}
.now-lbl{font-size:8px;color:#92400e;font-weight:700;letter-spacing:2px;}
.now-ch{font-size:34px;font-weight:700;color:#92400e;line-height:1.1;font-family:'JetBrains Mono',monospace;}
.now-ch.pop{animation:pop .15s ease;}
@keyframes pop{0%{transform:scale(1.2);opacity:.5}100%{transform:scale(1);opacity:1}}
.next-box{
  background:var(--accent-lt);border:1.5px solid #93c5fd;
  border-radius:6px;padding:3px 10px;
  display:flex;flex-direction:column;align-items:center;min-width:68px;flex-shrink:0;
}
.next-lbl{font-size:8px;color:#1d4ed8;font-weight:700;letter-spacing:2px;}
.next-ch{font-size:22px;font-weight:700;color:#1e40af;line-height:1.1;font-family:'JetBrains Mono',monospace;}
.tp{flex:1;display:flex;flex-direction:column;gap:5px;}
.pr-row{display:flex;align-items:center;gap:7px;}
.tdisp{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3);min-width:32px;}
.prog-track{flex:1;height:4px;background:var(--bg);border-radius:2px;cursor:pointer;}
.prog-fill{height:100%;width:0%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--amber));transition:width .07s linear;}
.vr{display:flex;align-items:center;gap:5px;}
.vi{font-size:10px;color:var(--text3);}
input[type=range].vs{
  -webkit-appearance:none;width:76px;height:3px;
  background:var(--bg);border-radius:2px;cursor:pointer;outline:none;
}
input[type=range].vs::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;background:var(--amber);border-radius:50%;}
.vpc{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--text3);min-width:26px;}

/* ════════════════════════════════════
   メインレイアウト（2ペイン）
════════════════════════════════════ */
.main{flex:1;display:flex;overflow:hidden;}

/* ════════════════════════════════════
   左：コードグリッドペイン
════════════════════════════════════ */
.grid-pane{
  flex:1;display:flex;flex-direction:column;overflow:hidden;
  border-right:1px solid var(--border);
}
.grid-toolbar{
  flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);
  padding:6px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.gtlbl{font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;}
select.gsel{
  background:var(--bg);border:1px solid var(--border2);color:var(--text);
  padding:3px 6px;font-size:10px;border-radius:4px;font-family:'JetBrains Mono',monospace;cursor:pointer;
}
.tbtn{
  padding:3px 9px;font-size:10px;border-radius:4px;cursor:pointer;
  border:1px solid var(--border2);background:var(--bg);color:var(--text2);
  font-family:'JetBrains Mono',monospace;transition:all .12s;white-space:nowrap;
}
.tbtn:hover{border-color:var(--accent);color:var(--accent);}
.tbtn.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}

/* グリッドスクロール */
.grid-scroll{
  flex:1;overflow-y:auto;padding:10px 12px 30px;
  scrollbar-width:thin;scrollbar-color:var(--border2) transparent;
}

/* ドロップゾーン */
.drop-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;height:100%;color:var(--text3);}
.drop-zone.hidden{display:none;}
.dicon{font-size:42px;opacity:.3;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.dtitle{font-size:14px;font-weight:700;color:var(--text2);}
.dsteps{font-size:11px;line-height:2.2;color:var(--text3);text-align:center;}

/* セクション */
.section-block{margin-bottom:14px;}
.section-header{
  display:flex;align-items:center;gap:6px;
  margin-bottom:5px;
}
.section-label{
  font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  padding:2px 8px;border-radius:3px;color:#fff;background:var(--accent);
  font-family:'JetBrains Mono',monospace;cursor:pointer;
}
.section-label.intro{background:#7c3aed;}
.section-label.verse{background:#0891b2;}
.section-label.chorus{background:#dc2626;}
.section-label.bridge{background:#059669;}
.section-label.outro{background:#6b7280;}
.section-time{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.section-del{
  font-size:9px;color:var(--text3);cursor:pointer;
  border:none;background:none;padding:1px 4px;
  transition:color .12s;
}
.section-del:hover{color:var(--red);}

/* コードグリッド行 */
.chord-row{
  display:grid;
  gap:4px;
  margin-bottom:4px;
}
/* セル */
.chord-cell{
  background:var(--bg2);border:1.5px solid var(--border);
  border-radius:var(--radius);
  height:var(--cell-h);
  padding:5px 7px;
  position:relative;
  cursor:pointer;
  transition:border-color .12s,box-shadow .12s,background .12s;
  overflow:hidden;
  display:flex;flex-direction:column;
  user-select:none;
}
.chord-cell:hover{border-color:var(--border2);box-shadow:var(--shadow);}
.chord-cell.active{
  background:var(--amber-lt);
  border-color:var(--amber);
  box-shadow:0 0 0 2px rgba(217,119,6,.25),var(--shadow);
}
.chord-cell.next-cell{background:var(--accent-lt);border-color:#93c5fd;}
/* ドロップ受付ハイライト */
.chord-cell.drag-over-cell{
  background:#f0fdf4;border-color:var(--green);
  box-shadow:0 0 0 2px rgba(5,150,105,.3);
}
.cell-num{font-size:8px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:2px;}
.cell-chord{
  font-size:18px;font-weight:700;color:var(--chord-col);
  font-family:'JetBrains Mono',monospace;line-height:1.1;
}
.cell-chord.slash{font-size:12px;}
.cell-lyric{
  font-size:10px;color:var(--text2);margin-top:3px;
  line-height:1.3;overflow:hidden;
  border-top:1px solid var(--border);padding-top:2px;
}
.cell-lyric.empty{color:var(--text3);font-style:italic;}
.cell-lyric-tag{
  display:inline-block;font-size:9px;
  background:var(--green-lt);color:var(--green);
  border-radius:2px;padding:0 3px;margin-right:2px;
  font-family:'JetBrains Mono',monospace;
}
/* 歌詞削除ボタン（編集モードのみ表示）*/
.cell-lyric-del{
  position:absolute;top:3px;right:3px;
  font-size:9px;color:var(--text3);cursor:pointer;
  display:none;border:none;background:none;
  transition:color .12s;
}
.edit-mode .chord-cell:hover .cell-lyric-del{display:block;}
.cell-lyric-del:hover{color:var(--red)!important;}

/* ════════════════════════════════════
   右：歌詞＋設定ペイン
════════════════════════════════════ */
.right-pane{
  width:270px;flex-shrink:0;background:var(--bg2);
  display:flex;flex-direction:column;overflow:hidden;
}
.rpanel{padding:11px 13px;border-bottom:1px solid var(--border);flex-shrink:0;}
.rtitle{font-size:9px;letter-spacing:3px;color:var(--text3);text-transform:uppercase;margin-bottom:8px;font-weight:700;}

/* 歌詞パネル */
.lyric-list{
  flex:1;overflow-y:auto;padding:8px 10px;
  scrollbar-width:thin;scrollbar-color:var(--border2) transparent;
  display:flex;flex-direction:column;gap:3px;
}
.lyric-item{
  padding:5px 8px;border-radius:5px;
  border:1.5px solid var(--border);background:var(--bg);
  cursor:grab;font-size:12px;color:var(--text);
  transition:all .12s;display:flex;align-items:center;gap:6px;
  line-height:1.4;
}
.lyric-item:hover{border-color:var(--accent);background:var(--accent-lt);}
.lyric-item.dragging{opacity:.4;}
.lyric-item.used{
  border-color:var(--green);background:var(--green-lt);
  color:var(--green);
}
.lyric-item .li-icon{font-size:10px;flex-shrink:0;}
.lyric-item .li-text{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lyric-item .li-clear{
  font-size:9px;color:var(--text3);cursor:pointer;
  border:none;background:none;flex-shrink:0;padding:1px 3px;
}
.lyric-item .li-clear:hover{color:var(--red);}

/* セクション追加 */
.sec-form{display:flex;flex-direction:column;gap:5px;}
.sec-row{display:flex;gap:5px;}
.sec-input{
  flex:1;padding:4px 6px;font-size:11px;
  border:1px solid var(--border2);border-radius:4px;
  font-family:'Noto Sans JP',sans-serif;outline:none;color:var(--text);
}
.sec-input:focus{border-color:var(--accent);}
.sec-add{
  padding:4px 10px;font-size:10px;border-radius:4px;
  background:var(--accent);border:none;color:#fff;cursor:pointer;
  font-weight:700;transition:background .12s;
}
.sec-add:hover{background:#1d4ed8;}
.sec-list{margin-top:6px;display:flex;flex-direction:column;gap:3px;}
.sec-tag{
  display:flex;align-items:center;gap:5px;
  padding:3px 6px;border-radius:4px;background:var(--bg);
  border:1px solid var(--border);font-size:10px;
}
.sec-tag-name{font-weight:700;color:var(--accent);}
.sec-tag-time{color:var(--text3);font-family:'JetBrains Mono',monospace;}
.sec-tag-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:10px;}
.sec-tag-del:hover{color:var(--red);}

/* 歌詞テキストエリア */
.lyric-ta{
  width:100%;height:100px;padding:7px;font-size:11px;
  border:1px solid var(--border2);border-radius:6px;
  font-family:'Noto Sans JP',sans-serif;resize:none;outline:none;
  color:var(--text);background:var(--bg);line-height:1.9;
}
.lyric-ta:focus{border-color:var(--accent);}
.lhint{font-size:9px;color:var(--text3);margin-top:3px;line-height:1.7;}

/* カポ・情報 */
.capo-row{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;margin-bottom:4px;}
.cbtn{
  background:var(--bg);border:1px solid var(--border);color:var(--text3);
  padding:4px 0;font-size:10px;cursor:pointer;border-radius:3px;text-align:center;
  font-family:'JetBrains Mono',monospace;transition:all .1s;
}
.cbtn:hover{border-color:var(--amber);color:var(--amber);}
.cbtn.on{background:var(--amber);border-color:var(--amber);color:#000;font-weight:700;}
.capo-info{font-size:10px;color:var(--text3);text-align:center;}
.capo-info b{color:var(--amber);}
.irow{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:10px;}
.irow:last-child{border:none;}
.irow .lb{color:var(--text3);}
.irow .vl{color:var(--amber);font-weight:700;font-family:'JetBrains Mono',monospace;}

/* ダイアグラム */
.dname{font-size:20px;font-weight:700;color:var(--text);font-family:'JetBrains Mono',monospace;}
.dsub{font-size:9px;color:var(--amber);}
.dwrap{background:var(--bg);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;padding:7px;}

/* ローディング */
.loading{position:fixed;inset:0;background:rgba(240,242,248,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:100;}
.loading.hidden{display:none;}
.sp{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.lm{font-size:13px;color:var(--text);}
.ls{font-size:10px;color:var(--text3);}

/* 演奏モード用 */
.play-score{display:none;flex:1;overflow-y:auto;padding:16px 20px 40px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}
.play-score.visible{display:block;}
.ps-section{margin-bottom:18px;}
.ps-sec-label{
  font-size:10px;font-weight:700;letter-spacing:2px;padding:2px 8px;
  border-radius:3px;color:#fff;background:var(--accent);
  font-family:'JetBrains Mono',monospace;margin-bottom:6px;display:inline-block;
}
.ps-row{
  display:flex;flex-wrap:wrap;align-items:flex-end;
  padding:6px 8px;border-radius:6px;border:1.5px solid transparent;
  margin-bottom:3px;cursor:pointer;transition:all .12s;
}
.ps-row:hover{background:var(--bg);}
.ps-row.active{background:var(--amber-lt);border-color:var(--amber);}
.ps-block{display:inline-flex;flex-direction:column;margin-right:1px;}
.ps-chord{
  font-size:12px;font-weight:700;color:var(--chord-col);
  font-family:'JetBrains Mono',monospace;min-height:16px;
  padding:0 2px;white-space:nowrap;
}
.ps-chord.slash{font-size:9px;}
.ps-chord.empty{visibility:hidden;}
.ps-lyric{font-size:15px;color:var(--text);line-height:1.65;padding:0 2px;white-space:pre;}
</style>
</head>
<body>

<div class="loading hidden" id="ld"><div class="sp"></div><div class="lm" id="lm">…</div><div class="ls" id="ls"></div></div>

<!-- HEADER -->
<header>
  <div class="logo">Chord<em>Score</em></div>
  <label class="hfile" for="f-audio">🎵 音声</label><input type="file" id="f-audio" accept="audio/*">
  <label class="hfile" for="f-json">📄 JSON/CSV</label><input type="file" id="f-json" accept=".json,.csv,.txt">
  <div class="hdiv"></div>
  <button class="hbtn" id="btn-edit" onclick="setMode('edit')">✏️ 編集</button>
  <button class="hbtn" id="btn-play" onclick="setMode('play')">🎸 演奏</button>
  <div class="hdiv"></div>
  <div class="hmeta"><div class="hson" id="h-title">未読込</div><div class="hbadges"><span class="hbadge k" id="h-key" style="display:none"></span><span class="hbadge b" id="h-bpm" style="display:none"></span></div></div>
  <button class="hbtn on" id="play-btn" disabled>▶ PLAY</button>
</header>

<!-- TRANSPORT -->
<div class="transport-bar">
  <div class="now-box"><div class="now-lbl">NOW</div><div class="now-ch" id="now-ch">—</div></div>
  <div class="next-box"><div class="next-lbl">NEXT</div><div class="next-ch" id="next-ch">—</div></div>
  <div class="tp">
    <div class="pr-row">
      <span class="tdisp" id="tc">0:00</span>
      <div class="prog-track" id="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
      <span class="tdisp" id="tt">0:00</span>
    </div>
    <div class="vr">
      <span class="vi">🔈</span>
      <input type="range" class="vs" id="vol" min="0" max="1" step="0.01" value="0.85">
      <span class="vpc" id="vpc">85%</span>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="main-wrap">

  <!-- 左：コードグリッド -->
  <div class="grid-pane">
    <div class="grid-toolbar">
      <span class="gtlbl">表示</span>
      <select class="gsel" id="sel-cols">
        <option value="2">2列/行</option>
        <option value="4" selected>4列/行</option>
        <option value="8">8列/行</option>
      </select>
      <select class="gsel" id="sel-group">
        <option value="1">1セル=1コード変化</option>
        <option value="2">2小節ごと</option>
        <option value="4" selected>4小節ごと</option>
        <option value="8">8小節ごと</option>
      </select>
      <div class="hdiv" style="background:var(--border2);margin:0 2px;"></div>
      <span class="gtlbl">拍/小節</span>
      <select class="gsel" id="sel-beats">
        <option value="3">3拍</option>
        <option value="4" selected>4拍</option>
        <option value="6">6拍</option>
      </select>
    </div>

    <!-- ドロップゾーン -->
    <div class="drop-zone" id="dz">
      <div class="dicon">🎸</div>
      <div class="dtitle">ChordScore Editor</div>
      <div class="dsteps">
        1. 「音声」で MP3/WAV を読込<br>
        2. 「JSON/CSV」でコード情報を読込<br>
        3. 右パネルで歌詞を入力・反映<br>
        4. 歌詞行をコードセルにドラッグして紐付け<br>
        5. 「演奏」モードでPLAY！
      </div>
    </div>

    <!-- 編集モード：コードグリッド -->
    <div class="grid-scroll hidden" id="grid-scroll"></div>

    <!-- 演奏モード：U-FRETスタイル譜面 -->
    <div class="play-score" id="play-score"></div>
  </div>

  <!-- 右パネル -->
  <div class="right-pane" id="right-pane">

    <!-- 歌詞入力 -->
    <div class="rpanel">
      <div class="rtitle">歌詞入力</div>
      <textarea class="lyric-ta" id="lyric-ta" placeholder="歌詞を貼り付けてください&#10;&#10;1行 = 1フレーズ&#10;空行 = 段落区切り"></textarea>
      <div class="lhint">空行を入れると段落（セクション）が分かれます</div>
      <div style="display:flex;gap:4px;margin-top:6px;">
        <label style="padding:4px 8px;font-size:10px;border-radius:4px;cursor:pointer;border:1px solid var(--border2);background:var(--bg);color:var(--text2);font-family:'JetBrains Mono',monospace;" for="f-lrc">📄 .lrc</label>
        <input type="file" id="f-lrc" accept=".lrc,.txt">
        <button class="sec-add" style="flex:1;" onclick="applyLyrics()">▶ 譜面に反映</button>
      </div>

<audio id="aud"></audio>

<script>
/* ════════════════════════════════════
   定数・状態
════════════════════════════════════ */
const NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTESF=['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
const QM={maj:'',min:'m',maj7:'maj7',min7:'m7',dom7:'7','7':'7',dim:'dim',aug:'aug',sus2:'sus2',sus4:'sus4',hdim7:'m7b5'};

let D=null;          // コードデータ
let cells=[];        // [{idx,time,chord,lyric,section}]
let lyricItems=[];   // [{text,used,cellIdx}]
let sections=[];     // [{name,time}]
let capo=0;
let orient='std';
let appMode='edit';  // 'edit'|'play'
let curCellIdx=-1;
let rafId=null;
let audioReady=false;

const aud=document.getElementById('aud');
aud.volume=0.85;

/* ════════════════════════════════════
   ユーティリティ
════════════════════════════════════ */
function fmtTime(s){const m=Math.floor(s/60),sec=Math.floor(s%60).toString().padStart(2,'0');return`${m}:${sec}`;}
function parseFmtTime(s){const p=s.split(':');return p.length===2?parseInt(p[0])*60+parseFloat(p[1]):parseFloat(s)||0;}
function noteIdx(n){let i=NOTES.indexOf(n);return i>=0?i:NOTESF.indexOf(n);}
function applyCapo(chord,c){
  if(!chord||chord==='N'||c===0)return chord;
  return chord.split('/').map(p=>{
    let root='',qual='';
    if(p.length>=2&&(p[1]==='#'||p[1]==='b')){root=p.slice(0,2);qual=p.slice(2);}
    else{root=p[0];qual=p.slice(1);}
    const idx=noteIdx(root);
    return idx<0?p:NOTES[((idx-c)%12+12)%12]+qual;
  }).join('/');
}
function normChord(raw){
  if(!raw||['N','X','n'].includes(raw))return'N';
  if(raw.includes(':'))return raw.split(':')[0]+(QM[raw.split(':')[1]]??raw.split(':')[1]);
  return raw;
}
function estKey(chords){
  const f={};
  chords.filter(c=>c!=='N').forEach(c=>{const m=c.split('/')[0].match(/^([A-G][b#]?)/);if(m)f[m[1]]=(f[m[1]]||0)+1;});
  const t=Object.entries(f).sort((a,b)=>b[1]-a[1])[0];
  return t?t[0]+' major':'';
}

/* ════════════════════════════════════
   データ読込
════════════════════════════════════ */
function parseInput(text,fname){
  if(!fname.endsWith('.json'))return parseCsv(text,fname);
  const r=JSON.parse(text);
  if(Array.isArray(r.chords)&&typeof r.chords[0]==='string')return{source:'JSON',model:r.model||'—',...r};
  if(r.chord_dict!==undefined||Array.isArray(r.chords))return cvtChordMini(r,fname);
  return r;
}
function cvtChordMini(r,fname){
  const ch=[],ti=[];let prev=null;
  for(const it of r.chords){
    const c=normChord(it.chord||it.label||'');
    const t=parseFloat((it.start??it.time??0).toFixed(3));
    if(c!==prev){ch.push(c);ti.push(t);prev=c;}
  }
  return{file:fname,duration:parseFloat((r.duration||0).toFixed(2)),tempo:parseFloat((r.bpm||0).toFixed(1)),key:r.key||estKey(ch),chords:ch,times:ti,model:r.model_name||'Chord-CNN-LSTM',source:'ChordMini'};
}
function parseCsv(text,fname){
  const ch=[],ti=[];let prev=null;
  for(const line of text.replace(/\r/g,'').split('\n')){
    const p=line.split(',');if(p.length<2)continue;
    const t=parseFloat(p[0]),c=p[1].trim()||'N';
    if(isNaN(t))continue;
    if(c!==prev){ti.push(parseFloat(t.toFixed(3)));ch.push(c);prev=c;}
  }
  return{file:fname,duration:ti[ti.length-1]+2||0,tempo:0,key:estKey(ch),chords:ch,times:ti,model:'Chordino',source:'CSV'};
}

function loadData(d){
  D=d;
  document.getElementById('h-title').textContent=d.file?.split(/[/\\]/).pop()||'';
  const bk=document.getElementById('h-key'),bb=document.getElementById('h-bpm');
  if(d.key){bk.textContent=d.key;bk.style.display='';}
  if(d.tempo){bb.textContent=d.tempo+' BPM';bb.style.display='';}
  document.getElementById('i-k').textContent=d.key||'—';
  document.getElementById('i-b').textContent=d.tempo?d.tempo+' BPM':'—';
  document.getElementById('i-c').textContent=d.chords.length;
  document.getElementById('i-d').textContent=fmtTime(d.duration||0);
  document.getElementById('i-m').textContent=d.model||'—';
  document.getElementById('tt').textContent=fmtTime(d.duration||0);
  document.getElementById('play-btn').disabled=!audioReady;
  buildCells();
  document.getElementById('dz').classList.add('hidden');
  document.getElementById('grid-scroll').classList.remove('hidden');
  setMode('edit');
}

/* ════════════════════════════════════
   セル構築
════════════════════════════════════ */
function buildCells(){
  if(!D)return;
  const beats=parseInt(document.getElementById('sel-beats').value)||4;
  const group=parseInt(document.getElementById('sel-group').value)||4;

  if(D.tempo>0){
    // テンポ既知：小節単位でセルを作る
    const spb=60/D.tempo;
    const spm=spb*beats;
    const total=Math.ceil(D.duration/spm);
    cells=[];
    for(let m=0;m<total;m++){
      const t=m*spm;
      cells.push({idx:m,time:t,chord:chordAt(t),lyric:'',section:''});
    }
  }else{
    // テンポ不明：コード変化点ごとにセル
    cells=D.chords.map((ch,i)=>({idx:i,time:D.times[i],chord:ch,lyric:'',section:''}));
  }
  renderGrid();
}

function chordAt(t){
  if(!D)return'N';
  let c=D.chords[0];
  for(let i=0;i<D.times.length;i++){if(D.times[i]<=t)c=D.chords[i];else break;}
  return c;
}

/* ════════════════════════════════════
   グリッド描画
════════════════════════════════════ */
function renderGrid(){
  const scroll=document.getElementById('grid-scroll');
  scroll.innerHTML='';
  if(!cells.length)return;
  const cols=parseInt(document.getElementById('sel-cols').value)||4;

  // セクションでグループ化
  const secMap={};
  sections.forEach(s=>secMap[s.time]=s.name);

  // セクション境界を見つけてブロック分割
  let cur=[];
  const blocks=[{label:'',items:[]}];

  cells.forEach((cell,i)=>{
    const secName=findSection(cell.time);
    const lastBlock=blocks[blocks.length-1];
    if(i>0&&secName!==findSection(cells[i-1].time)&&secName){
      blocks.push({label:secName,items:[]});
    }
    blocks[blocks.length-1].items.push(cell);
  });
  if(!blocks[0].label&&blocks.length>1) blocks[0].label='—';

  blocks.forEach(block=>{
    if(!block.items.length)return;
    const secDiv=document.createElement('div');
    secDiv.className='section-block';

    if(block.label){
      const sh=document.createElement('div');
      sh.className='section-header';
      const sl=document.createElement('span');
      sl.className='section-label '+labelClass(block.label);
      sl.textContent=block.label;
      sl.addEventListener('click',()=>{
        if(aud.src)aud.currentTime=block.items[0].time;
      });
      sh.appendChild(sl);
      const st=document.createElement('span');
      st.className='section-time';
      st.textContent=fmtTime(block.items[0].time);
      sh.appendChild(st);
      secDiv.appendChild(sh);
    }

    // 行に分割
    for(let r=0;r<block.items.length;r+=cols){
      const row=document.createElement('div');
      row.className='chord-row';
      row.style.gridTemplateColumns=`repeat(${cols},1fr)`;
      block.items.slice(r,r+cols).forEach(cell=>{
        row.appendChild(makeCellEl(cell));
      });
      secDiv.appendChild(row);
    }
    scroll.appendChild(secDiv);
  });
}

function findSection(time){
  let name='';
  sections.forEach(s=>{if(s.time<=time)name=s.name;});
  return name;
}
function labelClass(name){
  const n=name.toLowerCase();
  if(n.includes('イントロ')||n.includes('intro'))return'intro';
  if(n.includes('サビ')||n.includes('chorus'))return'chorus';
  if(n.includes('アウトロ')||n.includes('outro'))return'outro';
  if(n.includes('間奏')||n.includes('bridge'))return'bridge';
  return'verse';
}

function makeCellEl(cell){
  const el=document.createElement('div');
  el.className='chord-cell';
  el.dataset.idx=cell.idx;

  const disp=applyCapo(cell.chord,capo);

  el.innerHTML=`
    <div class="cell-num">${cell.idx+1} · ${fmtTime(cell.time)}</div>
    <div class="cell-chord${disp&&disp.length>6?' slash':''}">${disp==='N'?'—':disp||'—'}</div>
    <div class="cell-lyric${cell.lyric?'':' empty'}">${
      cell.lyric
        ? `<span class="cell-lyric-tag">歌詞</span>${escHtml(cell.lyric)}`
        : 'ドラッグで歌詞を配置'
    }</div>
    <button class="cell-lyric-del" title="歌詞削除" onclick="clearCellLyric(${cell.idx},event)">✕</button>
  `;

  // クリック→シーク
  el.addEventListener('click',()=>{if(aud.src)aud.currentTime=cell.time;});

  // ドラッグオーバー
  el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over-cell');});
  el.addEventListener('dragleave',()=>el.classList.remove('drag-over-cell'));
  el.addEventListener('drop',e=>{
    e.preventDefault();
    el.classList.remove('drag-over-cell');
    const li=parseInt(e.dataTransfer.getData('lyricIdx'));
    if(isNaN(li)||!lyricItems[li])return;
    // 既存の使用済みを解除
    if(lyricItems[li].used&&lyricItems[li].cellIdx>=0){
      cells[lyricItems[li].cellIdx].lyric='';
    }
    // 新規紐付け
    cells[cell.idx].lyric=lyricItems[li].text;
    lyricItems[li].used=true;
    lyricItems[li].cellIdx=cell.idx;
    renderGrid();
    renderLyricList();
  });

  return el;
}

function clearCellLyric(idx,e){
  e.stopPropagation();
  const cell=cells[idx];
  if(!cell)return;
  // lyricItemsの使用済みフラグを解除
  lyricItems.forEach(li=>{if(li.text===cell.lyric)li.used=false;});
  cell.lyric='';
  renderGrid();
  renderLyricList();
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ════════════════════════════════════
   歌詞処理
════════════════════════════════════ */
function applyLyrics(){
  const raw=document.getElementById('lyric-ta').value.trim();
  if(!raw){alert('歌詞を入力してください');return;}
  const lines=raw.replace(/\r/g,'').split('\n').filter(l=>l.trim()!=='');
  lyricItems=lines.map(text=>({text,used:false,cellIdx:-1}));
  renderLyricList();
  if(!D){alert('先にコードJSONを読み込んでください');return;}
}

function renderLyricList(){
  const list=document.getElementById('lyric-list');
  list.innerHTML='';
  if(!lyricItems.length){
    list.innerHTML='<div style="font-size:11px;color:var(--text3);text-align:center;padding:20px;">歌詞を入力して「譜面に反映」を押してください</div>';
    return;
  }
  lyricItems.forEach((li,i)=>{
    const el=document.createElement('div');
    el.className='lyric-item'+(li.used?' used':'');
    el.draggable=true;
    el.dataset.idx=i;
    el.innerHTML=`
      <span class="li-icon">${li.used?'✅':'⋮⋮'}</span>
      <span class="li-text">${escHtml(li.text)}</span>
      ${li.used?`<button class="li-clear" onclick="removeLyricAssign(${i},event)">✕</button>`:''}
    `;
    el.addEventListener('dragstart',e=>{
      el.classList.add('dragging');
      e.dataTransfer.setData('lyricIdx',String(i));
    });
    el.addEventListener('dragend',()=>el.classList.remove('dragging'));
    list.appendChild(el);
  });
}

function removeLyricAssign(i,e){
  e.stopPropagation();
  const li=lyricItems[i];
  if(!li)return;
  if(li.cellIdx>=0&&cells[li.cellIdx])cells[li.cellIdx].lyric='';
  li.used=false;li.cellIdx=-1;
  renderGrid();renderLyricList();
}

/* LRC */
document.getElementById('f-lrc').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    const lines=ev.target.result.replace(/\r/g,'').split('\n');
    const parsed=[];
    for(const line of lines){
      const m=line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
      if(m&&m[3].trim())parsed.push(m[3].trim());
    }
    document.getElementById('lyric-ta').value=parsed.join('\n');
    applyLyrics();
  };
  r.readAsText(f);
});

/* ════════════════════════════════════
   セクション管理
════════════════════════════════════ */
function addSection(){
  const name=document.getElementById('sec-name').value.trim();
  const timeStr=document.getElementById('sec-time').value.trim();
  if(!name){alert('セクション名を入力してください');return;}
  const time=parseFmtTime(timeStr);
  sections.push({name,time});
  sections.sort((a,b)=>a.time-b.time);
  document.getElementById('sec-name').value='';
  document.getElementById('sec-time').value='';
  renderSections();
  renderGrid();
}
function renderSections(){
  const list=document.getElementById('sec-list');
  list.innerHTML='';
  sections.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='sec-tag';
    el.innerHTML=`<span class="sec-tag-name">${escHtml(s.name)}</span><span class="sec-tag-time">${fmtTime(s.time)}</span><button class="sec-tag-del" onclick="delSection(${i})">✕</button>`;
    list.appendChild(el);
  });
}
function delSection(i){sections.splice(i,1);renderSections();renderGrid();}

/* ════════════════════════════════════
   演奏モード（U-FRETスタイル）
════════════════════════════════════ */
function buildPlayScore(){
  const ps=document.getElementById('play-score');
  ps.innerHTML='';
  if(!cells.length)return;

  // セクションでグループ化
  const blocks=[];
  let cur={label:findSection(cells[0].time)||'',items:[]};
  cells.forEach((cell,i)=>{
    const sec=findSection(cell.time)||'';
    if(i>0&&sec!==findSection(cells[i-1].time)){
      if(cur.items.length)blocks.push(cur);
      cur={label:sec,items:[]};
    }
    cur.items.push(cell);
  });
  if(cur.items.length)blocks.push(cur);

  blocks.forEach(block=>{
    const secEl=document.createElement('div');
    secEl.className='ps-section';
    if(block.label){
      const sl=document.createElement('div');
      sl.className='ps-sec-label '+labelClass(block.label);
      sl.textContent=block.label;
      secEl.appendChild(sl);
    }

    // 歌詞のある行を抽出してU-FRETスタイルで表示
    // 歌詞がないセルはコードのみ横並び
    let rowEl=null;
    block.items.forEach((cell,i)=>{
      if(!rowEl||(i>0&&cell.lyric&&block.items[i-1].lyric)){
        if(rowEl)secEl.appendChild(rowEl);
        rowEl=document.createElement('div');
        rowEl.className='ps-row';
        rowEl.dataset.time=cell.time;
        rowEl.addEventListener('click',()=>{if(aud.src)aud.currentTime=cell.time;});
      }
      const disp=applyCapo(cell.chord,capo);
      const blockEl=document.createElement('div');
      blockEl.className='ps-block';
      blockEl.innerHTML=`
        <div class="ps-chord${disp==='N'?' empty':''}${disp&&disp.length>5?' slash':''}">${disp==='N'?'':disp}</div>
        <div class="ps-lyric">${escHtml(cell.lyric||'　')}</div>
      `;
      rowEl.appendChild(blockEl);
    });
    if(rowEl)secEl.appendChild(rowEl);
    ps.appendChild(secEl);
  });
}

/* ════════════════════════════════════
   モード切替
════════════════════════════════════ */
function setMode(m){
  appMode=m;
  document.getElementById('btn-edit').classList.toggle('amber',m==='edit');
  document.getElementById('btn-play').classList.toggle('green',m==='play');
  document.getElementById('btn-edit').classList.toggle('on',m!=='edit');
  document.getElementById('btn-play').classList.toggle('on',m!=='play');

  const gs=document.getElementById('grid-scroll');
  const ps=document.getElementById('play-score');
  const rp=document.getElementById('right-pane');

  if(m==='play'){
    gs.style.display='none';
    buildPlayScore();
    ps.classList.add('visible');
    document.getElementById('main-wrap').classList.remove('edit-mode');
  }else{
    gs.style.display='';
    ps.classList.remove('visible');
    document.getElementById('main-wrap').classList.add('edit-mode');
  }
}

/* ════════════════════════════════════
   カポ
════════════════════════════════════ */
const capoRow=document.getElementById('capo-row');
for(let i=0;i<=7;i++){
  const b=document.createElement('button');
  b.className='cbtn'+(i===0?' on':'');b.textContent=i;
  b.addEventListener('click',()=>{
    capo=i;
    document.querySelectorAll('.cbtn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    document.getElementById('capo-info').innerHTML=i===0?'カポなし':`カポ <b>${i}フレット</b>`;
    renderGrid();updateDisplay(true);
    if(appMode==='play')buildPlayScore();
  });
  capoRow.appendChild(b);
}

/* ════════════════════════════════════
   ダイアグラム
════════════════════════════════════ */
const SH={
  C:[[-1,3,2,0,1,0],0],Cm:[[-1,3,5,5,4,3],3],C7:[[-1,3,2,3,1,0],0],Cm7:[[-1,3,5,3,4,3],3],Cmaj7:[[-1,3,2,0,0,0],0],
  D:[[-1,-1,0,2,3,2],0],Dm:[[-1,-1,0,2,3,1],0],D7:[[-1,-1,0,2,1,2],0],Dm7:[[-1,-1,0,2,1,1],0],Dmaj7:[[-1,-1,0,2,2,2],0],
  E:[[0,2,2,1,0,0],0],Em:[[0,2,2,0,0,0],0],E7:[[0,2,0,1,0,0],0],Em7:[[0,2,2,0,3,0],0],Emaj7:[[0,2,1,1,0,0],0],
  F:[[1,3,3,2,1,1],1],Fm:[[1,3,3,1,1,1],1],F7:[[1,3,1,2,1,1],1],
  G:[[3,2,0,0,0,3],0],Gm:[[3,5,5,3,3,3],3],G7:[[3,2,0,0,0,1],0],Gm7:[[3,5,3,3,3,3],3],Gmaj7:[[3,2,0,0,0,2],0],
  A:[[-1,0,2,2,2,0],0],Am:[[-1,0,2,2,1,0],0],A7:[[-1,0,2,0,2,0],0],Am7:[[-1,0,2,0,1,0],0],Amaj7:[[-1,0,2,1,2,0],0],
  B:[[-1,2,4,4,4,2],2],Bm:[[-1,2,4,4,3,2],2],B7:[[-1,2,1,2,0,2],0],Bm7:[[-1,2,0,2,3,2],0],
  'C#':[[-1,4,3,1,2,1],0],'C#m':[[-1,4,6,6,5,4],4],Db:[[-1,4,3,1,2,1],0],
  'D#':[[-1,6,5,3,4,3],0],'D#m':[[-1,6,8,8,7,6],6],Eb:[[-1,6,5,3,4,3],0],Ebm:[[-1,6,8,8,7,6],6],
  'F#':[[2,4,4,3,2,2],2],'F#m':[[2,4,4,2,2,2],2],'F#7':[[2,4,2,3,2,2],2],
  Gb:[[2,4,4,3,2,2],2],'G#':[[4,6,6,5,4,4],4],'G#m':[[4,6,6,4,4,4],4],Ab:[[4,6,6,5,4,4],4],Abm:[[4,6,6,4,4,4],4],
  'A#':[[-1,1,3,3,3,1],1],'A#m':[[-1,1,3,3,2,1],1],Bb:[[-1,1,3,3,3,1],1],Bbm:[[-1,1,3,3,2,1],1],
  E6:[[0,2,2,1,2,0],0],D6:[[-1,-1,0,2,0,2],0],A6:[[-1,0,2,2,2,2],0],Bb6:[[-1,1,3,3,3,3],1],
  Csus4:[[-1,3,3,0,1,1],0],Dsus4:[[-1,-1,0,2,3,3],0],Esus4:[[0,2,2,2,0,0],0],Asus4:[[-1,0,2,2,3,0],0],
  'F#/C#':[[2,4,4,3,2,2],2],'A7/C#':[[-1,4,2,0,2,0],0],'G/D':[[3,5,0,0,0,3],0],'G/B':[[-1,2,0,0,0,3],0],
  'D/F#':[[-1,-1,4,2,3,2],0],'C/E':[[0,3,2,0,1,0],0],'E/G#':[[4,2,2,1,0,0],0],'Em/D':[[-1,-1,0,0,0,0],0],
};
let lastDiagChord='';
function setOrient(o){
  orient=o;
  ['std','rev','rot','rotr'].forEach(x=>document.getElementById('o-'+x).classList.toggle('on',x===o));
  const cv=document.getElementById('diag');
  const isRot=o==='rot'||o==='rotr';
  cv.width=isRot?200:188;cv.height=isRot?124:172;
  redrawDiag();
}
function redrawDiag(){drawDiag(document.getElementById('diag'),lastDiagChord);}
function drawDiag(cv,name){
  lastDiagChord=name||'';
  const ctx=cv.getContext('2d');const W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  let look=name||'';
  if(look.includes('/')&&!SH[look])look=look.split('/')[0];
  const sh=SH[look];
  if(!sh||!name||name==='N'){ctx.fillStyle='#9ca3af';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText('—',W/2,H/2);return;}
  let[fr,bf]=sh;fr=[...fr];
  if(orient==='rev'||orient==='rotr')fr=[...fr].reverse();
  (orient==='rot'||orient==='rotr')?drawH(ctx,W,H,fr,bf):drawVert(ctx,W,H,fr,bf);
}
function drawVert(ctx,W,H,fr,bf){
  const nS=6,nF=5,pL=26,pR=12,pT=32,pB=12;
  const sW=(W-pL-pR)/(nS-1),fH=(H-pT-pB)/nF;
  const sx=s=>pL+s*sW,fy=f=>pT+f*fH;
  if(bf===0){ctx.fillStyle='#1e2640';ctx.fillRect(pL,pT-3,W-pL-pR,3);}
  else{ctx.fillStyle='#9ca3af';ctx.font='bold 8px monospace';ctx.textAlign='left';ctx.fillText(bf+'fr',2,pT+fH*.6);}
  for(let f=1;f<=nF;f++){ctx.strokeStyle='#d4daea';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pL,fy(f));ctx.lineTo(W-pR,fy(f));ctx.stroke();}
  for(let s=0;s<nS;s++){ctx.strokeStyle='#8090a8';ctx.lineWidth=s<2?2:s<4?1.5:1;ctx.beginPath();ctx.moveTo(sx(s),pT);ctx.lineTo(sx(s),pT+nF*fH);ctx.stroke();}
  fr.forEach((fret,i)=>{
    const x=sx(i);
    if(fret===-1){ctx.strokeStyle='#cbd5e0';ctx.lineWidth=1.5;const d=3.5;ctx.beginPath();ctx.moveTo(x-d,pT-13);ctx.lineTo(x+d,pT-6);ctx.moveTo(x+d,pT-13);ctx.lineTo(x-d,pT-6);ctx.stroke();}
    else if(fret===0){ctx.strokeStyle='#4a5568';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(x,pT-9,4.5,0,Math.PI*2);ctx.stroke();}
    else{const af=fret-bf;if(af>=1&&af<=nF){const y=fy(af-1)+fH/2;ctx.fillStyle='#2563eb';ctx.beginPath();ctx.arc(x,y,fH*.28,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 8px sans-serif';ctx.textAlign='center';ctx.fillText(fret,x,y+3);}}
  });
  const mf=Math.min(...fr.filter(f=>f>0));
  if(fr.filter(f=>f===mf).length>=4&&mf===bf+1){
    const pos=fr.map((f,i)=>f===mf?i:-1).filter(i=>i>=0);
    const af=mf-bf,y=fy(af-1)+fH/2,r=fH*.28;
    ctx.fillStyle='#2563eb';ctx.fillRect(Math.min(sx(pos[0]),sx(pos[pos.length-1])),y-r,Math.abs(sx(pos[pos.length-1])-sx(pos[0])),r*2);
  }
}
function drawH(ctx,W,H,fr,bf){
  const nS=6,nF=5,pL=28,pR=8,pT=10,pB=10;
  const fW=(W-pL-pR)/nF,sH=(H-pT-pB)/(nS-1);
  const fx=f=>pL+f*fW,sy=s=>pT+s*sH;
  if(bf===0){ctx.fillStyle='#1e2640';ctx.fillRect(pL-4,pT,4,H-pT-pB);}
  else{ctx.fillStyle='#9ca3af';ctx.font='bold 8px monospace';ctx.textAlign='right';ctx.fillText(bf+'fr',pL-5,(pT+H-pB)/2+3);}
  for(let f=1;f<=nF;f++){ctx.strokeStyle='#d4daea';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(fx(f),pT);ctx.lineTo(fx(f),H-pB);ctx.stroke();}
  for(let s=0;s<nS;s++){ctx.strokeStyle='#8090a8';ctx.lineWidth=s<2?2:s<4?1.5:1;ctx.beginPath();ctx.moveTo(pL,sy(s));ctx.lineTo(W-pR,sy(s));ctx.stroke();}
  fr.forEach((fret,i)=>{
    const y=sy(i);
    if(fret===-1){ctx.strokeStyle='#cbd5e0';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(pL-12,y-4);ctx.lineTo(pL-5,y+4);ctx.moveTo(pL-5,y-4);ctx.lineTo(pL-12,y+4);ctx.stroke();}
    else if(fret===0){ctx.strokeStyle='#4a5568';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(pL-9,y,4,0,Math.PI*2);ctx.stroke();}
    else{const af=fret-bf;if(af>=1&&af<=nF){const x=fx(af-1)+fW/2;ctx.fillStyle='#2563eb';ctx.beginPath();ctx.arc(x,y,sH*.28,0,Math.PI*2);ctx.fill();}}
  });
}

/* ════════════════════════════════════
   音声・JSON読込
════════════════════════════════════ */
document.getElementById('f-audio').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  aud.src=URL.createObjectURL(f);audioReady=true;
  document.getElementById('h-title').textContent=f.name;
  if(D)document.getElementById('play-btn').disabled=false;
});
document.getElementById('f-json').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{try{loadData(parseInput(ev.target.result,f.name));}catch(err){alert('読込エラー: '+err.message);}};
  r.readAsText(f);
});
['sel-cols','sel-group','sel-beats'].forEach(id=>{
  document.getElementById(id).addEventListener('change',()=>{if(D)buildCells();});
});

/* ════════════════════════════════════
   再生
════════════════════════════════════ */
document.getElementById('play-btn').addEventListener('click',()=>{
  if(aud.paused){aud.play();document.getElementById('play-btn').textContent='⏸ PAUSE';startRaf();}
  else{aud.pause();document.getElementById('play-btn').textContent='▶ PLAY';cancelAnimationFrame(rafId);}
});
aud.addEventListener('ended',()=>{document.getElementById('play-btn').textContent='▶ PLAY';cancelAnimationFrame(rafId);});
document.getElementById('prog-track').addEventListener('click',e=>{
  if(!D)return;
  const r=e.currentTarget.getBoundingClientRect();
  aud.currentTime=((e.clientX-r.left)/r.width)*(D.duration||0);
});
document.getElementById('vol').addEventListener('input',e=>{
  aud.volume=parseFloat(e.target.value);
  document.getElementById('vpc').textContent=Math.round(aud.volume*100)+'%';
});

/* ════════════════════════════════════
   アニメーションループ
════════════════════════════════════ */
function startRaf(){function loop(){if(!aud.paused){updateDisplay(false);rafId=requestAnimationFrame(loop);}}loop();}

function updateDisplay(force){
  if(!D)return;
  const t=aud.currentTime,dur=D.duration||1;
  document.getElementById('prog-fill').style.width=(t/dur*100)+'%';
  document.getElementById('tc').textContent=fmtTime(t);

  // 現在のコードインデックス
  let idx=0;
  for(let i=0;i<D.times.length;i++){if(D.times[i]<=t)idx=i;else break;}
  const ch=D.chords[idx],nch=D.chords[idx+1];
  const disp=applyCapo(ch,capo),ndisp=nch?applyCapo(nch,capo):'—';

  const nowEl=document.getElementById('now-ch');
  if(nowEl.textContent!==(disp==='N'?'—':disp)||force){
    nowEl.textContent=disp==='N'?'—':disp;
    nowEl.classList.remove('pop');void nowEl.offsetWidth;nowEl.classList.add('pop');
    document.getElementById('next-ch').textContent=ndisp==='N'?'—':ndisp;
    document.getElementById('d-name').textContent=disp==='N'?'—':disp;
    document.getElementById('d-sub').textContent=ch&&ch.includes('/')?'ベース:'+ch.split('/')[1]:capo>0?`カポ${capo}→実音:${ch}`:'';
    drawDiag(document.getElementById('diag'),disp==='N'?'':disp);
  }

  // 現在セルのハイライト（編集モード）
  let nearestCell=null,nearestDiff=Infinity;
  cells.forEach(c=>{const d=t-c.time;if(d>=0&&d<nearestDiff){nearestDiff=d;nearestCell=c;}});

  if(appMode==='edit'){
    document.querySelectorAll('.chord-cell').forEach(el=>{
      const ci=parseInt(el.dataset.idx);
      el.classList.toggle('active',nearestCell&&nearestCell.idx===ci);
      el.classList.toggle('next-cell',nearestCell&&nearestCell.idx+1===ci);
    });
    if(nearestCell){
      const el=document.querySelector(`.chord-cell[data-idx="${nearestCell.idx}"]`);
      if(el&&!force)el.scrollIntoView({behavior:'smooth',block:'nearest'});
    }
  }else{
    // 演奏モード：行ハイライト
    document.querySelectorAll('.ps-row').forEach(row=>{
      const rt=parseFloat(row.dataset.time||0);
      row.classList.remove('active');
    });
    let activeRow=null,aDiff=Infinity;
    document.querySelectorAll('.ps-row').forEach(row=>{
      const rt=parseFloat(row.dataset.time||0);
      const d=t-rt;
      if(d>=0&&d<aDiff){aDiff=d;activeRow=row;}
    });
    if(activeRow){activeRow.classList.add('active');if(!force)activeRow.scrollIntoView({behavior:'smooth',block:'nearest'});}
  }
}

/* ════════════════════════════════════
   ドラッグ＆ドロップ（ファイル）
════════════════════════════════════ */
document.addEventListener('dragover',e=>{if(!e.target.closest('.lyric-item')&&!e.target.closest('.chord-cell'))e.preventDefault();});
document.addEventListener('drop',e=>{
  if(e.target.closest('.chord-cell'))return;
  e.preventDefault();
  const files=Array.from(e.dataTransfer.files);
  const jf=files.find(f=>f.name.match(/\.(json|csv|txt)$/i));
  const af=files.find(f=>f.type.startsWith('audio/'));
  if(jf){const r=new FileReader();r.onload=ev=>{try{loadData(parseInput(ev.target.result,jf.name));}catch{}};r.readAsText(jf);}
  if(af){aud.src=URL.createObjectURL(af);audioReady=true;if(D)document.getElementById('play-btn').disabled=false;}
});

// 初期化
setMode('edit');
setOrient('std');
drawDiag(document.getElementById('diag'),'');
</script>
