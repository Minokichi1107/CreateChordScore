<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChordScore Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f1117; --bg2:#171a24; --bg3:#1e2130;
  --border:#2a2f45; --border2:#3a4060;
  --text:#e2e6f0; --text2:#8890a8; --text3:#555e7a;
  --accent:#4f9eff; --accent2:#2d6fd4;
  --green:#3ddc84; --amber:#ffb840; --red:#ff5c5c;
  --chord-bg:#1a2540; --chord-border:#2e4a8a; --chord-text:#7eb8ff;
  --radius:6px; --radius2:10px;
  --mono:'IBM Plex Mono',monospace; --sans:'Noto Sans JP',sans-serif;
  --shadow:0 4px 24px rgba(0,0,0,.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* HEADER */
#header{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;position:sticky;top:0;z-index:100}
.logo{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--accent);letter-spacing:-.5px;white-space:nowrap}
.logo span{color:var(--text2);font-weight:400}
#project-title{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--sans);font-size:14px;padding:5px 10px;min-width:0}
#project-title:focus{outline:none;border-color:var(--accent)}
#project-title::placeholder{color:var(--text3)}
.hdr-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);cursor:pointer;font-family:var(--mono);font-size:11px;padding:5px 10px;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:4px}
.hdr-btn:hover{border-color:var(--accent);color:var(--accent)}
.hdr-btn.primary{background:var(--accent2);border-color:var(--accent);color:#fff}
.hdr-btn.primary:hover{background:var(--accent)}
input[type=file]{display:none}

/* LAYOUT */
#app{display:grid;grid-template-columns:260px 1fr 290px;flex:1;min-height:0;height:calc(100vh - 47px)}

/* LEFT */
#panel-left{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.phdr{padding:7px 12px;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.pbody{padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.file-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.file-row label{font-size:11px;color:var(--text2);width:40px;flex-shrink:0;font-family:var(--mono)}
.file-btn{flex:1;background:var(--bg3);border:1px dashed var(--border2);border-radius:var(--radius);color:var(--text2);cursor:pointer;font-size:11px;padding:4px 8px;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:all .15s}
.file-btn:hover{border-color:var(--accent);color:var(--accent)}
.file-btn.loaded{border-style:solid;border-color:var(--green);color:var(--green)}
.capo-row{display:flex;align-items:center;gap:8px;margin-top:2px}
.capo-row label{font-size:11px;color:var(--text2);font-family:var(--mono)}
.capo-row input[type=number]{width:50px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--mono);font-size:12px;padding:3px 6px;text-align:center}
.capo-row input:focus{outline:none;border-color:var(--accent)}
#pal-wrap{flex:1;overflow-y:auto;padding:8px 10px}
#pal-filter{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--mono);font-size:12px;padding:5px 8px;margin-bottom:8px}
#pal-filter:focus{outline:none;border-color:var(--accent)}
#pal-filter::placeholder{color:var(--text3)}
#chord-pal{display:flex;flex-wrap:wrap;gap:4px}
.pal-chord{background:var(--chord-bg);border:1px solid var(--chord-border);border-radius:4px;color:var(--chord-text);cursor:pointer;font-family:var(--mono);font-size:11px;padding:3px 7px;transition:all .12s;user-select:none}
.pal-chord:hover{background:var(--accent2);border-color:var(--accent);color:#fff;transform:translateY(-1px)}
/* 手打ち */
#custom-row{display:flex;gap:5px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
#custom-in{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--mono);font-size:12px;padding:4px 8px}
#custom-in:focus{outline:none;border-color:var(--accent)}
#custom-in::placeholder{color:var(--text3)}
#custom-add{background:var(--bg3);border:1px solid var(--accent);border-radius:var(--radius);color:var(--accent);cursor:pointer;font-family:var(--mono);font-size:11px;padding:4px 8px;transition:all .15s;white-space:nowrap}
#custom-add:hover{background:var(--accent2);color:#fff}

/* CENTER */
#panel-center{display:flex;flex-direction:column;overflow:hidden;background:var(--bg);height:100%}
#replace-bar-wrap{flex-shrink:0;}
#audio-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:9px 14px;display:flex;flex-direction:column;gap:7px;flex-shrink:0}
#editor-area{flex:1;overflow-y:auto;padding:10px 12px 60px;min-height:0}
#audio-row{display:flex;align-items:center;gap:8px}
.play-btn{width:34px;height:34px;background:var(--accent2);border:none;border-radius:50%;color:#fff;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.play-btn:hover{background:var(--accent)}
.play-btn:active{transform:scale(.95)}
#time-dis{font-family:var(--mono);font-size:13px;color:var(--text);min-width:90px;text-align:center;letter-spacing:1px}
#seek-wrap{flex:1;position:relative;height:20px;display:flex;align-items:center;cursor:pointer}
#seek-track{width:100%;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
#seek-fill{height:100%;background:var(--accent);border-radius:2px;width:0%;transition:width .1s linear}
#seek-in{position:absolute;width:100%;height:100%;opacity:0;cursor:pointer;top:0;left:0}
.trans-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);cursor:pointer;font-size:11px;font-family:var(--mono);padding:4px 7px;transition:all .15s;white-space:nowrap}
.trans-btn:hover{border-color:var(--accent);color:var(--accent)}
#speed-sel{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);font-family:var(--mono);font-size:11px;padding:4px 5px;cursor:pointer}
#tap-btn{background:var(--bg3);border:2px solid var(--border2);border-radius:var(--radius2);color:var(--text);cursor:pointer;font-family:var(--mono);font-size:12px;font-weight:600;padding:5px 14px;letter-spacing:1px;transition:all .1s;user-select:none}
#tap-btn:hover{border-color:var(--green);color:var(--green)}
#tap-btn:disabled{opacity:.35;cursor:not-allowed}
#cur-chord{font-family:var(--mono);font-size:12px;color:var(--chord-text);font-weight:600;min-width:40px}

#lyric-import{background:var(--bg2);border:1px dashed var(--border2);border-radius:var(--radius2);padding:10px;margin-bottom:10px}
#lyric-import h4{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
#lyric-ta{width:100%;min-height:70px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.7;padding:7px 9px;resize:vertical}
#lyric-ta:focus{outline:none;border-color:var(--accent)}
#lyric-ta::placeholder{color:var(--text3)}
.import-btns{display:flex;gap:6px;margin-top:5px}
.sm-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);cursor:pointer;font-family:var(--mono);font-size:11px;padding:4px 10px;transition:all .15s}
.sm-btn:hover{border-color:var(--accent);color:var(--accent)}
.sm-btn.green{border-color:var(--green);color:var(--green)}
.sm-btn.green:hover{background:var(--green);color:#000}

/* LINE ROWS */
.line-row{display:grid;grid-template-columns:28px 76px 1fr;margin-bottom:2px;border-radius:var(--radius);transition:background .1s;position:relative;min-width:0}
.line-row:hover{background:var(--bg2)}
.line-row.active-line{background:rgba(79,158,255,.08)}
.line-row.tap-flash{background:rgba(61,220,132,.15);transition:background 0s}
.line-num{font-family:var(--mono);font-size:10px;color:var(--text3);padding:10px 3px 6px 5px;text-align:right;align-self:start;user-select:none}
.line-time{font-family:var(--mono);font-size:11px;color:var(--text3);padding:10px 5px 6px;cursor:pointer;align-self:start;white-space:nowrap;transition:color .15s;background:none;border:none}
.line-time:hover{color:var(--accent)}
.line-time.has-t{color:var(--amber)}
.line-content{padding:5px 5px 3px;display:flex;flex-direction:column;gap:3px;min-width:0}

/* CHORD TAGS - 折り返し対応 */
.chord-tags{display:flex;flex-wrap:wrap;gap:5px;min-height:4px;align-items:center;padding:2px 0}
/* コードタグ：見やすいサイズ・色・フォント */
.chord-tag{
  background:linear-gradient(135deg,#1e3a6e 0%,#162a52 100%);
  border:1.5px solid #4a7fd4;
  border-radius:5px;
  color:#a8d4ff;
  cursor:pointer;
  font-family:var(--mono);
  font-size:13px;
  font-weight:600;
  letter-spacing:.5px;
  padding:4px 6px 4px 10px;
  transition:all .12s;
  user-select:none;
  display:inline-flex;
  align-items:center;
  gap:5px;
  line-height:1;
  box-shadow:0 1px 4px rgba(0,0,0,.3);
}
.chord-tag:hover{border-color:#7eb8ff;background:linear-gradient(135deg,#254a8a 0%,#1e3870 100%);color:#cde5ff}
.chord-tag .chord-name{
  font-size:14px;
  font-weight:700;
  color:#c8e4ff;
  letter-spacing:.3px;
}
/* ポップアップOFF時はホバーのみダイアグラム表示しない */
body.diag-off .chord-tag:hover{cursor:default}
.del-x{font-size:15px;font-weight:900;color:rgba(160,180,210,.5);line-height:1;padding:2px 5px;border-radius:3px;transition:all .12s;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;min-width:22px;min-height:22px}
.del-x:hover{color:#fff;background:var(--red)}

/* REPEAT BADGE */
.repeat-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,184,64,.1);border:1px solid rgba(255,184,64,.4);border-radius:4px;color:var(--amber);font-family:var(--mono);font-size:12px;font-weight:600;padding:4px 8px;cursor:pointer;transition:all .12s;user-select:none;white-space:nowrap}
.repeat-badge:hover{background:rgba(255,184,64,.2)}
.rb-del{font-size:14px;color:rgba(255,184,64,.5);padding:1px 4px;border-radius:2px;transition:all .12s;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;min-width:20px;min-height:20px}
.rb-del:hover{color:var(--red);background:rgba(255,92,92,.15)}

.lyric-input{background:transparent;border:none;border-bottom:1px solid transparent;color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;padding:2px 0;width:100%;transition:border-color .15s}
.lyric-input:focus{outline:none;border-bottom-color:var(--border2)}
.lyric-input::placeholder{color:var(--text3)}
.add-chord-btn{background:none;border:1px dashed var(--border);border-radius:3px;color:var(--text3);cursor:pointer;font-family:var(--mono);font-size:10px;padding:2px 7px;transition:all .15s}
.add-chord-btn:hover{border-color:var(--accent);color:var(--accent)}

/* LINE ACTIONS */
.line-acts{position:absolute;right:4px;top:4px;display:none;gap:3px;z-index:10}
.line-row:hover .line-acts{display:flex}
.la{background:var(--bg3);border:1px solid var(--border);border-radius:3px;color:var(--text3);cursor:pointer;font-size:10px;padding:2px 5px;font-family:var(--mono);transition:all .12s;white-space:nowrap}
.la:hover{color:var(--text);border-color:var(--border2)}
.la.del:hover{color:var(--red);border-color:var(--red)}
.la.am:hover{color:var(--amber);border-color:var(--amber)}
.la.gn:hover{color:var(--green);border-color:var(--green)}
#add-line-btn{background:var(--bg2);border:1px dashed var(--border);border-radius:var(--radius);color:var(--text3);cursor:pointer;font-family:var(--mono);font-size:11px;padding:8px;text-align:center;width:100%;margin-top:6px;transition:all .15s}
#add-line-btn:hover{border-color:var(--accent);color:var(--accent)}

/* RIGHT */
#diag-search{padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:5px}
#diag-in{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--mono);font-size:14px;padding:6px 10px;text-align:center;letter-spacing:1px}
#diag-in:focus{outline:none;border-color:var(--accent)}
#diag-in::placeholder{color:var(--text3);font-size:11px;letter-spacing:0}
#btn-add-diag{background:var(--bg3);border:1px dashed var(--border2);border-radius:var(--radius);color:var(--text3);cursor:pointer;font-family:var(--mono);font-size:10px;padding:4px 8px;text-align:center;transition:all .15s}
#btn-add-diag:hover{border-color:var(--amber);color:var(--amber)}
#diag-panel{flex:1;overflow-y:auto;padding:10px}
#diag-title{font-family:var(--mono);font-size:20px;font-weight:600;color:var(--text);text-align:center;margin-bottom:10px;min-height:26px}
#diag-container{display:flex;flex-direction:column;gap:14px}
.dv{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);padding:10px}
.dv-label{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;text-align:center}
.dv-svg{display:flex;justify-content:center}
.diag-empty{text-align:center;color:var(--text3);font-family:var(--mono);font-size:11px;padding:28px 0;line-height:2.2}

/* MODAL */
#modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center}
#modal-ov.open{display:flex}
#modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius2);padding:20px;min-width:300px;max-width:480px;max-height:82vh;overflow-y:auto;box-shadow:var(--shadow)}
#modal-box h3{font-family:var(--mono);font-size:13px;color:var(--text);margin-bottom:12px}
#m-body{margin-bottom:12px}
.m-btns{display:flex;gap:8px;justify-content:flex-end}
.mbtn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);cursor:pointer;font-family:var(--mono);font-size:12px;padding:6px 14px;transition:all .15s}
.mbtn:hover{border-color:var(--accent);color:var(--accent)}
.mbtn.ok{background:var(--accent2);border-color:var(--accent);color:#fff}
.mbtn.ok:hover{background:var(--accent)}
.mbtn.del{border-color:var(--red);color:var(--red)}
.mbtn.del:hover{background:var(--red);color:#fff}
.mbtn.am{border-color:var(--amber);color:var(--amber)}
.mbtn.am:hover{background:var(--amber);color:#000}
.mi{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--mono);padding:7px 10px;text-align:center}
.mi:focus{outline:none;border-color:var(--accent)}
.mi-sm{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--mono);font-size:12px;padding:5px 8px}
.mi-sm:focus{outline:none;border-color:var(--accent)}

/* HOVER POPUP */
#popup{position:fixed;display:none;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius2);padding:10px;z-index:300;box-shadow:var(--shadow);pointer-events:none}
#popup.show{display:block}
#pop-name{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text);text-align:center;margin-bottom:6px}
#pop-vars{display:flex;gap:10px}

/* ダイアグラムOFF時のタグスタイル */
body.diag-off .chord-tag{cursor:default}

/* ダイアグラムONトグルボタン */
#diag-toggle{background:var(--bg3);border:1px solid var(--green);border-radius:var(--radius);color:var(--green);cursor:pointer;font-family:var(--mono);font-size:11px;padding:5px 10px;white-space:nowrap;transition:all .15s}
#diag-toggle.off{border-color:var(--text3);color:var(--text3)}
#diag-toggle:hover{opacity:.8}

/* アクティブ行のスクロール用マーカー */
.line-row.active-line{background:rgba(79,158,255,.1);border-left:2px solid var(--accent)}

/* ③ コード間「/」セパレーター */
.chord-sep{
  display:inline-flex;align-items:center;
  color:var(--text3);font-family:var(--mono);font-size:17px;font-weight:300;
  padding:0 1px;cursor:pointer;transition:color .12s;user-select:none;align-self:center;
  line-height:1;
}
.chord-sep:hover{color:var(--red);text-decoration:line-through}
.add-sep-btn{
  background:none;border:1px dashed var(--border);border-radius:3px;
  color:var(--text3);cursor:pointer;font-family:var(--mono);font-size:11px;
  padding:2px 6px;transition:all .15s;
}
.add-sep-btn:hover{border-color:var(--text2);color:var(--text2)}

/* コードタグラッパー（/挿入ボタン付き） */
.chord-tag-wrap{display:inline-flex;align-items:center;gap:0;position:relative;}
.insert-sep-btn{
  display:none;
  background:var(--bg3);border:1px solid var(--border);border-radius:0 3px 3px 0;
  color:var(--text3);cursor:pointer;font-family:var(--mono);font-size:10px;
  padding:2px 4px;line-height:1;transition:all .12s;
  height:100%;align-items:center;
}
.chord-tag-wrap:hover .insert-sep-btn{display:inline-flex;}
.insert-sep-btn:hover{color:var(--text);border-color:var(--border2);background:var(--bg2);}

/* ③ コードセパレーター "/" */
.chord-sep{
  display:inline-flex;align-items:center;
  color:var(--text3);font-family:var(--mono);font-size:16px;font-weight:300;
  padding:0 2px;cursor:pointer;transition:color .12s;user-select:none;
  align-self:center;
}
.chord-sep:hover{color:var(--red)}
.add-sep-btn{
  background:none;border:1px dashed var(--border);border-radius:3px;
  color:var(--text3);cursor:pointer;font-family:var(--mono);font-size:10px;
  padding:2px 5px;transition:all .15s;
}
.add-sep-btn:hover{border-color:var(--text2);color:var(--text2)}

/* ⑦ 置換バー */
#replace-bar{
  display:none;background:var(--bg2);border-bottom:2px solid var(--accent2);
  padding:6px 14px;flex-shrink:0;
  flex-direction:row;align-items:center;gap:8px;
  font-family:var(--mono);font-size:12px;
  position:sticky;top:0;z-index:30;
}
#replace-bar.open{display:flex}
.rb-in{
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);
  color:var(--text);font-family:var(--mono);font-size:13px;
  padding:4px 9px;width:100px;letter-spacing:.5px;
}
.rb-in:focus{outline:none;border-color:var(--accent)}
.rb-btn{
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);
  color:var(--text2);cursor:pointer;font-family:var(--mono);font-size:11px;
  padding:4px 9px;transition:all .15s;white-space:nowrap;
}
.rb-btn:hover{border-color:var(--accent);color:var(--accent)}
.rb-btn.ok{background:var(--accent2);border-color:var(--accent);color:#fff}
.rb-btn.ok:hover{background:var(--accent)}
#rb-count{color:var(--amber);font-size:11px;min-width:50px}
.chord-tag.rb-hit{border-color:var(--amber)!important;background:rgba(255,184,64,.18)!important;color:#ffe08a!important}
.chord-tag.rb-curr{border-color:#fff!important;background:rgba(79,158,255,.25)!important;color:#fff!important;box-shadow:0 0 0 2px var(--amber)}

/* ⑧ 右パネル固定（スクロール連動しない） */
#panel-right{
  background:var(--bg2);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  position:sticky;top:0;height:calc(100vh - 47px);
}
/* ダイアグラム登録ボタンを下部にも固定 */
#diag-footer{
  padding:8px 10px;border-top:1px solid var(--border);flex-shrink:0;
}
#btn-add-diag-bottom{
  width:100%;background:var(--bg3);border:1px dashed var(--amber);
  border-radius:var(--radius);color:var(--amber);cursor:pointer;
  font-family:var(--mono);font-size:10px;padding:6px 8px;
  text-align:center;transition:all .15s;
}
#btn-add-diag-bottom:hover{background:rgba(255,184,64,.1)}

/* TOAST */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius2);color:var(--text);font-family:var(--mono);font-size:12px;padding:7px 18px;z-index:1000;pointer-events:none;transition:transform .25s cubic-bezier(.34,1.56,.64,1),opacity .25s;opacity:0}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* STATUS */
#status{background:var(--bg2);border-top:1px solid var(--border);padding:3px 14px;font-family:var(--mono);font-size:10px;color:var(--text3);display:flex;gap:14px;align-items:center;flex-shrink:0;grid-column:1/-1}
#status span{color:var(--text2)}

/* ════ TAP MODE OVERLAY ════ */
#tap-overlay{
  display:none;position:fixed;inset:0;z-index:400;
  background:#0a0d14;
  flex-direction:column;
}
#tap-overlay.open{display:flex}

#tap-ov-header{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;
}
#tap-ov-title{font-family:var(--mono);font-size:13px;color:var(--text2);flex:1}
#tap-ov-time{font-family:var(--mono);font-size:18px;font-weight:600;color:var(--text);letter-spacing:2px;min-width:100px;text-align:center}
#tap-ov-chord{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--chord-text);min-width:60px;text-align:center}

/* プレーヤーコントロール（オーバーレイ内） */
#tap-ov-ctrl{
  display:flex;align-items:center;gap:10px;
  background:var(--bg2);border-bottom:2px solid var(--border2);
  padding:8px 16px;flex-shrink:0;
}
#tap-ov-seek-wrap{flex:1;position:relative;height:20px;display:flex;align-items:center}
#tap-ov-seek-track{width:100%;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
#tap-ov-seek-fill{height:100%;background:var(--accent);border-radius:3px;width:0%;transition:width .1s linear}
#tap-ov-seek-in{position:absolute;width:100%;height:100%;opacity:0;cursor:pointer;top:0;left:0}

/* 歌詞スクロールエリア */
#tap-ov-lines{
  flex:1;overflow-y:auto;padding:16px;
  display:flex;flex-direction:column;gap:6px;
}
.tap-ov-line{
  display:flex;align-items:center;gap:12px;
  padding:10px 14px;border-radius:8px;
  border:1px solid transparent;
  cursor:pointer;transition:all .12s;
  position:relative;
}
.tap-ov-line:hover{background:var(--bg2);border-color:var(--border)}
.tap-ov-line.tov-active{
  background:rgba(79,158,255,.12);
  border-color:var(--accent);
}
.tap-ov-line.tov-tapped{
  background:rgba(61,220,132,.15);
  border-color:var(--green);
  transition:background 0s,border-color 0s;
}
.tov-time{
  font-family:var(--mono);font-size:11px;
  color:var(--amber);min-width:58px;flex-shrink:0;
  cursor:pointer;
}
.tov-time.no-t{color:var(--text3)}
.tov-time:hover{color:var(--accent)}
.tov-chords{display:flex;flex-wrap:wrap;gap:4px;flex-shrink:0;min-width:0}
.tov-chord-tag{
  background:linear-gradient(135deg,#1e3a6e,#162a52);
  border:1.5px solid #4a7fd4;border-radius:4px;
  color:#c8e4ff;font-family:var(--mono);font-size:13px;font-weight:700;
  padding:3px 9px;white-space:nowrap;
}
.tov-repeat{
  font-family:var(--mono);font-size:11px;font-weight:600;
  color:var(--amber);padding:2px 6px;
  background:rgba(255,184,64,.1);border:1px solid rgba(255,184,64,.35);
  border-radius:3px;
}
.tov-lyric{font-size:18px;color:var(--text);line-height:1.5;flex:1}
.tov-active .tov-lyric{font-size:20px;color:#fff;font-weight:700}

/* 大きなTAPボタン */
#tap-ov-tapbtn{
  flex-shrink:0;
  width:80px;height:80px;
  background:var(--bg3);
  border:3px solid var(--border2);
  border-radius:50%;
  color:var(--text2);cursor:pointer;
  font-family:var(--mono);font-size:13px;font-weight:700;
  letter-spacing:1px;
  transition:all .1s;user-select:none;
  display:flex;align-items:center;justify-content:center;
}
#tap-ov-tapbtn:hover{border-color:var(--green);color:var(--green)}
#tap-ov-tapbtn.tapping{
  background:var(--green);border-color:var(--green);color:#000;
  transform:scale(.94);
}
#tap-ov-tapbtn:disabled{opacity:.3;cursor:not-allowed}

/* フッター情報 */
#tap-ov-footer{
  background:var(--bg2);border-top:1px solid var(--border);
  padding:7px 16px;display:flex;align-items:center;gap:16px;
  font-family:var(--mono);font-size:11px;color:var(--text3);
  flex-shrink:0;
}
#tap-ov-footer span{color:var(--amber)}
.tov-hint{color:var(--text3);font-size:10px}

/* TAPモードを開くボタン */
#btn-tapmode{
  background:rgba(61,220,132,.12);
  border:1px solid var(--green);
  border-radius:var(--radius);color:var(--green);
  cursor:pointer;font-family:var(--mono);font-size:11px;
  font-weight:600;padding:5px 12px;white-space:nowrap;
  transition:all .15s;letter-spacing:.5px;
}
#btn-tapmode:hover{background:rgba(61,220,132,.25)}

<body>

<header id="header">

<main id="app">

      </div>
      <div class="file-row">
        <label>コード</label>
        <button class="file-btn" id="chord-btn" onclick="document.getElementById('file-chord').click()">JSON / CSV</button>

      <div class="capo-row">
        <label>Capo</label>
        <input type="number" id="capo" value="0" min="0" max="12">

    </div>

    <div class="phdr">

      <input type="text" id="pal-filter" placeholder="絞り込み (例: m7)">
    </div>
    <div id="pal-wrap">
      <div id="chord-pal"><div style="color:var(--text3);font-size:11px;font-family:var(--mono)">コードJSONを読み込むとここに表示されます</div></div>
      <div id="custom-row">
        <input type="text" id="custom-in" placeholder="手打ちで追加 (例: Gadd9)">
        <button id="custom-add">＋追加</button>
      </div>
    </div>
  </aside>

  <!-- CENTER -->
  <section id="panel-center">

    <div id="replace-bar">

      <input type="text" id="rb-find" class="rb-in" placeholder="検索コード">

      <input type="text" id="rb-replace" class="rb-in" placeholder="置換コード">
      <div style="display:flex;gap:4px;align-items:center">
        <label style="display:flex;align-items:center;gap:4px;color:var(--text3);font-size:10px;cursor:pointer;white-space:nowrap">
          <input type="radio" name="rb-scope" id="rb-all" checked style="accent-color:var(--accent)"> 全行
        </label>
        <label style="display:flex;align-items:center;gap:4px;color:var(--text3);font-size:10px;cursor:pointer;white-space:nowrap">
          <input type="radio" name="rb-scope" id="rb-focus" style="accent-color:var(--accent)"> 現在行
        </label>
      </div>
      <span id="rb-count">-</span>
      <button class="rb-btn" id="rb-prev">◀</button>

    </div>
  </aside>
</main>

// ════════════════════════════════════════
// SVG DIAGRAM RENDERER
// ════════════════════════════════════════
function drawDiagram(frets, barre) {
  const W=110,H=120,ST=6,FC=4;
  const mL=22,mT=28,sS=14,fS=18;
  const gW=sS*(ST-1), gH=fS*FC;
  // startFret: 表示開始フレット
  const pressed=frets.filter(f=>f>0);
  let sf=1;
  if(barre&&barre>0){
    sf=barre;
  } else if(pressed.length){
    const mn=Math.min(...pressed),mx=Math.max(...pressed);
    if(mx>4) sf=mn;
  }
  const C='#e2e6f0',MC='#ff5c5c',OC='#3ddc84',DC='#4f9eff',BC='rgba(79,158,255,.8)';
  let s=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  // ナット or フレット番号ラベル
  if(sf===1){
    s+=`<rect x="${mL}" y="${mT-5}" width="${gW}" height="6" rx="2" fill="${C}" opacity=".75"/>`;
  } else {
    s+=`<text x="${mL-5}" y="${mT+fS*.75}" font-size="12" font-weight="bold" fill="#bbc4d8" text-anchor="end" font-family="IBM Plex Mono,monospace">${sf}fr</text>`;
  }
  // フレット線
  for(let i=1;i<=FC;i++){const y=mT+i*fS;s+=`<line x1="${mL}" y1="${y}" x2="${mL+gW}" y2="${y}" stroke="${C}" stroke-width=".6" opacity=".3"/>`;}
  // 弦
  for(let i=0;i<ST;i++){const x=mL+i*sS;s+=`<line x1="${x}" y1="${mT}" x2="${x}" y2="${mT+gH}" stroke="${C}" stroke-width=".8" opacity=".45"/>`;}
  // ── セーハバー ──
  if(barre&&barre>0){
    const bf=barre-sf; // 0-indexed（sf=barreなので常に0）
    if(bf>=0&&bf<FC){
      const by=mT+bf*fS+fS/2;
      // ミュートでない最も外側の弦を探す
      let fi=0,li=ST-1;
      for(let i=0;i<ST;i++){if(frets[i]!==-1){fi=i;break;}}
      for(let i=ST-1;i>=0;i--){if(frets[i]!==-1){li=i;break;}}
      s+=`<rect x="${mL+fi*sS-4}" y="${by-7}" width="${(li-fi)*sS+8}" height="14" rx="7" fill="${BC}"/>`;
    }
  }
  // ドット
  for(let i=0;i<ST;i++){
    const f=frets[i],x=mL+i*sS;
    if(f===-1){
      s+=`<text x="${x}" y="${mT-13}" font-size="12" text-anchor="middle" fill="${MC}" font-family="sans-serif">✕</text>`;
    } else if(f===0){
      s+=`<circle cx="${x}" cy="${mT-15}" r="5" fill="none" stroke="${OC}" stroke-width="1.5"/>`;
    } else {
      const fp=f-sf;
      if(fp>=0&&fp<FC){
        const dy=mT+fp*fS+fS/2;
        const isBarreDot=(barre&&f===barre);
        // セーハドットはバーの上に小さく（バーで表現されるので補助的に）
        s+=`<circle cx="${x}" cy="${dy}" r="${isBarreDot?5:6}" fill="${DC}" opacity="${isBarreDot?.6:.95}"/>`;
      }
    }
  }
  return s+`</svg>`;
}

function lookupChord(name){
  if(!name||name==='N')return null;
  // オンコードを含む完全名でまず検索
  if(CHORD_DB[name])return{name,data:CHORD_DB[name]};
  const n0=name.replace(/♭/g,'b').replace(/♯/g,'#');
  if(CHORD_DB[n0])return{name:n0,data:CHORD_DB[n0]};
  // ベース音を除いたルートで検索
  const base=name.split('/')[0];
  if(CHORD_DB[base])return{name:base,data:CHORD_DB[base]};
  const nb=base.replace(/♭/g,'b').replace(/♯/g,'#');
  if(CHORD_DB[nb])return{name:nb,data:CHORD_DB[nb]};
  return null;
}

function showDiagramPanel(chord){
  document.getElementById('diag-title').textContent=chord||'';
  const c=document.getElementById('diag-container');
  if(!chord||chord==='N'){c.innerHTML='<div class="diag-empty">コードタグをホバー<br>または上で入力</div>';return;}
  const r=lookupChord(chord);
  const capoInfo=showCapoInfo(chord);
  if(!r){
    c.innerHTML=`${capoInfo}<div class="diag-empty">"${chord}"<br>のダイアグラムは未登録<br><br><small style="color:var(--amber)">↑「＋ダイアグラムを手動登録」<br>で追加できます</small></div>`;
    return;
  }
  c.innerHTML=capoInfo;
  r.data.v.forEach(vr=>{
    const d=document.createElement('div');d.className='dv';
    d.innerHTML=`<div class="dv-label">${vr.n}</div><div class="dv-svg">${drawDiagram(vr.f,vr.b||null)}</div>`;
    c.appendChild(d);
  });
}

function setDiagRight(chord){
  document.getElementById('diag-in').value=chord||'';
  showDiagramPanel(chord);
}

const CHORD_DB_BUILTIN_KEYS = new Set(Object.keys(CHORD_DB));

function diagKey(name){return name.replace(/\//g,'__SLASH__');}
function diagKeyDecode(k){return k.replace(/__SLASH__/g,'/');}

function saveCustomDiagrams() {
  const custom = {};
  for (const [k, v] of Object.entries(CHORD_DB)) {
    if (!CHORD_DB_BUILTIN_KEYS.has(k)) {
      custom[diagKey(k)] = v;
    } else {
      const customVariants = v.v.filter(vr => vr._custom);
      if (customVariants.length) custom[diagKey(k)] = { v: customVariants };
    }
  }
  try { localStorage.setItem('cs_customDiags', JSON.stringify(custom)); } catch(e) {}
}

function loadCustomDiagrams() {
  try {
    const saved = localStorage.getItem('cs_customDiags');
    if (!saved) return;
    const custom = JSON.parse(saved);
    for (const [rawK, v] of Object.entries(custom)) {
      const k = diagKeyDecode(rawK);
      if (!CHORD_DB[k]) CHORD_DB[k] = { v: [] };
      v.v.forEach(vr => {
        vr._custom = true;
        const ei = CHORD_DB[k].v.findIndex(x => x.n === vr.n);
        if (ei >= 0) CHORD_DB[k].v[ei] = vr; else CHORD_DB[k].v.push(vr);
      });
    }
  } catch(e) {}
}

// ════════════════════════════════════════
// CAPO 移調ロジック
// ════════════════════════════════════════
const NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTE_ALT={'Db':'C#','Eb':'D#','Fb':'E','Gb':'F#','Ab':'G#','Bb':'A#','Cb':'B'};

function noteToIdx(n){
  const norm=NOTE_ALT[n]||n;
  return NOTES.indexOf(norm);
}

function transposeRoot(root, semitones){
  // ♭/♯を正規化
  const norm=NOTE_ALT[root]||root;
  const idx=NOTES.indexOf(norm);
  if(idx<0)return root; // 不明なルートはそのまま
  const newIdx=(idx+semitones+12)%12;
  // 元がフラット系ならフラット表記に
  const flatRoots=['F','Bb','Eb','Ab','Db','Gb'];
  const sharpRoots=['C','G','D','A','E','B','F#','C#'];
  // 元のルートがフラット系だったらフラットで返す
  const origFlat=Object.keys(NOTE_ALT).includes(root)||root==='Bb'||root==='Eb'||root==='Ab'||root==='Db'||root==='Gb';
  const raw=NOTES[newIdx]; // C# 系
  if(origFlat){
    const flatMap={'C#':'Db','D#':'Eb','F#':'Gb','G#':'Ab','A#':'Bb'};
    return flatMap[raw]||raw;
  }
  return raw;
}

function transposeChord(chord, semitones){
  if(!chord||chord==='N'||semitones===0)return chord;
  // オンコード分離: Bb/D → root=Bb, bass=D
  const slashIdx=chord.indexOf('/');
  const main=slashIdx>=0?chord.slice(0,slashIdx):chord;
  const bass=slashIdx>=0?chord.slice(slashIdx+1):null;
  // ルートと質（suffix）を分離: C#m7 → root=C#, suffix=m7
  const m=main.match(/^([A-G][b#♭♯]?)(.*)/);
  if(!m)return chord;
  const [,root,suffix]=m;
  const newRoot=transposeRoot(root,semitones);
  let result=newRoot+suffix;
  if(bass){
    const bassM=bass.match(/^([A-G][b#♭♯]?)(.*)/);
    if(bassM){const [,br,bs]=bassM;result+=`/${transposeRoot(br,semitones)}${bs}`;}
    else result+=`/${bass}`;
  }
  return result;
}

function getCapo(){return parseInt(document.getElementById('capo').value)||0;}

// カポ適用済みコード名を返す（表示用）
// カポ=2 → 楽器は2フレット上 → 実音は+2、譜面コードは-2（楽器から見て下げる）
// ここでは「実際に押さえるコード形」→「出る音（実音コード）」を表示する
// ユーザーがカポ=2で「C」を押さえると「D」の音が出る
// コード譜は「押さえるフォーム」で書くので、カポ変更で変わるのは「鳴る音」の表記のみ
// → 今回はカポ=2のとき「D」と入力していれば「C（カポ2）」と表示する逆変換
// ユーザー要求：「カポを上下しても譜面のコードが変わらない」
// つまり現在の表示は変わらず、ただしカポに合わせた実音を参照表示する
// → 正しい実装：コード名はそのまま、右パネル「カポX = 実音Y」を表示する
// カポ入力でコードフォームが変わる（同じ実音を別フォームで押さえる）のが正解
// ここでは：コードタグのテキストはそのまま、右パネルダイアグラムにカポ考慮情報を付ける
// ＋ カポ変更時にパレットのコードも移調して選べるようにする
// → 要求の最もシンプルな解釈：左パレットとコードタグはそのまま、
//   ダイアグラムパネルに「カポX → 実音: Y」を表示する

function showCapoInfo(displayChord){
  const capo=getCapo();
  if(capo===0)return'';
  const realChord=transposeChord(displayChord, capo);
  return`<div style="font-size:10px;color:var(--amber);text-align:center;margin-top:4px;font-family:var(--mono)">カポ${capo} → 実音: ${realChord}</div>`;
}

function highlightLine(t){
  const rows=document.querySelectorAll('.line-row');
  let ai=-1;
  for(let i=project.lines.length-1;i>=0;i--){
    if(project.lines[i].time!=null&&project.lines[i].time<=t){ai=i;break;}
  }
  rows.forEach((r,i)=>r.classList.toggle('active-line',i===ai));
  if(ai>=0&&rows[ai]){
    scrollEditorToRow(rows[ai]);
  }
}

// editor-area内で指定行が中央付近に来るようスクロール
function scrollEditorToRow(rowEl){
  const area=document.getElementById('editor-area');
  if(!area)return;
  const areaRect=area.getBoundingClientRect();
  const rowRect=rowEl.getBoundingClientRect();
  // rowの現在のeditor-area内相対位置
  const relTop=rowRect.top - areaRect.top;
  const areaH=areaRect.height;
  const rowH=rowRect.height;
  // 上20%〜下75%の範囲内ならスクロール不要
  if(relTop>=areaH*0.2 && relTop+rowH<=areaH*0.75) return;
  // 目標スクロール位置：行をエリアの35%の位置に
  const target=area.scrollTop + relTop - areaH*0.35;
  area.scrollTo({top:Math.max(0,target),behavior:'smooth'});
}

    else{try{data=JSON.parse(ev.target.result);}catch{toast('JSONエラー');return;}}

function parseCSV(text){
  const ls=text.split('\n');const ch=[],ti=[];let prev=null;
  for(const l of ls){const p=l.trim().split(',');if(p.length<2)continue;const t=parseFloat(p[0]);if(isNaN(t))continue;const c=normChord(p[1].trim());if(c!==prev){ch.push(c);ti.push(t);prev=c;}}
  return{chords:ch,times:ti,duration:ti[ti.length-1]+2||0};
}
function normChord(raw){
  if(!raw||['N','X','n'].includes(raw))return'N';
  const Q={maj:'',min:'m',maj7:'maj7',min7:'m7',dom7:'7','7':'7',dim:'dim',aug:'aug',sus2:'sus2',sus4:'sus4',hdim7:'m7b5',maj9:'maj9',min9:'m9',add9:'add9'};
  if(raw.includes(':')){const[root,q]=raw.split(':',2);return root+(Q[q]??q);}return raw;
}
function loadChordData(data,filename){
  project.chord_source=filename;
  const b=document.getElementById('chord-btn');b.textContent=filename;b.classList.add('loaded');
  const all=(data.chords||[]).filter(c=>c&&c!=='N');
  palette=[...new Set(all)];
  window._cn=data.chords||[];window._ct=data.times||[];
  renderPalette();document.getElementById('pal-count').textContent=palette.length;
  toast(`コード読み込み: ${palette.length}種`);
}

function addChordToLine(chord){

  project.lines[focLine].chords.push({chord,offset:0});
  renderLines();autoSave();
  setTimeout(()=>{const ins=document.querySelectorAll('.lyric-input');if(ins[focLine])ins[focLine].focus();},0);
}

function renderLines(){
  const cont=document.getElementById('lines-cont');
  cont.innerHTML='';
  project.lines.forEach((line,idx)=>{
    const row=document.createElement('div');row.className='line-row';row.dataset.idx=idx;

    // 行番号
    const num=document.createElement('div');num.className='line-num';num.textContent=idx+1;

    // 時刻ボタン
    const tb=document.createElement('button');
    tb.className='line-time'+(line.time!=null?' has-t':'');
    tb.textContent=line.time!=null?fmt(line.time,true):'--:--.--';
    tb.addEventListener('click',()=>openTimeModal(idx));

    // コンテンツエリア
    const cont2=document.createElement('div');cont2.className='line-content';

    // ── コードタグ行（折り返し対応）──
    const tags=document.createElement('div');tags.className='chord-tags';

    // リピートバッジ
    if(line.repeat){
      const badge=document.createElement('span');badge.className='repeat-badge';
      badge.innerHTML=`<span>× ${line.repeat.count}</span><span style="font-size:10px;opacity:.7">回</span><span class="rb-del" title="削除">✕</span>`;
      badge.querySelector('.rb-del').addEventListener('click',e=>{e.stopPropagation();project.lines[idx].repeat=null;renderLines();autoSave();});
      badge.addEventListener('click',e=>{if(e.target.classList.contains('rb-del'))return;openRepeatModal(idx);});
      tags.appendChild(badge);
    }

    // コードタグ（削除ボタン大きく）＋セパレーター「/」対応
    line.chords.forEach((c,ci)=>{
      // セパレーターアイテム
      if(c.type==='sep'){
        const sep=document.createElement('span');
        sep.className='chord-sep';sep.textContent='/';
        sep.title='クリックで削除';
        sep.addEventListener('click',e=>{
          e.stopPropagation();
          project.lines[idx].chords.splice(ci,1);renderLines();autoSave();
        });
        tags.appendChild(sep);return;
      }
      // コードタグ本体
      const tagWrap=document.createElement('span');tagWrap.className='chord-tag-wrap';
      const tag=document.createElement('span');tag.className='chord-tag';
      const ns=document.createElement('span');ns.className='chord-name';ns.textContent=c.chord;
      tag.appendChild(ns);
      tag.addEventListener('click',e=>{if(e.target.classList.contains('del-x'))return;openChordEdit(idx,ci);});
      tag.addEventListener('mouseenter',()=>{if(!diagOn)return;setDiagRight(c.chord);showPopup(c.chord,tag);});
      tag.addEventListener('mouseleave',hidePopup);
      const dx=document.createElement('span');dx.className='del-x';dx.textContent='✕';dx.title='削除';
      dx.addEventListener('click',e=>{e.stopPropagation();project.lines[idx].chords.splice(ci,1);renderLines();autoSave();});
      tag.appendChild(dx);
      tagWrap.appendChild(tag);
      // タグの右に「/挿入」ミニボタン（ホバーで表示）
      const insertSep=document.createElement('button');
      insertSep.className='insert-sep-btn';insertSep.textContent='/';
      insertSep.title=`${c.chord}の後に小節線を挿入`;
      insertSep.addEventListener('click',e=>{
        e.stopPropagation();
        // ci+1の位置にsepを挿入
        project.lines[idx].chords.splice(ci+1,0,{type:'sep'});
        renderLines();autoSave();
      });
      tagWrap.appendChild(insertSep);
      tags.appendChild(tagWrap);
    });

    // +コード / +/ ボタン
    const acb=document.createElement('button');acb.className='add-chord-btn';acb.textContent='+コード';
    acb.addEventListener('click',()=>openAddChord(idx));
    const asb=document.createElement('button');asb.className='add-sep-btn';asb.textContent='+/';
    asb.title='小節区切り「/」を追加';
    asb.addEventListener('click',()=>{
      project.lines[idx].chords.push({type:'sep'});renderLines();autoSave();
    });
    tags.appendChild(acb);tags.appendChild(asb);
    cont2.appendChild(tags);

    // 歌詞入力
    const li=document.createElement('input');li.type='text';li.className='lyric-input';
    li.value=line.lyric;li.placeholder='歌詞を入力...';
    li.addEventListener('focus',()=>{focLine=idx;tapIdx=idx;});
    li.addEventListener('input',e=>{project.lines[idx].lyric=e.target.value;autoSave();});
    li.addEventListener('keydown',e=>{
      if(e.key==='Enter'){e.preventDefault();project.lines.splice(idx+1,0,mkLine());renderLines();setTimeout(()=>{const ins=document.querySelectorAll('.lyric-input');if(ins[idx+1])ins[idx+1].focus();},0);}
      if(e.key==='Backspace'&&!e.target.value&&project.lines.length>1){e.preventDefault();project.lines.splice(idx,1);renderLines();autoSave();setTimeout(()=>{const ins=document.querySelectorAll('.lyric-input');if(ins[Math.max(0,idx-1)])ins[Math.max(0,idx-1)].focus();},0);}
    });
    cont2.appendChild(li);
    row.appendChild(num);row.appendChild(tb);row.appendChild(cont2);

    // ── ホバーアクション ──
    const acts=document.createElement('div');acts.className='line-acts';
    const mk=(t,cl,title,fn)=>{const b=document.createElement('button');b.className=`la ${cl}`;b.textContent=t;if(title)b.title=title;b.addEventListener('click',fn);return b;};
    acts.appendChild(mk('⏱','','次TAPでこの行に時刻セット',()=>{tapIdx=idx;toast(`次のTAPで行${idx+1}に時刻セット`);}));
    acts.appendChild(mk('🔁 リピート','am','リピート記号を追加/編集',()=>openRepeatModal(idx)));
    acts.appendChild(mk('📋 コピー','gn','コードを別の行にコピー',()=>openCopyModal(idx)));
    acts.appendChild(mk('↑挿入','','上に空行を挿入',()=>{project.lines.splice(idx,0,mkLine());renderLines();autoSave();}));
    acts.appendChild(mk('削除','del','',()=>{project.lines.splice(idx,1);renderLines();autoSave();}));
    row.appendChild(acts);
    cont.appendChild(row);
  });
  updateStatus();
}

function mkMBtn(txt,cls,fn){const b=document.createElement('button');b.className=`mbtn ${cls||''}`;b.textContent=txt;b.addEventListener('click',fn);return b;}

// 時刻モーダル
function openTimeModal(idx){
  const line=project.lines[idx];
  mTit.textContent=`行${idx+1}の時刻を設定`;
  mBody.innerHTML=`
    <div style="margin-bottom:8px;color:var(--text2);font-size:12px;font-family:var(--mono)">「${line.lyric||'(空)'}」</div>
    <div style="display:flex;gap:8px;align-items:center">
      <input type="number" id="mi-t" class="mi" value="${line.time!=null?line.time.toFixed(3):''}" step="0.1" min="0" placeholder="秒 (例: 12.500)" style="font-size:13px">
      <button onclick="document.getElementById('mi-t').value=aEl.currentTime.toFixed(3)" class="sm-btn" style="white-space:nowrap">▶ 現在位置</button>
    </div>`;
  mBtns.appendChild(mkMBtn('キャンセル','',closeMod));
  mBtns.appendChild(mkMBtn('時刻を削除','del',()=>{project.lines[idx].time=null;renderLines();autoSave();closeMod();}));
  mBtns.appendChild(mkMBtn('セット','ok',()=>{const v=parseFloat(document.getElementById('mi-t').value);if(!isNaN(v)){project.lines[idx].time=v;renderLines();autoSave();}closeMod();}));
  mOv.classList.add('open');
  setTimeout(()=>{const el=document.getElementById('mi-t');if(el)el.focus();},80);
}

function addToPaletteIfNew(chord){
  if(chord&&chord!=='N'&&!palette.includes(chord)){
    palette.push(chord);
    renderPalette();
    document.getElementById('pal-count').textContent=palette.length;
  }
}

// コード追加モーダル
function openAddChord(idx){
  mTit.textContent=`行${idx+1}にコードを追加`;
  const palHtml=palette.length?`<div style="margin-top:10px"><div style="font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:5px">楽曲のコードから選択:</div><div style="display:flex;flex-wrap:wrap;gap:4px;max-height:130px;overflow-y:auto">${palette.map(c=>`<button class="pal-chord" style="font-size:11px" onclick="_qa(${idx},'${c.replace(/'/g,"\\'").replace(/\//g,'\\/')}')">${c}</button>`).join('')}</div></div>`:'';
  mBody.innerHTML=`
    <div style="font-size:11px;color:var(--text2);font-family:var(--mono);margin-bottom:6px">コード名を入力 (例: Am7, Bb/D, Cadd9)</div>
    <input type="text" id="mi-c" class="mi" placeholder="コード名" autocomplete="off" style="font-size:16px;letter-spacing:2px">
    ${palHtml}`;
  window._qa=(li,ch)=>{addToPaletteIfNew(ch);project.lines[li].chords.push({chord:ch,offset:0});renderLines();autoSave();closeMod();};
  mBtns.appendChild(mkMBtn('キャンセル','',closeMod));
  mBtns.appendChild(mkMBtn('追加','ok',()=>{
    const v=document.getElementById('mi-c').value.trim();

    closeMod();
  }));
  mOv.classList.add('open');
  setTimeout(()=>{const el=document.getElementById('mi-c');if(el){el.focus();el.addEventListener('keydown',e=>{if(e.key==='Enter')mBtns.querySelector('.ok').click();});}},80);

// コード編集モーダル
function openChordEdit(idx,ci){
  const c=project.lines[idx].chords[ci];
  mTit.textContent='コードを編集';
  mBody.innerHTML=`<input type="text" id="mi-c" class="mi" value="${c.chord}" style="font-size:18px;letter-spacing:2px" autocomplete="off">`;
  mBtns.appendChild(mkMBtn('キャンセル','',closeMod));
  mBtns.appendChild(mkMBtn('削除','del',()=>{project.lines[idx].chords.splice(ci,1);renderLines();autoSave();closeMod();}));
  mBtns.appendChild(mkMBtn('更新','ok',()=>{
    const v=document.getElementById('mi-c').value.trim();
    if(v){addToPaletteIfNew(v);project.lines[idx].chords[ci].chord=v;renderLines();autoSave();}
    closeMod();
  }));
  mOv.classList.add('open');
  setTimeout(()=>{const el=document.getElementById('mi-c');if(el){el.focus();el.select();el.addEventListener('keydown',e=>{if(e.key==='Enter')mBtns.querySelector('.ok').click();});el.addEventListener('input',()=>setDiagRight(el.value));}},80);
}

// リピートモーダル
function openRepeatModal(idx){
  const line=project.lines[idx];
  let cnt=line.repeat?line.repeat.count:2;
  mTit.textContent=`行${idx+1}のリピート設定`;
  mBody.innerHTML=`
    <div style="margin-bottom:10px;color:var(--text2);font-size:12px;font-family:var(--mono)">イントロ・リフなどの繰り返し回数を設定します</div>
    <div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:12px">
      <button id="r-minus" class="sm-btn" style="font-size:22px;padding:4px 14px;line-height:1">−</button>
      <div style="text-align:center">
        <div id="r-cnt" style="font-family:var(--mono);font-size:40px;font-weight:700;color:var(--amber);min-width:64px;text-align:center">${cnt}</div>
        <div style="font-size:11px;color:var(--text3);font-family:var(--mono)">回繰り返し</div>
      </div>
      <button id="r-plus" class="sm-btn" style="font-size:22px;padding:4px 14px;line-height:1">＋</button>
    </div>
    <div style="display:flex;gap:5px;justify-content:center;flex-wrap:wrap">
      ${[2,3,4,8,16].map(n=>`<button class="pal-chord" style="font-size:13px" onclick="_sr(${n})">${n}回</button>`).join('')}
    </div>`;
  window._sr=(n)=>{cnt=n;document.getElementById('r-cnt').textContent=n;};
  document.getElementById('r-minus').addEventListener('click',()=>{cnt=Math.max(2,cnt-1);document.getElementById('r-cnt').textContent=cnt;});
  document.getElementById('r-plus').addEventListener('click',()=>{cnt++;document.getElementById('r-cnt').textContent=cnt;});
  mBtns.appendChild(mkMBtn('キャンセル','',closeMod));
  if(line.repeat)mBtns.appendChild(mkMBtn('リピート削除','del',()=>{project.lines[idx].repeat=null;renderLines();autoSave();closeMod();}));
  mBtns.appendChild(mkMBtn('セット','ok',()=>{project.lines[idx].repeat={count:cnt};renderLines();autoSave();closeMod();}));
  mOv.classList.add('open');
}

// コードコピーモーダル
function openCopyModal(fromIdx){
  const line=project.lines[fromIdx];
  if(!line.chords.length){toast('コードがありません');return;}
  mTit.textContent=`行${fromIdx+1}のコードをコピー`;
  const prev=line.chords.map(c=>`<span class="chord-tag" style="pointer-events:none"><span>${c.chord}</span></span>`).join('');
  const rows=project.lines.map((l,i)=>i===fromIdx?'':
    `<label style="display:flex;align-items:center;gap:8px;padding:5px 8px;background:var(--bg3);border-radius:4px;cursor:pointer">
      <input type="checkbox" data-to="${i}" style="width:15px;height:15px;accent-color:var(--accent)">
      <span style="font-family:var(--mono);font-size:11px;color:var(--text3);flex-shrink:0">行${i+1}</span>
      <span style="font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.lyric||'(空)'}</span>
      ${l.chords.length?`<span style="font-size:10px;color:var(--chord-text);font-family:var(--mono)">[${l.chords.map(c=>c.chord).join(' ')}]</span>`:''}
    </label>`
  ).join('');
  mBody.innerHTML=`
    <div style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:5px">コピー元:</div>
    <div style="display:flex;flex-wrap:wrap;gap:4px;padding:7px;background:var(--bg3);border-radius:6px;margin-bottom:8px">${prev}${line.repeat?`<span class="repeat-badge" style="pointer-events:none">× ${line.repeat.count}回</span>`:''}</div>
    <div style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:4px">コピー先（複数選択可）:</div>
    <div style="max-height:180px;overflow-y:auto;display:flex;flex-direction:column;gap:3px" id="copy-list">${rows}</div>
    <label style="display:flex;align-items:center;gap:8px;margin-top:8px;cursor:pointer;padding:5px 0;border-top:1px solid var(--border)">
      <input type="checkbox" id="copy-repeat" ${line.repeat?'checked':''} style="width:14px;height:14px;accent-color:var(--amber)">
      <span style="font-size:11px;font-family:var(--mono);color:var(--amber)">リピート記号もコピーする</span>
      <span style="font-size:10px;color:var(--text3);font-family:var(--mono)">${line.repeat?`(× ${line.repeat.count}回)`:'(元行にリピートなし)'}</span>
    </label>
    <div style="margin-top:4px;font-size:10px;color:var(--text3);font-family:var(--mono)">「追記」= コードを既存の後ろに追加　「上書き」= コード・リピートを置き換え</div>`;
  const doCopy=replace=>{
    const cbs=document.querySelectorAll('#copy-list input:checked');
    if(!cbs.length){toast('コピー先を選択してください');return;}
    const src=line.chords.map(c=>({...c}));
    const copyRepeat=document.getElementById('copy-repeat').checked;
    cbs.forEach(cb=>{
      const ti=parseInt(cb.dataset.to);
      project.lines[ti].chords=replace?src.map(c=>({...c})):[...project.lines[ti].chords,...src.map(c=>({...c}))];
      if(copyRepeat&&line.repeat){project.lines[ti].repeat={...line.repeat};}
      else if(replace&&!copyRepeat){/* 上書き時はリピートを変えない */}
    });
    renderLines();autoSave();closeMod();toast(`${cbs.length}行に${replace?'上書き':'追記'}${copyRepeat&&line.repeat?' (リピート込み)':''}しました`);
  };
  mBtns.appendChild(mkMBtn('キャンセル','',closeMod));
  mBtns.appendChild(mkMBtn('上書き','am',()=>doCopy(true)));
  mBtns.appendChild(mkMBtn('追記','ok',()=>doCopy(false)));
  mOv.classList.add('open');
}

function showPopup(chord,anchor){
  if(!diagOn)return;

    pv.appendChild(d);
  });
  const rect=anchor.getBoundingClientRect();
  popEl.style.left=rect.left+'px';popEl.style.top=(rect.top-10)+'px';

    const pr=popEl.getBoundingClientRect();

// SAVE / LOAD（File System Access API対応）
// ════════════════════════════════════════
function getProj(){return{title:document.getElementById('project-title').value,audio:project.audio,capo:parseInt(document.getElementById('capo').value)||0,lines:project.lines,chord_source:project.chord_source};}

let _fileHandle = null; // 保存先ファイルハンドル

async function saveToHandle(handle, data) {
  const writable = await handle.createWritable();
  await writable.write(JSON.stringify(data, null, 2));
  await writable.close();
}

async function saveProject(forceNew = false) {
  const data = getProj();
  const title = data.title || 'chordscore';
  const suggestedName = title.replace(/[^\w\-ぁ-ん一-龯ァ-ヶ]/g,'_') + '_project.json';

  // File System Access API対応ブラウザ
  if (window.showSaveFilePicker) {
    try {
      if (!_fileHandle || forceNew) {
        _fileHandle = await window.showSaveFilePicker({
          suggestedName,
          types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }],
        });
      }
      await saveToHandle(_fileHandle, data);
      const fn = _fileHandle.name;
      document.getElementById('st-save').textContent = fn + ' ' + new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      toast(`💾 保存: ${fn}`);
      autoSave();
    } catch(e) {
      if (e.name !== 'AbortError') { toast('保存エラー: ' + e.message); }
    }
  } else {
    // フォールバック：従来のダウンロード
    const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=suggestedName; a.click();
    URL.revokeObjectURL(url);
    toast(`💾 保存: ${suggestedName}`);
    autoSave();
  }
}

});

function syncTovPlayer() {
  const tovPlay = document.getElementById('tov-play-btn');
  tovPlay.textContent = aEl.paused ? '▶' : '⏸';
  const d = aEl.duration || 0;

tovSeekIn.addEventListener('mouseup', () => {
  tovSeeking = false;
  aEl.currentTime = (tovSeekIn.value / 1000) * (aEl.duration || 0);
});

  document.getElementById('tap-ov-seek-fill').style.width = pct + '%';

});
aEl.addEventListener('pause', () => {

function updateTovTime() {
  if (!document.getElementById('tap-overlay').classList.contains('open')) return;
  const t = aEl.currentTime;
  const d = aEl.duration || 0;
  document.getElementById('tap-ov-time').textContent = fmt(t, true);
  if (d > 0 && !tovSeeking) {
    document.getElementById('tap-ov-seek-fill').style.width = (t / d * 100) + '%';
    document.getElementById('tap-ov-seek-in').value = Math.round(t / d * 1000);
  }
  // 現在コード
  if (window._ct && window._cn) {
    let cur = '-';
    for (let i = 0; i < window._ct.length; i++) { if (window._ct[i] <= t) cur = window._cn[i]; else break; }
    document.getElementById('tap-ov-chord').textContent = cur;
  }
  // アクティブ行ハイライト＋スクロール
  let ai = -1;
  for (let i = project.lines.length - 1; i >= 0; i--) {
    if (project.lines[i].time != null && project.lines[i].time <= t) { ai = i; break; }
  }
  const rows = document.querySelectorAll('.tap-ov-line');
  rows.forEach((r, i) => r.classList.toggle('tov-active', i === ai));
  if (ai >= 0 && rows[ai]) {
    const area = document.getElementById('tap-ov-lines');
    const el = rows[ai];
    const top = el.offsetTop;
    const h = area.clientHeight;
    const target = top - h * 0.35;
    if (top < area.scrollTop + h * 0.15 || top + el.offsetHeight > area.scrollTop + h * 0.85) {
      area.scrollTo({ top: Math.max(0, target), behavior: 'smooth' });
    }
  }
  updateTovStatus();
}

// TAPボタン（オーバーレイ）
const tovTapBtn = document.getElementById('tap-ov-tapbtn');
tovTapBtn.addEventListener('click', () => {
  if (!aEl.src) return;
  const t = aEl.currentTime;
  let idx = tovFocusIdx;
  if (idx < 0 || idx >= project.lines.length) {
    idx = project.lines.findIndex(l => l.time == null);
  }
  if (idx < 0) idx = 0;
  if (idx < project.lines.length) {
    project.lines[idx].time = parseFloat(t.toFixed(3));
    // 次の行に自動フォーカス
    tovFocusIdx = idx + 1;
    renderTovLines();
    autoSave();
    // TAP視覚フィードバック
    const rows = document.querySelectorAll('.tap-ov-line');
    if (rows[idx]) {
      rows[idx].classList.add('tov-tapped');
      setTimeout(() => rows[idx].classList.remove('tov-tapped'), 350);
    }
    // フォーカス行が画面外なら次の行へスクロール
    if (tovFocusIdx < project.lines.length && rows[tovFocusIdx]) {
      const area = document.getElementById('tap-ov-lines');
      const nextEl = rows[tovFocusIdx];
      const top = nextEl.offsetTop;
      const h = area.clientHeight;
      if (top > area.scrollTop + h * 0.6) {
        area.scrollTo({ top: top - h * 0.35, behavior: 'smooth' });
      }
    }
  }
  // ボタンアニメ
  tovTapBtn.classList.add('tapping');
  setTimeout(() => tovTapBtn.classList.remove('tapping'), 150);
});

// Spaceキーでも TAP（オーバーレイが開いているとき）
document.addEventListener('keydown', e => {
  if (!document.getElementById('tap-overlay').classList.contains('open')) return;
  if (e.code === 'Space') { e.preventDefault(); tovTapBtn.click(); }
  if (e.code === 'ArrowLeft') aEl.currentTime = Math.max(0, aEl.currentTime - 5);
  if (e.code === 'ArrowRight') aEl.currentTime = Math.min(aEl.duration || 0, aEl.currentTime + 5);
  if (e.code === 'Escape') closeTapMode();
});

function renderTovLines() {
  const area = document.getElementById('tap-ov-lines');
  area.innerHTML = '';
  project.lines.forEach((line, idx) => {
    const row = document.createElement('div');
    row.className = 'tap-ov-line';
    if (idx === tovFocusIdx) row.style.borderColor = 'var(--green)';

    // 時刻（クリックで削除）
    const timeEl = document.createElement('div');
    timeEl.className = 'tov-time' + (line.time != null ? '' : ' no-t');
    timeEl.textContent = line.time != null ? fmt(line.time, true) : '--:--.--';
    timeEl.title = line.time != null ? 'クリックで時刻を削除' : '未設定';
    timeEl.addEventListener('click', e => {
      e.stopPropagation();
      if (line.time != null) { project.lines[idx].time = null; renderTovLines(); autoSave(); }
    });

    // リピートバッジ
    const chordWrap = document.createElement('div');
    chordWrap.className = 'tov-chords';
    if (line.repeat) {
      const rb = document.createElement('span');
      rb.className = 'tov-repeat';
      rb.textContent = `×${line.repeat.count}`;
      chordWrap.appendChild(rb);
    }
    line.chords.forEach(c => {
      if(c.type==='sep'){
        const sp=document.createElement('span');
        sp.style.cssText='color:var(--text3);font-size:15px;padding:0 1px;align-self:center';
        sp.textContent='/';chordWrap.appendChild(sp);return;
      }
      const ct = document.createElement('span');
      ct.className = 'tov-chord-tag';
      ct.textContent = c.chord;
      chordWrap.appendChild(ct);
    });

    // 歌詞
    const lyricEl = document.createElement('div');
    lyricEl.className = 'tov-lyric';
    lyricEl.textContent = line.lyric || '(空)';

    // 行クリック→フォーカス設定
    row.addEventListener('click', () => {
      tovFocusIdx = idx;
      renderTovLines();
      toast(`行${idx + 1}にフォーカス — TAP で時刻をセット`);
    });

    row.appendChild(timeEl);
    row.appendChild(chordWrap);
    row.appendChild(lyricEl);
    area.appendChild(row);
  });
  updateTovStatus();
}

  const timed = project.lines.filter(l => l.time != null).length;

// ════════════════════════════════════════
let rbSnapshot = null;   // Undo用スナップショット
let rbHits = [];         // [{lineIdx, chordIdx}]
let rbCurr = -1;         // 現在ハイライト位置

function rbGetFind(){ return document.getElementById('rb-find').value.trim(); }
function rbGetRepl(){ return document.getElementById('rb-replace').value.trim(); }
function rbScopeAll(){ return document.getElementById('rb-all').checked; }

// ヒットリストを更新してタグをハイライト
function rbRefresh(){
  // 既存ハイライトをクリア
  document.querySelectorAll('.chord-tag.rb-hit,.chord-tag.rb-curr').forEach(el=>{
    el.classList.remove('rb-hit','rb-curr');
  });
  rbHits=[];
  const find=rbGetFind();
  if(!find){document.getElementById('rb-count').textContent='-';rbCurr=-1;return;}

  const scopeAll=rbScopeAll();
  const targetLines=scopeAll
    ? project.lines.map((_,i)=>i)
    : (focLine>=0?[focLine]:[]);

  targetLines.forEach(li=>{
    project.lines[li].chords.forEach((c,ci)=>{
      if(c.type==='sep')return;
      if(c.chord===find) rbHits.push({li,ci});
    });
  });

  document.getElementById('rb-count').textContent=
    rbHits.length ? `${rbHits.length}件` : '0件';

  // ヒットタグを黄色に
  rbHits.forEach(({li,ci})=>{
    const tag=document.querySelector(`.line-row[data-idx="${li}"] .chord-tag:nth-child(${ci+2})`);
    // nth-child はリピートバッジの分ズレるので data属性で探す
  });
  // data属性ベースで確実にハイライト
  rbHighlightAll();
  if(rbCurr>=rbHits.length) rbCurr=0;
  rbScrollToCurrent();
}

function rbHighlightAll(){
  // まずレンダリング済みタグを全走査
  document.querySelectorAll('.chord-tag').forEach(tag=>{
    const nameEl=tag.querySelector('.chord-name');
    if(!nameEl)return;
    const chord=nameEl.textContent;
    const find=rbGetFind();
    if(chord===find) tag.classList.add('rb-hit');
    else tag.classList.remove('rb-hit','rb-curr');
  });
}

function rbScrollToCurrent(){
  if(rbCurr<0||rbCurr>=rbHits.length){
    document.getElementById('rb-count').textContent=
      rbHits.length?`${rbHits.length}件`:'0件';
    return;
  }
  document.getElementById('rb-count').textContent=
    `${rbCurr+1} / ${rbHits.length}件`;
  const {li}=rbHits[rbCurr];

  // editor-area内スクロール（scrollEditorToRowで統一）
  const rows=document.querySelectorAll('.line-row');
  if(rows[li]) scrollEditorToRow(rows[li]);

  // 現在ハイライトをrb-currに
  document.querySelectorAll('.chord-tag.rb-curr').forEach(el=>el.classList.remove('rb-curr'));
  rbHits.forEach((h,i)=>{
    if(i!==rbCurr)return;
    const row=rows[h.li];
    if(!row)return;
    const nonSepIdx=project.lines[h.li].chords.slice(0,h.ci+1).filter(c=>c.type!=='sep').length-1;
    const allTags=row.querySelectorAll('.chord-tag');
    if(allTags[nonSepIdx]) allTags[nonSepIdx].classList.add('rb-curr');
  });
}

document.getElementById('rb-find').addEventListener('input',()=>{rbCurr=0;rbRefresh();});
document.getElementById('rb-replace').addEventListener('input',()=>{});
document.getElementById('rb-all').addEventListener('change',()=>{rbCurr=0;rbRefresh();});
document.getElementById('rb-focus').addEventListener('change',()=>{rbCurr=0;rbRefresh();});

document.getElementById('rb-next').addEventListener('click',()=>{
  if(!rbHits.length){rbRefresh();return;}
  rbCurr=(rbCurr+1)%rbHits.length;
  rbHighlightAll();rbScrollToCurrent();
  // フォーカスを検索欄に戻してバーを閉じないようにする
  setTimeout(()=>document.getElementById('rb-find').focus(),10);
});
document.getElementById('rb-prev').addEventListener('click',()=>{
  if(!rbHits.length){rbRefresh();return;}
  rbCurr=(rbCurr-1+rbHits.length)%rbHits.length;
  rbHighlightAll();rbScrollToCurrent();

document.getElementById('rb-one').addEventListener('click',()=>{
  if(!rbHits.length||rbCurr<0||rbCurr>=rbHits.length)return;
  const repl=rbGetRepl();
  const {li,ci}=rbHits[rbCurr];
  if(!rbSnapshot) rbSnapshot=JSON.stringify(project.lines);
  document.getElementById('rb-undo').disabled=false;
  if(repl===''){
    project.lines[li].chords.splice(ci,1);
  } else {
    project.lines[li].chords[ci].chord=repl;
    addToPaletteIfNew(repl);
  }
  renderLines();autoSave();
  rbHits=[];rbCurr=0;rbRefresh();
  toast(`1つ置換しました`);
  setTimeout(()=>document.getElementById('rb-find').focus(),10);
});

document.getElementById('rb-all-btn').addEventListener('click',()=>{
  const find=rbGetFind();
  const repl=rbGetRepl();
  if(!find)return;
  rbSnapshot=JSON.stringify(project.lines);
  document.getElementById('rb-undo').disabled=false;
  const scopeAll=rbScopeAll();
  let count=0;
  project.lines.forEach((line,li)=>{
    if(!scopeAll&&li!==focLine)return;
    for(let ci=line.chords.length-1;ci>=0;ci--){
      const c=line.chords[ci];
      if(c.type==='sep'||c.chord!==find)continue;
      if(repl==='') line.chords.splice(ci,1);
      else { line.chords[ci].chord=repl; addToPaletteIfNew(repl); }
      count++;
    }
  });
  renderLines();autoSave();
  rbHits=[];rbCurr=0;rbRefresh();
  toast(`${count}件置換しました`);
});

document.getElementById('rb-undo').addEventListener('click',()=>{
  if(!rbSnapshot)return;
  project.lines=JSON.parse(rbSnapshot);
  rbSnapshot=null;
  document.getElementById('rb-undo').disabled=true;

  rbHits=[];rbCurr=0;rbRefresh();
  toast('置換を元に戻しました');
});

// カポ変更：前の値との差分で全コードを移調（確認なし・即時）
let _prevCapo = 0;
document.getElementById('capo').addEventListener('change',()=>{
  const newCapo=parseInt(document.getElementById('capo').value)||0;
  const diff=newCapo-_prevCapo;
  if(diff===0)return;
  // カポが増える(0→2)＝同じ音を出すためコードフォームは下げる(-2半音)
  // カポが減る(2→0)＝コードフォームは上げる(+2半音)
  const semitones=-diff;
  project.lines.forEach(line=>{
    line.chords.forEach(c=>{
      if(c.type==='sep')return;
      c.chord=transposeChord(c.chord,semitones);
    });
  });
  palette=palette.map(ch=>transposeChord(ch,semitones));
  renderPalette();
  renderLines();
  _prevCapo=newCapo;
  autoSave();
  const cur=document.getElementById('diag-in').value.trim();
  if(cur) showDiagramPanel(cur);
  toast(`カポ${newCapo}: 全コードを${Math.abs(diff)}半音${diff>0?'下':'上'}に移調`);
});

    diagOn = false;
    diagToggleBtn.textContent = '🎸 ダイアグラム OFF';
    diagToggleBtn.classList.add('off');
  }
  try{
    const saved=localStorage.getItem('cs_auto');
    if(saved){const data=JSON.parse(saved);if(data.lines&&data.lines.length>0&&confirm(`前回の作業「${data.title||'無題'}」(${data.lines.length}行) を復元しますか？`)){loadProj(data);toast('自動保存データを復元しました');}}
  }catch(e){}
  renderLines();renderPalette();

  // ⑧ 右パネル下部登録ボタン接続
  const btnAddDiagBottom=document.getElementById('btn-add-diag-bottom');
  if(btnAddDiagBottom) btnAddDiagBottom.addEventListener('click',()=>{
    const chord=document.getElementById('diag-in').value.trim();
    openAddDiagramModal(chord);
  });
});
</script>
</body>
</html>
