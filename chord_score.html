<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChordScore Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   CSS VARIABLES & RESET
═══════════════════════════════════════ */
:root {
  --bg:        #0f1117;
  --bg2:       #171a24;
  --bg3:       #1e2130;
  --border:    #2a2f45;
  --border2:   #3a4060;
  --text:      #e2e6f0;
  --text2:     #8890a8;
  --text3:     #555e7a;
  --accent:    #4f9eff;
  --accent2:   #2d6fd4;
  --green:     #3ddc84;
  --amber:     #ffb840;
  --red:       #ff5c5c;
  --chord-bg:  #1a2540;
  --chord-border: #2e4a8a;
  --chord-text: #7eb8ff;
  --tap-active: #3ddc84;
  --radius:    6px;
  --radius2:   10px;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Noto Sans JP', sans-serif;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* ═══════════════════════════════════════
   SCROLLBAR
═══════════════════════════════════════ */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ═══════════════════════════════════════
   HEADER
═══════════════════════════════════════ */
#header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 100;
}
#header .logo {
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: -0.5px;
  white-space: nowrap;
}
#header .logo span { color: var(--text2); font-weight: 400; }
#project-title-input {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  padding: 5px 10px;
  min-width: 0;
}
#project-title-input:focus { outline: none; border-color: var(--accent); }
#project-title-input::placeholder { color: var(--text3); }

.hdr-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text2);
  cursor: pointer;
  font-family: var(--mono);
  font-size: 11px;
  padding: 5px 10px;
  white-space: nowrap;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.hdr-btn:hover { border-color: var(--accent); color: var(--accent); }
.hdr-btn.primary { background: var(--accent2); border-color: var(--accent); color: #fff; }
.hdr-btn.primary:hover { background: var(--accent); }
.hdr-btn.danger { border-color: transparent; }
.hdr-btn.danger:hover { border-color: var(--red); color: var(--red); }

/* ═══════════════════════════════════════
   LAYOUT: 3 COLUMNS
═══════════════════════════════════════ */
#app {
  display: grid;
  grid-template-columns: 260px 1fr 280px;
  grid-template-rows: 1fr;
  flex: 1;
  min-height: 0;
  height: calc(100vh - 49px);
}

/* ═══════════════════════════════════════
   LEFT PANEL: FILES + CHORD PALETTE
═══════════════════════════════════════ */
#panel-left {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-section {
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.panel-section-header {
  padding: 8px 12px;
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text3);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.panel-section-body {
  padding: 8px 10px;
}

/* File inputs */
.file-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}
.file-row label {
  font-size: 11px;
  color: var(--text2);
  width: 40px;
  flex-shrink: 0;
  font-family: var(--mono);
}
.file-btn {
  flex: 1;
  background: var(--bg3);
  border: 1px dashed var(--border2);
  border-radius: var(--radius);
  color: var(--text2);
  cursor: pointer;
  font-size: 11px;
  padding: 4px 8px;
  text-align: left;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  transition: all .15s;
}
.file-btn:hover { border-color: var(--accent); color: var(--accent); }
.file-btn.loaded { border-style: solid; border-color: var(--green); color: var(--green); }
input[type=file] { display: none; }

/* Capo */
.capo-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
}
.capo-row label {
  font-size: 11px;
  color: var(--text2);
  font-family: var(--mono);
}
.capo-row input[type=number] {
  width: 50px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 3px 6px;
  text-align: center;
}
.capo-row input[type=number]:focus { outline: none; border-color: var(--accent); }

/* Chord palette */
#chord-palette-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 8px 10px;
}
#chord-palette-filter {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 5px 8px;
  margin-bottom: 8px;
}
#chord-palette-filter:focus { outline: none; border-color: var(--accent); }
#chord-palette-filter::placeholder { color: var(--text3); }

#chord-palette {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.palette-chord {
  background: var(--chord-bg);
  border: 1px solid var(--chord-border);
  border-radius: 4px;
  color: var(--chord-text);
  cursor: pointer;
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 7px;
  transition: all .12s;
  user-select: none;
}
.palette-chord:hover {
  background: var(--accent2);
  border-color: var(--accent);
  color: #fff;
  transform: translateY(-1px);
}
.palette-chord.active {
  background: var(--accent2);
  border-color: var(--accent);
  color: #fff;
}

/* ═══════════════════════════════════════
   CENTER: AUDIO + EDITOR
═══════════════════════════════════════ */
#panel-center {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

/* Audio player */
#audio-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
}
#audio-controls {
  display: flex;
  align-items: center;
  gap: 8px;
}
.play-btn {
  width: 36px;
  height: 36px;
  background: var(--accent2);
  border: none;
  border-radius: 50%;
  color: #fff;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background .15s;
}
.play-btn:hover { background: var(--accent); }
.play-btn:active { transform: scale(.95); }

#time-display {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text);
  min-width: 80px;
  text-align: center;
  letter-spacing: 1px;
}
#seek-bar-wrap {
  flex: 1;
  position: relative;
  height: 20px;
  display: flex;
  align-items: center;
  cursor: pointer;
}
#seek-track {
  width: 100%;
  height: 4px;
  background: var(--bg3);
  border-radius: 2px;
  position: relative;
  overflow: hidden;
}
#seek-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  width: 0%;
  transition: width .1s linear;
}
#seek-input {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  cursor: pointer;
  top: 0;
  left: 0;
}

.transport-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text2);
  cursor: pointer;
  font-size: 11px;
  font-family: var(--mono);
  padding: 4px 8px;
  transition: all .15s;
  white-space: nowrap;
}
.transport-btn:hover { border-color: var(--accent); color: var(--accent); }

#speed-select {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text2);
  font-family: var(--mono);
  font-size: 11px;
  padding: 4px 6px;
  cursor: pointer;
}
#speed-select:focus { outline: none; border-color: var(--accent); }

/* TAP button */
#tap-btn {
  background: var(--bg3);
  border: 2px solid var(--border2);
  border-radius: var(--radius2);
  color: var(--text);
  cursor: pointer;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  padding: 6px 16px;
  letter-spacing: 1px;
  transition: all .1s;
  user-select: none;
}
#tap-btn:hover { border-color: var(--tap-active); color: var(--tap-active); }
#tap-btn.tapped {
  background: var(--tap-active);
  border-color: var(--tap-active);
  color: #000;
  transform: scale(.97);
}
#tap-btn:disabled { opacity: .35; cursor: not-allowed; }

/* Current chord display */
#current-chord-display {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  display: flex;
  align-items: center;
  gap: 6px;
}
#current-chord-name {
  color: var(--chord-text);
  font-weight: 600;
  font-size: 13px;
  min-width: 40px;
}

/* ═══════════════════════════════════════
   LYRIC EDITOR AREA
═══════════════════════════════════════ */
#editor-area {
  flex: 1;
  overflow-y: auto;
  padding: 12px 14px 60px;
}

/* Import lyric textarea */
#lyric-import-area {
  background: var(--bg2);
  border: 1px dashed var(--border2);
  border-radius: var(--radius2);
  padding: 12px;
  margin-bottom: 12px;
}
#lyric-import-area h4 {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
#lyric-textarea {
  width: 100%;
  min-height: 80px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.7;
  padding: 8px 10px;
  resize: vertical;
}
#lyric-textarea:focus { outline: none; border-color: var(--accent); }
#lyric-textarea::placeholder { color: var(--text3); }
#lyric-import-btns {
  display: flex;
  gap: 6px;
  margin-top: 6px;
}
.sm-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text2);
  cursor: pointer;
  font-family: var(--mono);
  font-size: 11px;
  padding: 4px 10px;
  transition: all .15s;
}
.sm-btn:hover { border-color: var(--accent); color: var(--accent); }
.sm-btn.green { border-color: var(--green); color: var(--green); }
.sm-btn.green:hover { background: var(--green); color: #000; }

/* Line rows */
.line-row {
  display: grid;
  grid-template-columns: 32px 80px 1fr;
  gap: 0;
  margin-bottom: 2px;
  border-radius: var(--radius);
  transition: background .1s;
  position: relative;
}
.line-row:hover { background: var(--bg2); }
.line-row.active-line { background: rgba(79,158,255,0.08); }
.line-row.tap-highlight {
  background: rgba(61,220,132,0.12);
  transition: background 0s;
}

.line-num {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  padding: 8px 4px 8px 6px;
  text-align: right;
  align-self: start;
  padding-top: 10px;
  user-select: none;
}

.line-time-btn {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  padding: 8px 6px;
  cursor: pointer;
  align-self: start;
  padding-top: 10px;
  white-space: nowrap;
  transition: color .15s;
  background: none;
  border: none;
}
.line-time-btn:hover { color: var(--accent); }
.line-time-btn.has-time { color: var(--amber); }
.line-time-btn.has-time:hover { color: var(--accent); }

.line-content {
  padding: 6px 6px 4px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

/* Chord tags row */
.chord-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  min-height: 4px;
}
.chord-tag {
  background: var(--chord-bg);
  border: 1px solid var(--chord-border);
  border-radius: 3px;
  color: var(--chord-text);
  cursor: pointer;
  font-family: var(--mono);
  font-size: 11px;
  padding: 1px 6px;
  position: relative;
  transition: all .1s;
  user-select: none;
  display: inline-flex;
  align-items: center;
  gap: 3px;
}
.chord-tag:hover {
  border-color: var(--accent);
  background: rgba(79,158,255,0.1);
}
.chord-tag .del-chord {
  color: var(--text3);
  font-size: 9px;
  line-height: 1;
  margin-left: 1px;
  padding: 1px;
}
.chord-tag .del-chord:hover { color: var(--red); }

/* Lyric text */
.lyric-text-input {
  background: transparent;
  border: none;
  border-bottom: 1px solid transparent;
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.6;
  padding: 2px 0;
  width: 100%;
  transition: border-color .15s;
}
.lyric-text-input:focus {
  outline: none;
  border-bottom-color: var(--border2);
}
.lyric-text-input::placeholder { color: var(--text3); }

/* Add chord inline button */
.add-chord-inline {
  background: none;
  border: 1px dashed var(--border);
  border-radius: 3px;
  color: var(--text3);
  cursor: pointer;
  font-family: var(--mono);
  font-size: 10px;
  padding: 1px 5px;
  transition: all .15s;
}
.add-chord-inline:hover { border-color: var(--accent); color: var(--accent); }

/* Line actions (appears on hover) */
.line-actions {
  position: absolute;
  right: 4px;
  top: 6px;
  display: none;
  gap: 3px;
}
.line-row:hover .line-actions { display: flex; }
.line-action-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text3);
  cursor: pointer;
  font-size: 10px;
  padding: 2px 5px;
  font-family: var(--mono);
  transition: all .12s;
}
.line-action-btn:hover { color: var(--text); border-color: var(--border2); }
.line-action-btn.del:hover { color: var(--red); border-color: var(--red); }

/* Add line button */
#add-line-btn {
  background: var(--bg2);
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  color: var(--text3);
  cursor: pointer;
  font-family: var(--mono);
  font-size: 11px;
  padding: 8px;
  text-align: center;
  width: 100%;
  margin-top: 8px;
  transition: all .15s;
}
#add-line-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ═══════════════════════════════════════
   RIGHT PANEL: DIAGRAM
═══════════════════════════════════════ */
#panel-right {
  background: var(--bg2);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#diagram-panel {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}
#diagram-chord-name {
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  text-align: center;
  margin-bottom: 10px;
  min-height: 28px;
}
#diagram-container {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.diagram-variant {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  padding: 10px;
}
.diagram-variant-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
  text-align: center;
}
.diagram-svg-wrap {
  display: flex;
  justify-content: center;
}
.diagram-svg-wrap svg {
  display: block;
}
.diagram-empty {
  text-align: center;
  color: var(--text3);
  font-family: var(--mono);
  font-size: 11px;
  padding: 30px 0;
  line-height: 2;
}

/* Chord input in right panel */
#diagram-search-wrap {
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#diagram-chord-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--mono);
  font-size: 14px;
  padding: 6px 10px;
  text-align: center;
  letter-spacing: 1px;
}
#diagram-chord-input:focus { outline: none; border-color: var(--accent); }
#diagram-chord-input::placeholder { color: var(--text3); font-size: 11px; letter-spacing: 0; }

/* ═══════════════════════════════════════
   MODAL / POPUP
═══════════════════════════════════════ */
#modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 500;
  align-items: center;
  justify-content: center;
}
#modal-overlay.open { display: flex; }
#modal-box {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--radius2);
  padding: 20px;
  min-width: 280px;
  max-width: 400px;
  box-shadow: var(--shadow);
}
#modal-box h3 {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text);
  margin-bottom: 12px;
}
#modal-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--mono);
  font-size: 16px;
  padding: 8px 10px;
  text-align: center;
  letter-spacing: 2px;
  margin-bottom: 10px;
}
#modal-input:focus { outline: none; border-color: var(--accent); }
#modal-time-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--mono);
  font-size: 14px;
  padding: 6px 10px;
  text-align: center;
  margin-bottom: 10px;
}
#modal-time-input:focus { outline: none; border-color: var(--accent); }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.modal-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text2);
  cursor: pointer;
  font-family: var(--mono);
  font-size: 12px;
  padding: 6px 14px;
  transition: all .15s;
}
.modal-btn:hover { border-color: var(--accent); color: var(--accent); }
.modal-btn.ok { background: var(--accent2); border-color: var(--accent); color: #fff; }
.modal-btn.ok:hover { background: var(--accent); }
.modal-btn.del { border-color: var(--red); color: var(--red); }
.modal-btn.del:hover { background: var(--red); color: #fff; }

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius2);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 8px 18px;
  z-index: 1000;
  pointer-events: none;
  transition: transform .25s cubic-bezier(.34,1.56,.64,1), opacity .25s;
  opacity: 0;
}
#toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* ═══════════════════════════════════════
   STATUS BAR
═══════════════════════════════════════ */

  'Amaj7':{ variants: [{ name:'ロー', frets:[-1,0,2,1,2,0] }]},
  'Am7':  { variants: [
    { name:'ロー', frets:[-1,0,2,0,1,0] },
    { name:'バレー(5F)', frets:[5,7,5,5,5,5], barre:5 },

  'A7':   { variants: [

// Aliases
['C#','Db'].forEach(r=>{ if(CHORD_DB[r]) { CHORD_DB[r+'m7'] = CHORD_DB[r+'m7'] || { variants: [{ name:'バレー', frets:[-1,-1,4,6,4,4], barre:4 }]}; }});

// ═══════════════════════════════════════════════════════
//  SVG CHORD DIAGRAM RENDERER
// ═══════════════════════════════════════════════════════
function renderChordDiagram(frets, barre, title) {
  const W = 90, H = 110;
  const strings = 6, fretCount = 4;
  const marginLeft = 16, marginTop = 24;
  const strSpacing = 12, fretSpacing = 16;
  const gridW = strSpacing * (strings - 1);
  const gridH = fretSpacing * fretCount;

  // Determine start fret
  const nonMuted = frets.filter(f => f > 0);
  let startFret = 1;
  if (nonMuted.length > 0) {
    const minF = Math.min(...nonMuted);
    const maxF = Math.max(...nonMuted);
    if (maxF > 4) startFret = minF;
  }
  if (barre) startFret = barre;

  let svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  const color = '#e2e6f0';
  const mutedColor = '#ff5c5c';
  const openColor = '#3ddc84';
  const dotColor = '#4f9eff';
  const barreColor = 'rgba(79,158,255,0.6)';

  // Nut (if starting from fret 1)
  if (startFret === 1) {
    svg += `<rect x="${marginLeft}" y="${marginTop - 3}" width="${gridW}" height="4" rx="2" fill="${color}" opacity="0.6"/>`;
  } else {
    // Fret position label
    svg += `<text x="${marginLeft - 4}" y="${marginTop + fretSpacing * 0.6}" font-size="8" fill="#8890a8" text-anchor="end" font-family="IBM Plex Mono">${startFret}fr</text>`;
  }

  // Fret lines
  for (let f = 0; f <= fretCount; f++) {
    const y = marginTop + f * fretSpacing;
    svg += `<line x1="${marginLeft}" y1="${y}" x2="${marginLeft + gridW}" y2="${y}" stroke="${color}" stroke-width="${f===0?0:0.5}" opacity="0.25"/>`;
  }

  // String lines
  for (let s = 0; s < strings; s++) {
    const x = marginLeft + s * strSpacing;
    svg += `<line x1="${x}" y1="${marginTop}" x2="${x}" y2="${marginTop + gridH}" stroke="${color}" stroke-width="0.7" opacity="0.4"/>`;
  }

  // Barre
  if (barre && barre >= startFret) {
    const bf = barre - startFret;
    const by = marginTop + bf * fretSpacing + fretSpacing / 2;
    // Find barre span
    const barreStrings = frets.filter(f => f === barre);
    if (barreStrings.length >= 2) {
      const firstS = frets.indexOf(barre);
      const lastS = frets.lastIndexOf(barre);
      const bx1 = marginLeft + firstS * strSpacing;
      const bx2 = marginLeft + lastS * strSpacing;
      svg += `<rect x="${bx1}" y="${by - 5}" width="${bx2 - bx1}" height="10" rx="5" fill="${barreColor}"/>`;
    }
  }

  // Dots
  for (let s = 0; s < strings; s++) {
    const f = frets[s];
    const x = marginLeft + s * strSpacing;

    if (f === -1) {
      // Muted
      const ty = marginTop - 11;
      svg += `<text x="${x}" y="${ty}" font-size="9" text-anchor="middle" fill="${mutedColor}" font-family="sans-serif">✕</text>`;
    } else if (f === 0) {
      // Open
      const ty = marginTop - 11;
      svg += `<circle cx="${x}" cy="${ty - 2}" r="4" fill="none" stroke="${openColor}" stroke-width="1.2"/>`;
    } else {
      // Fretted dot
      const fretPos = f - startFret;
      if (fretPos >= 0 && fretPos < fretCount) {
        const dy = marginTop + fretPos * fretSpacing + fretSpacing / 2;
        // Skip if already covered by barre rendering
        const isBarreDot = (barre && f === barre);
        if (!isBarreDot || frets.filter(ff => ff === barre).length < 2) {
          svg += `<circle cx="${x}" cy="${dy}" r="5" fill="${dotColor}"/>`;
        } else if (isBarreDot) {
          // Show small indicator
          svg += `<circle cx="${x}" cy="${dy}" r="5" fill="${dotColor}" opacity="0.8"/>`;
        }
      }
    }
  }

  svg += `</svg>`;
  return svg;
}

// ═══════════════════════════════════════════════════════
//  CHORD LOOKUP
// ═══════════════════════════════════════════════════════
function lookupChord(name) {
  if (!name || name === 'N') return null;
  // Strip bass note (e.g. C/G → C)
  const base = name.split('/')[0];
  // Direct lookup
  if (CHORD_DB[base]) return { name: base, data: CHORD_DB[base] };
  // Try common aliases
  const aliases = { '♭': 'b', '♯': '#' };
  let normalized = base;
  for (const [k, v] of Object.entries(aliases)) normalized = normalized.replace(k, v);
  if (CHORD_DB[normalized]) return { name: normalized, data: CHORD_DB[normalized] };
  return null;
}

function renderDiagramPanel(chordName) {
  const nameEl = document.getElementById('diagram-chord-name');
  const container = document.getElementById('diagram-container');
  nameEl.textContent = chordName || '';
  if (!chordName || chordName === 'N') {
    container.innerHTML = '<div class="diagram-empty">コードタグをホバー<br>または上で入力</div>';
    return;
  }
  const result = lookupChord(chordName);
  if (!result) {
    container.innerHTML = `<div class="diagram-empty">"${chordName}"<br>のダイアグラムは<br>未登録です</div>`;
    return;
  }
  container.innerHTML = '';
  result.data.variants.forEach(v => {
    const div = document.createElement('div');
    div.className = 'diagram-variant';
    div.innerHTML = `
      <div class="diagram-variant-label">${v.name}</div>
      <div class="diagram-svg-wrap">${renderChordDiagram(v.frets, v.barre || null, v.name)}</div>
    `;
    container.appendChild(div);
  });
}

const audio = document.getElementById('audio-player');
const playBtn = document.getElementById('play-btn');
const timeDisplay = document.getElementById('time-display');
const seekInput = document.getElementById('seek-input');
const seekFill = document.getElementById('seek-fill');
const tapBtn = document.getElementById('tap-btn');
const currentChordName = document.getElementById('current-chord-name');

let isSeeking = false;
let tapLineIndex = -1;

function formatTime(s, showTenth = false) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  if (showTenth) {
    const t = Math.floor((s % 1) * 10);
    return `${m}:${String(sec).padStart(2,'0')}.${t}`;
  }
  return `${m}:${String(sec).padStart(2,'0')}`;
}

audio.addEventListener('timeupdate', () => {
  if (isSeeking) return;
  const t = audio.currentTime;
  const d = audio.duration || 0;
  timeDisplay.textContent = `${formatTime(t, true)} / ${formatTime(d)}`;
  if (d > 0) {
    const pct = (t / d) * 100;
    seekFill.style.width = pct + '%';
    seekInput.value = Math.round((t / d) * 1000);
  }
  // Update current chord from palette
  updateCurrentChord(t);
  // Highlight active line
  highlightActiveLine(t);
});

audio.addEventListener('play', () => { playBtn.textContent = '⏸'; });
audio.addEventListener('pause', () => { playBtn.textContent = '▶'; });
audio.addEventListener('ended', () => { playBtn.textContent = '▶'; });

audio.addEventListener('loadedmetadata', () => {
  const d = audio.duration;
  timeDisplay.textContent = `0:00.0 / ${formatTime(d)}`;
  tapBtn.disabled = false;
});

playBtn.addEventListener('click', togglePlay);
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowLeft') { audio.currentTime = Math.max(0, audio.currentTime - 5); }
  if (e.code === 'ArrowRight') { audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 5); }
});

function togglePlay() {
  if (!audio.src) return;
  if (audio.paused) audio.play();
  else audio.pause();
}

document.getElementById('btn-minus5').addEventListener('click', () => {
  audio.currentTime = Math.max(0, audio.currentTime - 5);
});

document.getElementById('speed-select').addEventListener('change', e => {
  audio.playbackRate = parseFloat(e.target.value);
});

seekInput.addEventListener('mousedown', () => { isSeeking = true; });
seekInput.addEventListener('mouseup', () => {
  isSeeking = false;
  audio.currentTime = (seekInput.value / 1000) * (audio.duration || 0);
});
seekInput.addEventListener('input', () => {
  if (!isSeeking) return;
  const pct = seekInput.value / 10;
  seekFill.style.width = pct + '%';
  const t = (seekInput.value / 1000) * (audio.duration || 0);
  timeDisplay.textContent = `${formatTime(t, true)} / ${formatTime(audio.duration || 0)}`;
});

// TAP
tapBtn.addEventListener('click', () => {
  if (!audio.src || audio.paused) return;
  const t = audio.currentTime;
  // Find the next untimed line, or the focused line
  let idx = tapLineIndex;
  if (idx < 0 || idx >= project.lines.length) {
    idx = project.lines.findIndex(l => l.time === null || l.time === undefined);
  }
  if (idx < 0) idx = 0;
  if (idx < project.lines.length) {
    project.lines[idx].time = parseFloat(t.toFixed(3));
    tapLineIndex = idx + 1;
    renderLines();
    flashLine(idx);
    autoSave();
  }
});

function flashLine(idx) {
  const rows = document.querySelectorAll('.line-row');
  if (rows[idx]) {
    rows[idx].classList.add('tap-highlight');
    setTimeout(() => rows[idx].classList.remove('tap-highlight'), 400);
  }
}

function updateCurrentChord(t) {
  // Find current chord from palette times
  if (!project.chord_source && chordPalette.length === 0) return;
  // Use the chords/times from loaded chord JSON
  if (!window._chordTimes || !window._chordNames) return;
  let current = 'N';
  for (let i = 0; i < window._chordTimes.length; i++) {
    if (window._chordTimes[i] <= t) current = window._chordNames[i];
    else break;
  }
  currentChordName.textContent = current;
}

function highlightActiveLine(t) {
  const rows = document.querySelectorAll('.line-row');
  let activeIdx = -1;
  for (let i = project.lines.length - 1; i >= 0; i--) {
    if (project.lines[i].time !== null && project.lines[i].time !== undefined && project.lines[i].time <= t) {
      activeIdx = i;
      break;
    }
  }
  rows.forEach((r, i) => {
    r.classList.toggle('active-line', i === activeIdx);
  });
}

// ═══════════════════════════════════════════════════════
//  FILE LOADING
// ═══════════════════════════════════════════════════════
document.getElementById('file-audio').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  audioFile = file;
  if (audioObjectURL) URL.revokeObjectURL(audioObjectURL);
  audioObjectURL = URL.createObjectURL(file);
  audio.src = audioObjectURL;
  project.audio = file.name;
  document.getElementById('audio-file-btn').textContent = file.name;
  document.getElementById('audio-file-btn').classList.add('loaded');
  tapBtn.disabled = false;
  toast(`音声ファイルを読み込みました: ${file.name}`);
});

document.getElementById('file-chord').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const text = ev.target.result;
    let data;
    if (file.name.endsWith('.csv')) {
      data = parseChordinoCSV(text);
    } else {
      try { data = JSON.parse(text); } catch { toast('JSONパースエラー'); return; }
    }
    loadChordData(data, file.name);
  };
  reader.readAsText(file, 'utf-8');
});

function parseChordinoCSV(text) {
  const lines = text.split('\n');
  const chords = [], times = [];
  let prev = null;
  for (const line of lines) {
    const parts = line.trim().split(',');
    if (parts.length < 2) continue;
    const t = parseFloat(parts[0]);
    if (isNaN(t)) continue;
    const ch = normalizeChord(parts[1].trim());
    if (ch !== prev) { chords.push(ch); times.push(t); prev = ch; }
  }
  return { chords, times, duration: times[times.length-1] + 2 || 0, key: '', tempo: 0 };
}

function normalizeChord(raw) {
  if (!raw || ['N','X','n'].includes(raw)) return 'N';
  const QUAL_MAP = {
    'maj':'','min':'m','maj7':'maj7','min7':'m7',
    'dom7':'7','7':'7','dim':'dim','aug':'aug',
    'sus2':'sus2','sus4':'sus4','hdim7':'m7b5',
    'maj9':'maj9','min9':'m9','add9':'add9',
  };
  if (raw.includes(':')) {
    const [root, qual] = raw.split(':', 2);
    return root + (QUAL_MAP[qual] ?? qual);
  }
  return raw;
}

function loadChordData(data, filename) {
  project.chord_source = filename;
  document.getElementById('chord-file-btn').textContent = filename;
  document.getElementById('chord-file-btn').classList.add('loaded');

  const chords = (data.chords || []).filter(c => c && c !== 'N');
  const unique = [...new Set(chords)];
  chordPalette = unique;

  window._chordNames = data.chords || [];
  window._chordTimes = data.times || [];

  if (data.tempo) document.title = `ChordScore — ${data.file || filename}`;
  renderPalette();
  document.getElementById('palette-count').textContent = unique.length;
  toast(`コードデータ読み込み: ${unique.length}種のコード`);
}

// ═══════════════════════════════════════════════════════
//  PALETTE RENDERING
// ═══════════════════════════════════════════════════════
function renderPalette() {
  const filter = document.getElementById('chord-palette-filter').value.toLowerCase();
  const container = document.getElementById('chord-palette');
  const filtered = chordPalette.filter(c => c.toLowerCase().includes(filter));
  container.innerHTML = '';
  if (filtered.length === 0) {
    container.innerHTML = '<div style="color:var(--text3);font-size:11px;font-family:var(--mono);">なし</div>';
    return;
  }
  filtered.forEach(chord => {
    const btn = document.createElement('button');
    btn.className = 'palette-chord';
    btn.textContent = chord;
    btn.addEventListener('click', () => addChordToFocusedLine(chord));
    btn.addEventListener('mouseenter', () => showDiagramRight(chord));
    container.appendChild(btn);
  });
}

document.getElementById('chord-palette-filter').addEventListener('input', renderPalette);

// ═══════════════════════════════════════════════════════
//  LINE / LYRIC MANAGEMENT
// ═══════════════════════════════════════════════════════
let focusedLineIndex = -1;

function createLine(lyric = '', time = null, chords = []) {
  return { lyric, time, chords: chords.map(c => typeof c === 'string' ? { chord: c, offset: 0 } : c) };
}

function addLine(lyric = '', time = null, chords = []) {
  project.lines.push(createLine(lyric, time, chords));
  renderLines();
  autoSave();
}

function removeLine(idx) {
  project.lines.splice(idx, 1);
  renderLines();
  autoSave();
}

function renderLines() {
  const container = document.getElementById('lines-container');
  container.innerHTML = '';
  project.lines.forEach((line, idx) => {
    const row = document.createElement('div');
    row.className = 'line-row';
    row.dataset.idx = idx;

    // Line number
    const numEl = document.createElement('div');
    numEl.className = 'line-num';
    numEl.textContent = idx + 1;

    // Time button
    const timeBtn = document.createElement('button');
    timeBtn.className = 'line-time-btn' + (line.time != null ? ' has-time' : '');
    timeBtn.textContent = line.time != null ? formatTime(line.time, true) : '--:--.--';
    timeBtn.title = '時刻を編集 / TAP時に使用';
    timeBtn.addEventListener('click', () => openTimeModal(idx));

    // Content
    const content = document.createElement('div');
    content.className = 'line-content';

    // Chord tags
    const tagsRow = document.createElement('div');
    tagsRow.className = 'chord-tags';
    line.chords.forEach((c, ci) => {
      const tag = document.createElement('span');
      tag.className = 'chord-tag';
      tag.textContent = c.chord;
      tag.addEventListener('click', (e) => {
        e.stopPropagation();
        openChordEditModal(idx, ci);
      });
      tag.addEventListener('mouseenter', () => {
        showDiagramRight(c.chord);
        showDiagramPopup(c.chord, tag);
      });
      tag.addEventListener('mouseleave', hideDiagramPopup);
      // Del button
      const del = document.createElement('span');
      del.className = 'del-chord';
      del.textContent = '×';
      del.title = '削除';
      del.addEventListener('click', e => {
        e.stopPropagation();
        project.lines[idx].chords.splice(ci, 1);
        renderLines();
        autoSave();
      });
      tag.appendChild(del);
      tagsRow.appendChild(tag);
    });
    // Add chord inline button
    const addBtn = document.createElement('button');
    addBtn.className = 'add-chord-inline';
    addBtn.textContent = '+コード';
    addBtn.addEventListener('click', () => openAddChordModal(idx));
    tagsRow.appendChild(addBtn);
    content.appendChild(tagsRow);

    // Lyric input
    const lyricInput = document.createElement('input');
    lyricInput.type = 'text';
    lyricInput.className = 'lyric-text-input';
    lyricInput.value = line.lyric;
    lyricInput.placeholder = '歌詞を入力...';
    lyricInput.addEventListener('focus', () => {
      focusedLineIndex = idx;
      tapLineIndex = idx;
    });
    lyricInput.addEventListener('input', e => {
      project.lines[idx].lyric = e.target.value;
      autoSave();
    });
    lyricInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        // Insert new line after
        project.lines.splice(idx + 1, 0, createLine());
        renderLines();
        // Focus next
        setTimeout(() => {
          const inputs = document.querySelectorAll('.lyric-text-input');
          if (inputs[idx + 1]) inputs[idx + 1].focus();
        }, 0);
      }
      if (e.key === 'Backspace' && e.target.value === '' && project.lines.length > 1) {
        e.preventDefault();
        removeLine(idx);
        setTimeout(() => {
          const inputs = document.querySelectorAll('.lyric-text-input');
          if (inputs[Math.max(0, idx - 1)]) inputs[Math.max(0, idx - 1)].focus();
        }, 0);
      }
    });
    content.appendChild(lyricInput);
    row.appendChild(numEl);
    row.appendChild(timeBtn);
    row.appendChild(content);

    // Line actions
    const actions = document.createElement('div');
    actions.className = 'line-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'line-action-btn del';
    delBtn.textContent = '削除';
    delBtn.addEventListener('click', () => removeLine(idx));
    const insertBtn = document.createElement('button');
    insertBtn.className = 'line-action-btn';
    insertBtn.textContent = '↑挿入';
    insertBtn.addEventListener('click', () => {
      project.lines.splice(idx, 0, createLine());
      renderLines();
      autoSave();
    });
    // TAP set
    const tapSet = document.createElement('button');
    tapSet.className = 'line-action-btn';
    tapSet.textContent = '⏱TAP';
    tapSet.title = '次のTAPでこの行に時刻をセット';
    tapSet.addEventListener('click', () => {
      tapLineIndex = idx;
      toast(`次のTAPで行${idx+1}に時刻をセットします`);
    });
    actions.appendChild(tapSet);
    actions.appendChild(insertBtn);
    actions.appendChild(delBtn);
    row.appendChild(actions);

    container.appendChild(row);
  });
  updateStatus();
}

// ═══════════════════════════════════════════════════════
//  ADD CHORD TO LINE
// ═══════════════════════════════════════════════════════
function addChordToFocusedLine(chord) {
  if (focusedLineIndex < 0 || focusedLineIndex >= project.lines.length) {
    // Add to last line
    if (project.lines.length === 0) addLine();
    focusedLineIndex = project.lines.length - 1;
  }
  project.lines[focusedLineIndex].chords.push({ chord, offset: 0 });
  renderLines();
  autoSave();
  // Re-focus the input
  setTimeout(() => {
    const inputs = document.querySelectorAll('.lyric-text-input');
    if (inputs[focusedLineIndex]) inputs[focusedLineIndex].focus();
  }, 0);
}

// ═══════════════════════════════════════════════════════
//  LYRIC IMPORT
// ═══════════════════════════════════════════════════════
document.getElementById('btn-import-lyrics').addEventListener('click', () => {
  const text = document.getElementById('lyric-textarea').value.trim();
  if (!text) return;
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  project.lines = lines.map(l => createLine(l));
  renderLines();
  autoSave();
  toast(`${lines.length}行を取り込みました`);
});

document.getElementById('btn-append-lyrics').addEventListener('click', () => {
  const text = document.getElementById('lyric-textarea').value.trim();
  if (!text) return;
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  lines.forEach(l => project.lines.push(createLine(l)));
  renderLines();
  autoSave();
  toast(`${lines.length}行を追記しました`);
});

document.getElementById('btn-clear-lyrics').addEventListener('click', () => {
  if (confirm('全ての行を削除しますか？')) {
    project.lines = [];
    renderLines();
    autoSave();
  }
});

document.getElementById('add-line-btn').addEventListener('click', () => {
  addLine();
  setTimeout(() => {
    const inputs = document.querySelectorAll('.lyric-text-input');
    if (inputs.length > 0) inputs[inputs.length - 1].focus();
  }, 0);
});

// ═══════════════════════════════════════════════════════
//  MODAL SYSTEM
// ═══════════════════════════════════════════════════════
const modalOverlay = document.getElementById('modal-overlay');
const modalTitle = document.getElementById('modal-title');
const modalBody = document.getElementById('modal-body');
const modalBtns = document.getElementById('modal-btns');

function closeModal() {
  modalOverlay.classList.remove('open');
  modalBody.innerHTML = '';
  modalBtns.innerHTML = '';
}

modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });

function openTimeModal(lineIdx) {
  const line = project.lines[lineIdx];
  modalTitle.textContent = `行 ${lineIdx+1} の時刻を設定`;
  modalBody.innerHTML = `
    <div style="margin-bottom:8px;color:var(--text2);font-size:12px;font-family:var(--mono);">
      歌詞: "${line.lyric || '(空)'}"
    </div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;">
      <input type="number" id="modal-time-input" value="${line.time != null ? line.time.toFixed(3) : ''}" step="0.1" min="0" style="flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--mono);font-size:14px;padding:6px 10px;text-align:center;" placeholder="秒 (例: 12.500)">
      <button onclick="setTimeFromCurrent(${lineIdx})" class="sm-btn" style="white-space:nowrap;">▶ 現在位置</button>
    </div>
  `;
  modalBtns.innerHTML = '';
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'modal-btn';
  cancelBtn.textContent = 'キャンセル';
  cancelBtn.onclick = closeModal;

  const clearBtn = document.createElement('button');
  clearBtn.className = 'modal-btn del';
  clearBtn.textContent = '時刻を削除';
  clearBtn.onclick = () => {
    project.lines[lineIdx].time = null;
    renderLines();
    autoSave();
    closeModal();
  };

  const okBtn = document.createElement('button');
  okBtn.className = 'modal-btn ok';
  okBtn.textContent = 'セット';
  okBtn.onclick = () => {
    const val = parseFloat(document.getElementById('modal-time-input').value);
    if (!isNaN(val)) {
      project.lines[lineIdx].time = val;
      renderLines();
      autoSave();
      closeModal();
    }
  };
  modalBtns.appendChild(cancelBtn);
  modalBtns.appendChild(clearBtn);
  modalBtns.appendChild(okBtn);
  modalOverlay.classList.add('open');
  setTimeout(() => document.getElementById('modal-time-input').focus(), 100);
}

window.setTimeFromCurrent = function(lineIdx) {
  const t = audio.currentTime;
  const input = document.getElementById('modal-time-input');
  if (input) input.value = t.toFixed(3);
};

function openAddChordModal(lineIdx) {
  modalTitle.textContent = `行 ${lineIdx+1} にコードを追加`;
  modalBody.innerHTML = `
    <div style="margin-bottom:8px;color:var(--text2);font-size:11px;font-family:var(--mono);">コード名を入力 (例: Am7, G/B)</div>

    ${chordPalette.length > 0 ? `
    <div style="margin-top:8px;">
      <div style="font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:5px;">楽曲のコードから選択:</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;max-height:120px;overflow-y:auto;">
        ${chordPalette.map(c => `<button class="palette-chord" style="font-size:11px;" onclick="quickAddChord(${lineIdx},'${c}')">${c}</button>`).join('')}
      </div>
    </div>` : ''}
  `;
  modalBtns.innerHTML = '';
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'modal-btn';
  cancelBtn.textContent = 'キャンセル';
  cancelBtn.onclick = closeModal;
  const okBtn = document.createElement('button');
  okBtn.className = 'modal-btn ok';
  okBtn.textContent = '追加';
  okBtn.onclick = () => {
    const val = document.getElementById('modal-input').value.trim();
    if (val) {
      project.lines[lineIdx].chords.push({ chord: val, offset: 0 });
      renderLines();
      autoSave();
    }
    closeModal();
  };
  modalBtns.appendChild(cancelBtn);
  modalBtns.appendChild(okBtn);
  modalOverlay.classList.add('open');
  setTimeout(() => {
    const inp = document.getElementById('modal-input');
    if (inp) { inp.focus(); inp.addEventListener('keydown', e => { if (e.key==='Enter') okBtn.click(); }); }
  }, 100);

window.quickAddChord = function(lineIdx, chord) {
  project.lines[lineIdx].chords.push({ chord, offset: 0 });
  renderLines();
  autoSave();
  closeModal();
};

function openChordEditModal(lineIdx, chordIdx) {
  const chord = project.lines[lineIdx].chords[chordIdx];
  modalTitle.textContent = `コードを編集`;
  modalBody.innerHTML = `
    <input type="text" id="modal-input" value="${chord.chord}" placeholder="コード名" autocomplete="off">
  `;
  modalBtns.innerHTML = '';
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'modal-btn';
  cancelBtn.textContent = 'キャンセル';
  cancelBtn.onclick = closeModal;
  const delBtn = document.createElement('button');
  delBtn.className = 'modal-btn del';
  delBtn.textContent = '削除';
  delBtn.onclick = () => {
    project.lines[lineIdx].chords.splice(chordIdx, 1);
    renderLines();
    autoSave();
    closeModal();
  };
  const okBtn = document.createElement('button');
  okBtn.className = 'modal-btn ok';
  okBtn.textContent = '更新';
  okBtn.onclick = () => {
    const val = document.getElementById('modal-input').value.trim();
    if (val) {
      project.lines[lineIdx].chords[chordIdx].chord = val;
      renderLines();
      autoSave();
    }
    closeModal();
  };
  modalBtns.appendChild(cancelBtn);
  modalBtns.appendChild(delBtn);
  modalBtns.appendChild(okBtn);
  modalOverlay.classList.add('open');
  setTimeout(() => {
    const inp = document.getElementById('modal-input');
    if (inp) {
      inp.focus(); inp.select();
      inp.addEventListener('keydown', e => { if (e.key==='Enter') okBtn.click(); });
      inp.addEventListener('input', () => showDiagramRight(inp.value));
    }
  }, 100);
}

// ═══════════════════════════════════════════════════════
//  DIAGRAM HOVER POPUP
// ═══════════════════════════════════════════════════════
const diagramPopup = document.getElementById('diagram-popup');
let popupTimer = null;

function showDiagramPopup(chordName, anchorEl) {
  clearTimeout(popupTimer);
  const result = lookupChord(chordName);
  if (!result) return;
  document.getElementById('popup-chord-name').textContent = chordName;
  const variantsEl = document.getElementById('popup-variants');
  variantsEl.innerHTML = '';
  result.data.variants.slice(0, 3).forEach(v => {
    const wrap = document.createElement('div');
    wrap.style.textAlign = 'center';
    wrap.innerHTML = `
      <div style="font-size:9px;color:var(--text3);font-family:var(--mono);margin-bottom:3px;">${v.name}</div>
      ${renderChordDiagram(v.frets, v.barre || null, v.name)}
    `;
    variantsEl.appendChild(wrap);
  });
  // Position
  const rect = anchorEl.getBoundingClientRect();
  diagramPopup.style.left = rect.left + 'px';
  diagramPopup.style.top = (rect.top - diagramPopup.offsetHeight - 8) + 'px';
  diagramPopup.classList.add('show');
  // Adjust if out of viewport
  requestAnimationFrame(() => {
    const pr = diagramPopup.getBoundingClientRect();
    if (pr.top < 8) diagramPopup.style.top = (rect.bottom + 8) + 'px';
    if (pr.right > window.innerWidth - 8) {
      diagramPopup.style.left = (window.innerWidth - pr.width - 8) + 'px';
    }
    if (pr.left < 8) diagramPopup.style.left = '8px';
  });
}

function hideDiagramPopup() {
  popupTimer = setTimeout(() => diagramPopup.classList.remove('show'), 150);
}

function showDiagramRight(chord) {
  document.getElementById('diagram-chord-input').value = chord;
  renderDiagramPanel(chord);
}

document.getElementById('diagram-chord-input').addEventListener('input', e => {
  renderDiagramPanel(e.target.value.trim());
});

// ═══════════════════════════════════════════════════════
//  SAVE / LOAD PROJECT
// ═══════════════════════════════════════════════════════
function getProjectData() {
  return {
    title: document.getElementById('project-title-input').value,
    audio: project.audio,
    capo: parseInt(document.getElementById('capo-input').value) || 0,
    lines: project.lines,
    chord_source: project.chord_source,
  };
}

document.getElementById('btn-save-project').addEventListener('click', () => {
  const data = getProjectData();
  const title = data.title || 'chordscore';
  const filename = title.replace(/[^a-zA-Z0-9_\-ぁ-ん一-龯ァ-ヶ]/g, '_') + '_project.json';
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
  toast(`💾 保存しました: ${filename}`);
  autoSave();
});

document.getElementById('btn-load-project').addEventListener('click', () => {
  document.getElementById('file-load-project').click();
});

document.getElementById('file-load-project').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      loadProject(data);
      toast(`プロジェクトを読み込みました: ${data.title || file.name}`);
    } catch { toast('JSONパースエラー'); }
  };
  reader.readAsText(file);
});

function loadProject(data) {
  document.getElementById('project-title-input').value = data.title || '';
  document.getElementById('capo-input').value = data.capo || 0;
  project.audio = data.audio || '';
  project.chord_source = data.chord_source || '';
  project.lines = (data.lines || []).map(l => createLine(
    l.lyric || '',
    l.time != null ? l.time : null,
    l.chords || []
  ));
  if (data.audio) document.getElementById('audio-file-btn').textContent = data.audio;
  if (data.chord_source) document.getElementById('chord-file-btn').textContent = data.chord_source;
  renderLines();
}

// ═══════════════════════════════════════════════════════
//  NEW PROJECT
// ═══════════════════════════════════════════════════════
document.getElementById('btn-new-project').addEventListener('click', () => {
  if (project.lines.length > 0 && !confirm('現在の編集内容を破棄して新規作成しますか？')) return;
  project = { title: '', audio: '', capo: 0, lines: [], chord_source: '' };
  chordPalette = [];
  window._chordNames = [];
  window._chordTimes = [];
  document.getElementById('project-title-input').value = '';
  document.getElementById('capo-input').value = 0;
  document.getElementById('audio-file-btn').textContent = 'クリックして選択';
  document.getElementById('audio-file-btn').classList.remove('loaded');
  document.getElementById('chord-file-btn').textContent = 'JSON/CSV';
  document.getElementById('chord-file-btn').classList.remove('loaded');
  audio.src = '';
  playBtn.textContent = '▶';
  timeDisplay.textContent = '0:00.0 / 0:00';
  seekFill.style.width = '0%';
  currentChordName.textContent = '-';
  tapBtn.disabled = true;
  renderPalette();
  renderLines();
  renderDiagramPanel('');
  localStorage.removeItem('chordscore_autosave');
  document.getElementById('stat-autosave').textContent = '-';
});

// ═══════════════════════════════════════════════════════
//  AUTO SAVE
// ═══════════════════════════════════════════════════════
let autoSaveTimer = null;
function autoSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    const data = getProjectData();
    try {
      localStorage.setItem('chordscore_autosave', JSON.stringify(data));
      const now = new Date();
      document.getElementById('stat-autosave').textContent =
        `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
    } catch(e) {
      console.warn('AutoSave failed:', e);
    }
  }, 1000);
}

// Load autosave on startup
window.addEventListener('DOMContentLoaded', () => {
  try {
    const saved = localStorage.getItem('chordscore_autosave');
    if (saved) {
      const data = JSON.parse(saved);
      if (data.lines && data.lines.length > 0) {
        if (confirm(`前回の作業（${data.title || '無題'}、${data.lines.length}行）を復元しますか？`)) {
          loadProject(data);
          toast('自動保存データを復元しました');
        }
      }
    }
  } catch(e) {}
  renderLines();
  renderPalette();
});

// ═══════════════════════════════════════════════════════
//  STATUS BAR
// ═══════════════════════════════════════════════════════
function updateStatus() {
  document.getElementById('stat-lines').textContent = project.lines.length;
  const totalChords = project.lines.reduce((s, l) => s + l.chords.length, 0);
  document.getElementById('stat-chords').textContent = totalChords;
  const timed = project.lines.filter(l => l.time != null).length;
  document.getElementById('stat-timed').textContent = timed;
}

// ═══════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// Title sync
document.getElementById('project-title-input').addEventListener('input', autoSave);
document.getElementById('capo-input').addEventListener('input', autoSave);
</script>
</body>
</html>
